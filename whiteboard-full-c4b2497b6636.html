<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hanuman · Whiteboard</title>
<style>
  :root{--teal:#1f8a8a;--teal-d:#136b6b;--cream:#FDF8F0;--charcoal:#3A3A3A;--gold:#D99A4E;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:"DM Sans",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
  html,body{height:100%;}
  body{background:var(--cream);color:var(--charcoal);overflow:hidden;}
  #stage{height:100vh;height:100dvh;display:flex;flex-direction:column;}
  #topbar{display:flex;justify-content:space-between;align-items:center;padding:16px 26px;}
  #brand{font-weight:800;color:var(--teal-d);font-size:20px;letter-spacing:-.5px;}
  #brand b{color:var(--gold);}
  #right{display:flex;gap:16px;align-items:center;}
  #voiceToggle{background:none;border:none;color:var(--teal-d);font-weight:700;cursor:pointer;font-size:15px;}
  #timer{font-variant-numeric:tabular-nums;font-size:32px;font-weight:800;color:var(--teal-d);}
  #menu{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;padding:0 6vw;}
  #menuTitle{font-size:clamp(26px,4vw,46px);font-weight:800;color:var(--teal-d);text-align:center;}
  #menuSub{font-size:clamp(15px,1.8vw,20px);color:var(--charcoal);text-align:center;margin-top:-14px;}
  #cards{display:flex;flex-wrap:wrap;gap:18px;justify-content:center;max-width:1100px;}
  .card{background:#fff;border:2px solid #e6efef;border-left:8px solid var(--teal);border-radius:16px;padding:22px 24px;width:250px;cursor:pointer;transition:.15s;text-align:left;}
  .card:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,.08);}
  .card h3{font-size:22px;color:var(--teal-d);margin-bottom:6px;}
  .card .tag{display:inline-block;background:var(--cream);color:var(--gold);font-weight:700;font-size:12px;padding:3px 9px;border-radius:20px;margin-bottom:10px;}
  .card p{font-size:14px;color:var(--charcoal);line-height:1.45;}
  .card .src{font-size:11px;color:#9bb;margin-top:10px;}
  #player{flex:1;display:none;flex-direction:column;}
  #scene{flex:1;display:flex;align-items:center;justify-content:center;gap:4vw;padding:0 4vw;}
  #monkeyWrap{flex:0 0 28%;max-width:320px;}
  #ballWrap{flex:0 0 40%;display:flex;align-items:center;justify-content:center;height:58vh;position:relative;overflow:visible;}
  #ball{width:32vh;height:32vh;border-radius:50%;will-change:transform;}
  /* meditation: warm glow that spreads outward in rings */
  #ball.glow{background:radial-gradient(circle at 50% 50%,rgba(217,154,78,.95),rgba(217,154,78,.38) 45%,rgba(31,138,138,.14) 70%,rgba(31,138,138,0) 80%);box-shadow:0 0 90px rgba(217,154,78,.55);animation:glowPulse 6s ease-in-out infinite;}
  @keyframes glowPulse{0%,100%{transform:scale(.9);}50%{transform:scale(1.08);}}
  .ripple{position:absolute;left:50%;top:50%;width:30vh;height:30vh;border-radius:50%;border:3px solid rgba(217,154,78,.45);transform:translate(-50%,-50%) scale(.35);animation:rippleOut 4s ease-out forwards;pointer-events:none;}
  @keyframes rippleOut{0%{transform:translate(-50%,-50%) scale(.35);opacity:.7;}100%{transform:translate(-50%,-50%) scale(2.6);opacity:0;}}
  .card.med{border-left-color:var(--gold);}
  .card.chair{border-left-color:#3fa34d;}
  .card.sel{border-left-color:#7d6bb8;}
  .card.cls{border-left-color:#c9704f;}
  /* ---- desk demo: Hanuman seated at a school desk, performing each cue ---- */
  #deskWrap{display:none;flex:0 0 52%;max-width:460px;align-items:center;justify-content:center;height:58vh;}
  #deskWrap svg{width:100%;height:100%;max-height:56vh;}
  #deskSvg #dmUpper,#deskSvg .armL,#deskSvg .armR,#deskSvg #dmFeet,#deskSvg .lid{transition:transform 1.4s ease-in-out;transform-box:fill-box;}
  #deskSvg #dmUpper{transform-origin:50% 100%;}
  #deskSvg .armL,#deskSvg .armR{transform-origin:50% 8%;}
  #deskSvg .lid{transform:translateY(-11px);}
  #deskSvg[data-pose="tall"] #dmUpper{transform:translateY(-7px);}
  #deskSvg[data-pose="feet"] #dmFeet{animation:feetTap 1.1s ease-in-out 3;}
  #deskSvg[data-pose="roll"] .armL{animation:rollA 1.5s ease-in-out 2;}
  #deskSvg[data-pose="roll"] .armR{animation:rollB 1.5s ease-in-out 2;}
  #deskSvg[data-pose="hands"] .armL,#deskSvg[data-pose="hands"] .armR{animation:settleDown .9s ease-out 1;}
  #deskSvg[data-pose="soft"] .lid{transform:translateY(-4px);}
  #deskSvg[data-pose="soft"] #dmUpper{transform:translateY(-6px);}
  #deskSvg[data-pose="inhale"] #dmUpper{transform:translateY(-10px) scale(1.035);transition-duration:3s;}
  #deskSvg[data-pose="exhale"] #dmUpper{transform:translateY(-5px) scale(1);transition-duration:4s;}
  #deskSvg[data-pose="steady"] #dmUpper{transform:translateY(-5px);}
  #deskSvg[data-pose="breathe"] #dmUpper{animation:deskBreath 8s ease-in-out 1 forwards;}
  @keyframes feetTap{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
  @keyframes rollA{0%,100%{transform:rotate(0deg);}30%{transform:rotate(-15deg) translateY(-4px);}65%{transform:rotate(7deg);}}
  @keyframes rollB{0%,100%{transform:rotate(0deg);}30%{transform:rotate(15deg) translateY(-4px);}65%{transform:rotate(-7deg);}}
  @keyframes settleDown{0%{transform:translateY(-9px);}100%{transform:translateY(0);}}
  @keyframes deskBreath{0%,100%{transform:translateY(-5px) scale(1);}45%{transform:translateY(-10px) scale(1.035);}}
  #deskSvg #dmHead{transition:transform 1.4s ease-in-out;transform-box:fill-box;transform-origin:50% 92%;}
  #deskSvg[data-pose="arch"] #dmUpper{transform:translateY(-7px) scale(1.02);}
  #deskSvg[data-pose="arch"] #dmHead{transform:rotate(-5deg) translateY(-3px);}
  #deskSvg[data-pose="arch"] .armL{transform:rotate(-7deg) translateY(-3px);}
  #deskSvg[data-pose="arch"] .armR{transform:rotate(7deg) translateY(-3px);}
  #deskSvg[data-pose="round"] #dmUpper{transform:translateY(4px) scale(.985);}
  #deskSvg[data-pose="round"] #dmHead{transform:rotate(6deg) translateY(8px);}
  #deskSvg[data-pose="round"] .armL{transform:rotate(8deg) translateY(3px);}
  #deskSvg[data-pose="round"] .armR{transform:rotate(-8deg) translateY(3px);}
  #deskSvg[data-pose="shake"] .armL{animation:shakeA .45s ease-in-out 6;}
  #deskSvg[data-pose="shake"] .armR{animation:shakeB .45s ease-in-out 6;}
  @keyframes shakeA{0%,100%{transform:rotate(-30deg) translateY(-6px);}50%{transform:rotate(-48deg) translateY(-10px);}}
  @keyframes shakeB{0%,100%{transform:rotate(30deg) translateY(-6px);}50%{transform:rotate(48deg) translateY(-10px);}}
  #deskSvg[data-pose="center"] #dmUpper{transform:translateY(-4px);}
  #deskSvg .pup{transition:transform 1.2s ease-in-out;transform-box:fill-box;}
  #deskSvg #dmFace{transition:transform 1.8s ease-in-out;transform-box:fill-box;}
  #deskSvg #dmReachR,#deskSvg #dmReachL{opacity:0;transition:opacity 1.6s ease-in-out;}
  #deskSvg .armL,#deskSvg .armR{transition:transform 1.4s ease-in-out,opacity 1.6s ease-in-out;}
  #deskSvg[data-pose="twistR"] #dmUpper{transform:scaleX(.86) rotate(3deg);transition-duration:2.2s;}
  #deskSvg[data-pose="twistR"] #dmHead{transform:translateX(11px) scaleX(.93);transition-duration:2.2s;}
  #deskSvg[data-pose="twistR"] #dmFace{transform:translateX(10px);transition-duration:2.2s;}
  #deskSvg[data-pose="twistR"] .pup{transform:translateX(5px);}
  #deskSvg[data-pose="twistR"] .armL{opacity:0;}
  #deskSvg[data-pose="twistR"] #dmReachR{opacity:1;}
  #deskSvg[data-pose="twistR"] .armR{transform:rotate(-42deg) translate(-6px,-4px);transition-duration:2.2s;}
  #deskSvg[data-pose="twistL"] #dmUpper{transform:scaleX(.86) rotate(-3deg);transition-duration:2.2s;}
  #deskSvg[data-pose="twistL"] #dmHead{transform:translateX(-11px) scaleX(.93);transition-duration:2.2s;}
  #deskSvg[data-pose="twistL"] #dmFace{transform:translateX(-10px);transition-duration:2.2s;}
  #deskSvg[data-pose="twistL"] .pup{transform:translateX(-5px);}
  #deskSvg[data-pose="twistL"] .armR{opacity:0;}
  #deskSvg[data-pose="twistL"] #dmReachL{opacity:1;}
  #deskSvg[data-pose="twistL"] .armL{transform:rotate(42deg) translate(6px,-4px);transition-duration:2.2s;}
  #deskSvg[data-pose="wings"] .armL{transform:rotate(-78deg) translateY(-4px);}
  #deskSvg[data-pose="wings"] .armR{transform:rotate(78deg) translateY(-4px);}
  #deskSvg #dmEagle,#deskSvg #dmEagle2{opacity:0;transition:opacity 1.4s ease-in-out,transform 1.4s ease-in-out;transform-box:fill-box;}
  #deskSvg[data-pose="wrap"] .armL,#deskSvg[data-pose="wrap"] .armR{opacity:0;}
  #deskSvg[data-pose="wrap"] #dmEagle{opacity:1;}
  #deskSvg[data-pose="wrapup"] .armL,#deskSvg[data-pose="wrapup"] .armR{opacity:0;}
  #deskSvg[data-pose="wrapup"] #dmEagle{opacity:1;transform:translateY(-10px);}
  #deskSvg[data-pose="wrapup"] #dmUpper{transform:translateY(-5px);}
  #deskSvg[data-pose="wrap2"] .armL,#deskSvg[data-pose="wrap2"] .armR{opacity:0;}
  #deskSvg[data-pose="wrap2"] #dmEagle2{opacity:1;}
  #deskSvg[data-pose="wrapup2"] .armL,#deskSvg[data-pose="wrapup2"] .armR{opacity:0;}
  #deskSvg[data-pose="wrapup2"] #dmEagle2{opacity:1;transform:translateY(-10px);}
  #deskSvg[data-pose="wrapup2"] #dmUpper{transform:translateY(-5px);}
  #deskSvg[data-pose="fold"] #dmUpper{transform:translateY(24px) scale(1,.84);transition-duration:2.6s;}
  #deskSvg[data-pose="fold"] #dmHead{transform:rotate(8deg) translateY(12px);transition-duration:2.6s;}
  #deskSvg[data-pose="fold"] .armL{transform:rotate(-14deg) translateY(10px);transition-duration:2.6s;}
  #deskSvg[data-pose="fold"] .armR{transform:rotate(14deg) translateY(10px);transition-duration:2.6s;}
  #deskSvg[data-pose="fold"] .lid{transform:translateY(-4px);}
  #deskSvg[data-pose="rollup"] #dmUpper{transform:translateY(-4px);transition-duration:4.5s;}
  #deskSvg[data-pose="rollup"] #dmHead{transform:none;transition-duration:5.5s;}
  #deskSvg[data-pose="rollup"] .armL,#deskSvg[data-pose="rollup"] .armR{transform:none;transition-duration:4.5s;}
  #deskSvg[data-pose="earR"] #dmHead{transform:rotate(15deg);transition-duration:2.4s;}
  #deskSvg[data-pose="earL"] #dmHead{transform:rotate(-15deg);transition-duration:2.4s;}
  #deskSvg[data-pose="chinDown"] #dmHead{transform:translateY(9px) rotate(0deg);transition-duration:2.4s;}
  #deskSvg[data-pose="chinSweepL"] #dmHead{animation:chinSweepL 6s ease-in-out 1 forwards;}
  @keyframes chinSweepL{0%{transform:rotate(15deg);}45%{transform:rotate(6deg) translateY(8px);}60%{transform:rotate(0deg) translateY(9px);}80%{transform:rotate(-8deg) translateY(5px);}100%{transform:rotate(-15deg);}}
  #deskSvg[data-pose="circle"] #dmHead{animation:neckCircle 11s ease-in-out 1 forwards;}
  @keyframes neckCircle{0%{transform:rotate(15deg);}25%{transform:rotate(6deg) translateY(8px);}45%{transform:rotate(-15deg);}65%{transform:rotate(-6deg) translateY(8px);}90%{transform:rotate(15deg);}100%{transform:rotate(0deg);}}
  #cuebar{text-align:center;padding:0 6vw 2vh;}
  #cue{font-size:clamp(24px,4vw,48px);font-weight:800;color:var(--charcoal);min-height:1.3em;line-height:1.25;}
  #sub{font-size:clamp(14px,1.7vw,21px);color:var(--teal-d);margin-top:8px;font-weight:600;min-height:1.2em;}
  #controls{display:flex;justify-content:center;gap:14px;padding-bottom:4vh;}
  .btn{border:none;border-radius:12px;padding:14px 28px;font-size:18px;font-weight:700;cursor:pointer;}
  .primary{background:var(--teal);color:#fff;}.primary:hover{background:var(--teal-d);}
  .ghost{background:transparent;color:var(--teal-d);border:2px solid var(--teal);}
  .hide{display:none !important;}
  /* phones: stack monkey above ball, shrink, keep controls on screen */
  @media (max-width:640px){
    #topbar{padding:12px 16px;}
    #brand{font-size:17px;}
    #timer{font-size:26px;}
    #menu{gap:16px;padding:0 5vw;}
    #cards{gap:12px;}
    .card{width:min(300px,88vw);padding:18px 18px;}
    #scene{flex-direction:column;gap:2vh;padding:0 5vw;}
    #monkeyWrap{flex:0 0 auto;width:110px;max-width:110px;}
    #ballWrap{flex:0 0 auto;height:auto;}
    #deskWrap{flex:0 0 auto;height:auto;max-width:88vw;}
    #deskWrap svg{max-height:42vh;}
    #ball{width:46vw;height:46vw;}
    #cuebar{padding:0 5vw 1.5vh;}
    #controls{flex-wrap:wrap;padding-bottom:3vh;}
    .btn{padding:13px 22px;font-size:17px;}
  }
</style>
</head>
<body>
<div id="stage">
  <div id="topbar">
    <div id="brand">HudsonSeed · <b>Hanuman</b></div>
    <div id="right"><button id="voiceToggle">🔊 voice on</button><div id="timer">02:00</div></div>
  </div>

  <div id="menu">
    <div>
      <div id="menuTitle">Pick a reset for your class</div>
      <div id="menuSub">Tap one. Hanuman runs it on the board while you catch your breath.</div>
    </div>
    <div id="cards"></div>
  </div>

  <div id="player">
    <div id="scene">
      <div id="monkeyWrap">
        <svg viewBox="0 0 260 320" xmlns="http://www.w3.org/2000/svg" aria-label="Hanuman the monkey">
          <path d="M70 250 q-60 10 -55 -55 q3 -34 30 -30 q18 3 12 24 q-5 16 -16 10" fill="none" stroke="#136b6b" stroke-width="14" stroke-linecap="round"/>
          <ellipse cx="100" cy="300" rx="22" ry="16" fill="#136b6b"/>
          <ellipse cx="160" cy="300" rx="22" ry="16" fill="#136b6b"/>
          <ellipse cx="130" cy="235" rx="68" ry="62" fill="#1f8a8a"/>
          <ellipse cx="130" cy="245" rx="42" ry="44" fill="#FDF8F0"/>
          <path d="M70 215 q-34 -6 -40 24 q-4 18 16 20" fill="none" stroke="#1f8a8a" stroke-width="22" stroke-linecap="round"/>
          <path d="M192 210 q40 -20 46 -58" fill="none" stroke="#1f8a8a" stroke-width="22" stroke-linecap="round"/>
          <circle cx="130" cy="120" r="80" fill="#1f8a8a"/>
          <circle cx="58" cy="110" r="26" fill="#1f8a8a"/><circle cx="58" cy="110" r="13" fill="#D99A4E"/>
          <circle cx="202" cy="110" r="26" fill="#1f8a8a"/><circle cx="202" cy="110" r="13" fill="#D99A4E"/>
          <ellipse cx="130" cy="135" rx="58" ry="56" fill="#FDF8F0"/>
          <path d="M108 70 l10 16 l12 -20 l12 20 l10 -16" fill="none" stroke="#D99A4E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
          <ellipse cx="106" cy="128" rx="20" ry="23" fill="#fff" stroke="#136b6b" stroke-width="2"/>
          <ellipse cx="154" cy="128" rx="20" ry="23" fill="#fff" stroke="#136b6b" stroke-width="2"/>
          <g id="pL"><circle cx="106" cy="128" r="9" fill="#3fa34d"/><circle cx="109" cy="124" r="3" fill="#fff"/></g>
          <g id="pR"><circle cx="154" cy="128" r="9" fill="#3fa34d"/><circle cx="157" cy="124" r="3" fill="#fff"/></g>
          <ellipse cx="130" cy="165" rx="30" ry="22" fill="#FDF8F0"/>
          <ellipse cx="130" cy="154" rx="6" ry="4" fill="#3A3A3A"/>
          <path d="M114 176 q16 14 32 0" fill="none" stroke="#3A3A3A" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </div>
      <div id="ballWrap"><div id="ball"></div></div>
      <div id="deskWrap">
        <svg id="deskSvg" viewBox="0 0 320 340" xmlns="http://www.w3.org/2000/svg" aria-label="Hanuman seated at a school desk" data-pose="neutral">
          <line x1="20" y1="326" x2="300" y2="326" stroke="#e3d9c8" stroke-width="4" stroke-linecap="round"/>
          <rect x="127" y="272" width="18" height="46" rx="9" fill="#1f8a8a"/>
          <rect x="175" y="272" width="18" height="46" rx="9" fill="#1f8a8a"/>
          <g id="dmFeet">
            <ellipse cx="134" cy="320" rx="21" ry="10" fill="#136b6b"/>
            <ellipse cx="186" cy="320" rx="21" ry="10" fill="#136b6b"/>
          </g>
          <rect x="112" y="242" width="96" height="44" rx="20" fill="#1f8a8a"/>
          <path d="M212 226 q48 -4 42 -48 q-4 -26 -27 -21" fill="none" stroke="#1f8a8a" stroke-width="12" stroke-linecap="round"/>
          <g id="dmUpper">
            <ellipse cx="160" cy="222" rx="57" ry="48" fill="#1f8a8a"/>
            <ellipse cx="160" cy="230" rx="36" ry="34" fill="#FDF8F0"/>
            <g id="dmHead">
            <circle cx="160" cy="116" r="55" fill="#1f8a8a"/>
            <circle cx="102" cy="100" r="20" fill="#1f8a8a"/><circle cx="102" cy="100" r="10" fill="#D99A4E"/>
            <circle cx="218" cy="100" r="20" fill="#1f8a8a"/><circle cx="218" cy="100" r="10" fill="#D99A4E"/>
            <g id="dmFace">
            <ellipse cx="160" cy="128" rx="43" ry="41" fill="#FDF8F0"/>
            <path d="M141 82 l8 13 l11 -16 l11 16 l8 -13" fill="none" stroke="#D99A4E" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
            <ellipse cx="143" cy="122" rx="14" ry="16" fill="#fff" stroke="#136b6b" stroke-width="2"/>
            <ellipse cx="177" cy="122" rx="14" ry="16" fill="#fff" stroke="#136b6b" stroke-width="2"/>
            <g class="pup"><circle cx="143" cy="123" r="7" fill="#3fa34d"/><circle cx="145.5" cy="120" r="2.4" fill="#fff"/></g>
            <g class="pup"><circle cx="177" cy="123" r="7" fill="#3fa34d"/><circle cx="179.5" cy="120" r="2.4" fill="#fff"/></g>
            <rect class="lid" x="128" y="106" width="30" height="15" rx="7" fill="#FDF8F0"/>
            <rect class="lid" x="162" y="106" width="30" height="15" rx="7" fill="#FDF8F0"/>
            <ellipse cx="160" cy="148" rx="23" ry="16" fill="#FDF8F0"/>
            <ellipse cx="160" cy="142" rx="5" ry="3.5" fill="#3A3A3A"/>
            <path d="M148 154 q12 9 24 0" fill="none" stroke="#3A3A3A" stroke-width="3" stroke-linecap="round"/>
            </g>
            </g>
          </g>
          <rect x="74" y="228" width="172" height="14" rx="4" fill="#c99a66" stroke="#8a5a3b" stroke-width="2"/>
          <rect x="74" y="240" width="172" height="5" fill="#8a5a3b" opacity=".4"/>
          <rect x="84" y="245" width="9" height="78" rx="3" fill="#8a5a3b"/>
          <rect x="227" y="245" width="9" height="78" rx="3" fill="#8a5a3b"/>
          <g transform="translate(114,192)"><g class="armL">
            <path d="M0 -8 q-16 16 -9 32" fill="none" stroke="#1f8a8a" stroke-width="17" stroke-linecap="round"/>
            <circle cx="-6" cy="30" r="11" fill="#FDF8F0" stroke="#1f8a8a" stroke-width="2.5"/>
          </g></g>
          <g transform="translate(206,192)"><g class="armR">
            <path d="M0 -8 q16 16 9 32" fill="none" stroke="#1f8a8a" stroke-width="17" stroke-linecap="round"/>
            <circle cx="6" cy="30" r="11" fill="#FDF8F0" stroke="#1f8a8a" stroke-width="2.5"/>
          </g></g>
          <g id="dmReachR">
            <path d="M114 186 q58 14 94 32" fill="none" stroke="#1f8a8a" stroke-width="17" stroke-linecap="round"/>
            <circle cx="212" cy="221" r="11" fill="#FDF8F0" stroke="#1f8a8a" stroke-width="2.5"/>
          </g>
          <g id="dmReachL">
            <path d="M206 186 q-58 14 -94 32" fill="none" stroke="#1f8a8a" stroke-width="17" stroke-linecap="round"/>
            <circle cx="108" cy="221" r="11" fill="#FDF8F0" stroke="#1f8a8a" stroke-width="2.5"/>
          </g>
          <g id="dmEagle">
            <path d="M116 188 Q146 206 162 198 Q174 190 168 150" fill="none" stroke="#1f8a8a" stroke-width="17" stroke-linecap="round"/>
            <path d="M204 188 Q174 208 156 200 Q146 192 152 152" fill="none" stroke="#136b6b" stroke-width="17" stroke-linecap="round"/>
            <circle cx="167" cy="144" r="11" fill="#FDF8F0" stroke="#1f8a8a" stroke-width="2.5"/>
            <circle cx="153" cy="146" r="11" fill="#FDF8F0" stroke="#136b6b" stroke-width="2.5"/>
          </g>
          <g transform="translate(320,0) scale(-1,1)"><g id="dmEagle2">
            <path d="M116 188 Q146 206 162 198 Q174 190 168 150" fill="none" stroke="#1f8a8a" stroke-width="17" stroke-linecap="round"/>
            <path d="M204 188 Q174 208 156 200 Q146 192 152 152" fill="none" stroke="#136b6b" stroke-width="17" stroke-linecap="round"/>
            <circle cx="167" cy="144" r="11" fill="#FDF8F0" stroke="#1f8a8a" stroke-width="2.5"/>
            <circle cx="153" cy="146" r="11" fill="#FDF8F0" stroke="#136b6b" stroke-width="2.5"/>
          </g></g>
        </svg>

        {cue:"Treasure 2: a PERSON you're glad is in your life.",sub:"See their face.",say:"Treasure number two: think of a person you're glad is in your life. A friend, someone at home, a teacher. See their face.",hold:12},
        {cue:"Send them a quiet thank you.",sub:"They don't even have to know.",say:"Send them a quiet thank you in your head. They don't even have to know. It still counts.",hold:10},
        {cue:"Treasure 3: something about YOU.",sub:"Something you can do. Something you tried.",say:"Treasure number three, and this one's the hardest: something good about you. Something you can do. Something kind you did. Something you tried, even if it was hard.",hold:14},
        {cue:"That one counts double.",sub:"Being glad about yourself is a superpower.",say:"That one counts double. Being glad about yourself is a real superpower, and most people forget to practice it.",hold:11},
        {cue:"Three treasures. One breath.",sub:"They were there the whole time.",say:"Three treasures, and they were there the whole time. Take one more slow breath.",hold:10}
      ],
      close:"That's Gratitude Three. The more you hunt for good things, the better your brain gets at finding them." },
    { id:"kindwords", kind:"sel", demo:"desk", name:"Kind Words to Myself", tag:"SEL · Self-talk · 2 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Talk to yourself the way you'd talk to your best friend. Because you're with you all day.",
      intro:"Hey, I'm Hanuman. Quick question: would you ever say mean things to your best friend? No way. But sometimes we say mean things to ourselves. Let's practice being our own best friend instead.",
      lines:[
        {cue:"Hand on your heart.",sub:"One slow breath.",say:"Put a hand on your heart, and take one slow breath.",hold:9},
        {cue:"Think of a time something was hard today.",sub:"A mistake. A tough moment. It's okay.",say:"Think of a time something was hard today. Maybe a mistake, or a tough moment. It's okay. Everybody has them.",hold:11},
        {cue:"What would you say to your BEST FRIEND?",sub:"If it happened to them.",say:"Now imagine that exact same thing happened to your best friend. What would you say to them?",hold:11},
        {cue:"\"It's okay. Everybody makes mistakes.\"",sub:"You'd be kind. You'd mean it.",say:"You'd probably say: it's okay. Everybody makes mistakes. You're still awesome. And you'd mean it.",hold:11},
        {cue:"Now say it to YOURSELF.",sub:"Quietly, inside: \"It's okay. I'm still learning.\"",say:"Now turn those same words toward yourself. Quietly, inside, say: it's okay. I'm still learning.",hold:11},
        {cue:"\"I did my best today.\"",sub:"Say it inside.",say:"Say: I did my best today.",hold:8},
        {cue:"\"I'm allowed to keep trying.\"",sub:"",say:"I'm allowed to keep trying.",hold:8},
        {cue:"Notice how that feels.",sub:"Different from the mean voice, right?",say:"Notice how that feels. A little different from the mean voice, right? You get to choose which voice you practice.",hold:11},
        {cue:"You're with you all day.",sub:"Be a good friend to yourself.",say:"Here's the thing: you're the one person you're with all day, every day. So be a good friend to yourself.",hold:10}
      ],
      close:"That's Kind Words to Myself. Your inside voice is yours. Train it to be a friend." },
    { id:"pausebutton", kind:"sel", demo:"desk", name:"The Pause Button", tag:"SEL · Choices · 2 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Between something happening and what you do next, there's a magic space. Learn to find it.",
      intro:"Hey, I'm Hanuman. Did you know you have a pause button? It's true. When something happens, big feelings want you to act fast. But you have a button that gives you time to choose. Let's find it.",
      lines:[
        {cue:"Sit tall. Hands in your lap.",sub:"One slow breath.",say:"Sit tall, hands in your lap, and take one slow breath.",hold:9},
        {cue:"Think of a time you acted FAST.",sub:"Grabbed. Yelled. Pushed. It happens.",say:"Think of a time a big feeling made you act fast. Maybe you grabbed something, or yelled, or pushed. It happens to everyone.",hold:12},
        {cue:"Now find your pause button.",sub:"Press a finger into your palm.",say:"Now let's find your pause button. Press one finger gently into the palm of your other hand. That's it. That's your button.",hold:10},
        {cue:"Press it. Breathe in.",sub:"The pause starts.",say:"Press it, and breathe in. The pause has started.",hold:8},
        {cue:"Breathe out. Ask: what are my choices?",sub:"There's always more than one.",say:"Breathe out, and ask yourself: what are my choices? There is always more than one.",hold:11},
        {cue:"Choice 1: the fast thing.",sub:"What usually happens after?",say:"Choice one is the fast thing, the thing the big feeling wants. What usually happens after that one?",hold:11},
        {cue:"Choice 2: the wise thing.",sub:"Walk away. Use words. Ask for help.",say:"Choice two is the wise thing. Maybe walk away. Maybe use your words. Maybe ask a grown-up for help.",hold:11},
        {cue:"You get to pick.",sub:"That's your superpower.",say:"And here's the secret: you get to pick. Nobody can press your buttons but you. That's your superpower.",hold:11},
        {cue:"One more press. One more breath.",sub:"Your button is always with you.",say:"One more press on your pause button, and one more slow breath. Your button travels with you everywhere.",hold:10}
      ],
      close:"That's the Pause Button. Something happens, you press pause, you choose. The space between is where the wise thing lives." },
    { id:"theirshoes", kind:"sel", demo:"desk", name:"In Their Shoes", tag:"SEL · Empathy · 2 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"A two-minute imagination trip into how somebody else might be feeling.",
      intro:"Hi, I'm Hanuman. Every person you see today is carrying feelings you can't see. Let's practice a superpower called empathy. It means imagining what it's like to be somebody else, just for a minute.",
      lines:[
        {cue:"Close your eyes or look down soft.",sub:"One slow breath.",say:"Close your eyes, or just look down soft. One slow breath.",hold:9},
        {cue:"Picture someone from today.",sub:"A classmate. A teacher. Anyone.",say:"Picture someone you saw today. A classmate, a teacher, someone on your street. Anyone.",hold:11},
        {cue:"Look at their face in your mind.",sub:"What might they be feeling?",say:"Look at their face in your mind. What might they be feeling today? Happy? Tired? Worried? Excited?",hold:12},
        {cue:"Imagine ONE hard thing in their day.",sub:"Everyone has one.",say:"Now imagine one thing that might be hard in their day. Everyone has at least one hard thing, even people who look fine.",hold:12},
        {cue:"Imagine ONE good thing they're hoping for.",sub:"Everyone has one of those too.",say:"And imagine one good thing they might be hoping for. Everyone has one of those too.",hold:11},
        {cue:"Send them one kind wish.",sub:"Quietly, inside.",say:"Now, quietly inside, send them one kind wish. Maybe: I hope your day gets easier. Or: I hope you get the good thing.",hold:12},
        {cue:"Notice your own heart.",sub:"Empathy changes YOU too.",say:"Notice your own heart right now. A little softer? That's the thing about empathy. It changes you too.",hold:11},
        {cue:"Eyes back. Bring it with you.",sub:"Everyone is carrying something.",say:"Bring your eyes back, and bring this with you: everyone you meet is carrying something you can't see. Walk gently.",hold:11}
      ],
      close:"That's In Their Shoes. The more you practice imagining other people's feelings, the kinder and braver a friend you become." },
    { id:"listeninggame", kind:"sel", demo:"desk", name:"The Listening Game", tag:"SEL · Friendship · 2 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Whole-body listening: the skill that makes everyone want you on their team.",
      intro:"Hey, I'm Hanuman. Want to know the number one secret of great friends? They're great listeners. Listening isn't just ears. It's your whole body. Let's train it like a muscle, right now.",
      lines:[
        {cue:"Sit tall. This is listening posture.",sub:"Your body says: I'm here.",say:"Sit up tall. This is listening posture. Your body is already saying: I'm here, I'm ready.",hold:10},
        {cue:"Eyes: find one spot and rest them.",sub:"Eyes show you care.",say:"Now your eyes. Find one spot in the room and let your eyes rest there. When a friend talks, your eyes on them says: you matter.",hold:12},
        {cue:"Ears: catch THREE sounds right now.",sub:"Near. Far. Tiny.",say:"Now your ears. Catch three sounds happening right now. One near, one far, one tiny. Really hunt for them.",hold:13},
        {cue:"Mouth: rest position.",sub:"Listening means not talking. Tricky!",say:"Now the hardest part. Your mouth goes to rest position. Listening means not talking, even when you have something great to say. Tricky, right?",hold:12},
        {cue:"Heart: wonder about the other person.",sub:"\"What are they feeling?\"",say:"Last one: your heart. Great listeners wonder about the other person. What are they feeling? What do they need?",hold:12},
        {cue:"That's whole-body listening.",sub:"Eyes. Ears. Mouth. Heart.",say:"Put it together: eyes, ears, quiet mouth, curious heart. That's whole-body listening.",hold:10},
        {cue:"Try it on ONE person today.",sub:"Watch what happens.",say:"Here's your mission: try it on one person today. Really listen with your whole body. Watch what happens to their face.",hold:11}
      ],
      close:"That's the Listening Game. Everyone is fighting to be heard. The kid who really listens becomes everyone's favorite teammate." },
    { id:"cozyplace", kind:"sel", demo:"desk", name:"My Cozy Place", tag:"SEL · Calm · 2 min", audience:"PreK3-2nd", src:"HudsonSeed",
      blurb:"For the littlest ones: build an imaginary cozy place you can visit any time feelings get big.",
      intro:"Hi friends, I'm Hanuman. Today we're going to build something amazing, and it's invisible. It's your very own cozy place, inside your imagination. Once you build it, you can visit any time you want. Let's go.",
      lines:[
        {cue:"Close your eyes. Snuggle into your seat.",sub:"Like a bird in a nest.",say:"Close your eyes and snuggle into your seat, like a little bird in a nest.",hold:10},
        {cue:"Imagine the coziest place ever.",sub:"Real or made-up. Yours.",say:"Now imagine the coziest place ever. It can be real, like your bed, or totally made-up, like a cloud castle. It's yours.",hold:13},
        {cue:"What do you SEE there?",sub:"Colors. Soft things. Favorite things.",say:"Look around your cozy place. What do you see? What colors? What soft things? Maybe your favorite things are there.",hold:12},
        {cue:"What do you HEAR?",sub:"Quiet? Waves? A purring cat?",say:"What do you hear in your cozy place? Maybe it's quiet. Maybe there are waves, or rain on a roof, or a purring cat.",hold:12},
        {cue:"Who is with you?",sub:"A person. A pet. A stuffie. Or just you.",say:"Who is with you? Maybe someone you love, or a pet, or your favorite stuffie. Or maybe it's just you, safe and snug.",hold:12},
        {cue:"Take three cozy breaths there.",sub:"In... and out. Three times.",say:"Now take three slow, cozy breaths in your special place. In... and out. In... and out. In... and out.",hold:14},
        {cue:"Wave goodbye. You can come back!",sub:"Any time feelings get big.",say:"Wave goodbye to your cozy place for now. But remember: it's yours forever. Any time your feelings get too big, close your eyes and come back.",hold:12},
        {cue:"Eyes open. Cozy comes with you.",sub:"",say:"Open your eyes. And guess what? A little bit of that cozy feeling came back with you.",hold:9}
      ],
      close:"That's My Cozy Place. You built it, you own it, and no one can ever take it away. Visit often." },
    { id:"bodydetective", kind:"sel", demo:"desk", name:"Body Detective", tag:"SEL \u00b7 Self-awareness \u00b7 2 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Feelings leave clues in your body. Learn to find them before they get big.",
      intro:"Hey, I'm Hanuman. Here's a secret: feelings don't just live in your head. They leave clues all over your body. Today you're a detective, and the mystery is: what is my body telling me right now?",
      lines:[
        {cue:"Sit still. Detective mode on.",sub:"One slow breath.",say:"Sit very still, and take one slow breath. Detective mode: on.",hold:9},
        {cue:"Check your forehead and jaw.",sub:"Squeezed tight, or soft?",say:"First clue: your forehead and your jaw. Are they squeezed tight, or soft? Just notice. Don't change anything yet.",hold:11},
        {cue:"Check your shoulders.",sub:"Up by your ears, or resting?",say:"Next clue: your shoulders. Are they way up by your ears, or resting down? Shoulders up high can mean worry is visiting.",hold:11},
        {cue:"Check your belly.",sub:"Butterflies? A knot? Calm?",say:"Now your belly. Butterflies can mean nervous or excited. A tight knot can mean worried or mad. Calm and soft means calm and soft.",hold:12},
        {cue:"Check your hands.",sub:"Fists, fidgets, or still?",say:"Last clue: your hands. Are they making fists? Fidgeting? Or still? Hands tell the truth.",hold:10},
        {cue:"Put the clues together.",sub:"What feeling matches?",say:"Now, detective, put your clues together. What feeling matches what you found? Name it quietly inside.",hold:12},
        {cue:"Breathe into the tightest spot.",sub:"Send it one slow breath.",say:"Find the tightest spot you discovered, and send it one slow breath, like you're breathing right into it. Feel it loosen, even a little.",hold:12},
        {cue:"Case closed. You cracked it.",sub:"Check your clues any time.",say:"Case closed. The more you check your clues, the earlier you catch big feelings, while they're still small.",hold:10}
      ],
      close:"That's Body Detective. Your body always knows first. Learn its language and feelings can never sneak up on you." },
    { id:"volcanoplan", kind:"sel", demo:"desk", name:"The Volcano Plan", tag:"SEL \u00b7 Big feelings \u00b7 2 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Anger is a volcano. You can't stop it existing, but you can keep it from erupting on people.",
      intro:"Hi, I'm Hanuman. Let's talk about anger. Anger is not bad. Everyone has it, even me. But anger is like a volcano: if we don't have a plan, it erupts all over people we care about. Let's build your plan while you're calm, so it's ready when you're not.",
      lines:[
        {cue:"Think of your last volcano moment.",sub:"Hot face. Tight fists. Loud voice.",say:"Think of your last volcano moment. Hot face, tight fists, maybe a loud voice. Just remember it. You're safe now.",hold:12},
        {cue:"Step 1: NOTICE the rumble.",sub:"Volcanoes always warn you first.",say:"Step one of the plan: notice the rumble. Volcanoes always warn you first. Hot cheeks, fast heart, tight hands. That's the rumble.",hold:12},
        {cue:"Step 2: SPACE. Step back or turn away.",sub:"Lava needs room.",say:"Step two: make space. Step back, turn away, or ask to move. Lava needs room, and so do you.",hold:11},
        {cue:"Step 3: COOL the lava. Long breaths out.",sub:"Out-breaths are water on lava.",say:"Step three: cool the lava. Take long, slow breaths out. Out-breaths are like pouring water on lava. Try one now. Breathe out, long and slow.",hold:13},
        {cue:"Step 4: WORDS, not eruption.",sub:"\"I'm angry because...\"",say:"Step four: use words instead of an eruption. Say: I am angry because... and say why. Words let the pressure out slowly, without burning anyone.",hold:13},
        {cue:"Practice the rumble check now.",sub:"Cheeks. Heart. Hands.",say:"Let's practice the rumble check right now, while you're calm. Cheeks: cool. Heart: slow. Hands: soft. That's what calm feels like. Remember it.",hold:12},
        {cue:"Say the plan inside: Notice. Space. Cool. Words.",sub:"Four steps.",say:"Say the plan quietly inside: notice, space, cool, words. Four steps. That's the whole plan.",hold:11},
        {cue:"Your volcano. Your plan.",sub:"",say:"Anger will come back. That's okay. Next time it rumbles, you'll have the plan ready.",hold:9}
      ],
      close:"That's the Volcano Plan. Notice, space, cool, words. Feeling angry is allowed. Erupting on people is what we practice away." },
    { id:"worrybox", kind:"sel", demo:"desk", name:"The Worry Box", tag:"SEL \u00b7 Worry \u00b7 2 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Worries take up a lot of room. Learn to set them down so you can think and play.",
      intro:"Hey, I'm Hanuman. Do you ever have a worry that follows you around all day, like a heavy backpack you can't take off? Today we're going to build a worry box: a place to set worries down. Not to throw them away. Just to set them down for a while.",
      lines:[
        {cue:"One slow breath. Find today's worry.",sub:"Big or small. Any worry.",say:"Take one slow breath, and find a worry you're carrying today. It can be big or small. Any worry.",hold:12},
        {cue:"Give it a shape in your mind.",sub:"What color? How heavy?",say:"Now give that worry a shape in your imagination. What color is it? How heavy does it feel? Look at it, like it's a thing you're holding.",hold:12},
        {cue:"Build your worry box.",sub:"Any box. Any size. Strong lock.",say:"Now build your worry box. Any box you want: a treasure chest, a shoebox, a glowing safe. Give it a strong lock.",hold:12},
        {cue:"Say to the worry: \"Not right now.\"",sub:"Not never. Just not now.",say:"Now say to your worry: not right now. Not never. Just not right now. Worries hate that, but it's fair.",hold:11},
        {cue:"Place it in the box. Close the lid.",sub:"Gently. It's still yours.",say:"Place your worry gently in the box, and close the lid. It's still yours. It's just not riding on your back anymore.",hold:12},
        {cue:"Notice your shoulders now.",sub:"A little lighter?",say:"Notice your shoulders and your belly right now. A little lighter? Even a tiny bit counts.",hold:10},
        {cue:"Big worries need a grown-up.",sub:"Boxes are for carrying, not hiding.",say:"One important rule: if a worry is really big, or it keeps coming back, share it with a grown-up you trust. The box is for setting worries down, not for hiding them.",hold:13},
        {cue:"The box stays here. You go play.",sub:"",say:"Your worry box stays right where you built it. You can check on it later. For now, you're free to think, and learn, and play.",hold:10}
      ],
      close:"That's the Worry Box. You can't stop worries from visiting, but you decide when they get carried and when they get set down." },
    { id:"kindnessdetective", kind:"sel", demo:"desk", name:"Kindness Detective", tag:"SEL \u00b7 Noticing good \u00b7 2 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Kindness is happening all around you, quietly. Train your eyes to catch it.",
      intro:"Hi, I'm Hanuman. Here's something wild: kindness is happening around you all day long, but it's quiet, so most people miss it. Today you become a kindness detective. Your job: catch kindness in the act.",
      lines:[
        {cue:"One slow breath. Open your memory.",sub:"Rewind today.",say:"Take one slow breath, and rewind your day like a movie, back to this morning.",hold:10},
        {cue:"Find 1 kindness someone did for YOU.",sub:"Even tiny. A smile counts.",say:"First case: find one kind thing someone did for you today. Even tiny. Someone held a door. Someone smiled. Someone saved you a seat.",hold:13},
        {cue:"Find 1 kindness you SAW.",sub:"Between other people.",say:"Second case: find one kindness you saw happen between other people. Someone helping, sharing, waiting, cheering.",hold:12},
        {cue:"Find 1 kindness YOU did.",sub:"Detectives investigate themselves too.",say:"Third case: find one kind thing you did. Detectives investigate themselves too. Maybe you shared, listened, or let someone go first.",hold:13},
        {cue:"Can't find one? Plan one.",sub:"A kindness you'll do today.",say:"If you couldn't find one, no problem. Plan one instead: one kind thing you'll do before the day ends. Picture yourself doing it.",hold:12},
        {cue:"Notice how the hunting feels.",sub:"Your brain likes this game.",say:"Notice how it feels to hunt for kindness. Your brain actually gets better at seeing whatever it practices looking for.",hold:11},
        {cue:"Case files open all day.",sub:"Keep catching it.",say:"Your case files stay open all day. Keep catching kindness in the act. The more you spot, the more there seems to be.",hold:10}
      ],
      close:"That's Kindness Detective. A kid who hunts for kindness starts finding it everywhere, and starts making more of it too." },
    { id:"repairkit", kind:"sel", demo:"desk", name:"The Repair Kit", tag:"SEL \u00b7 Friendship \u00b7 2 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Everyone breaks things sometimes: feelings, trust, friendships. Strong kids know how to repair.",
      intro:"Hey, I'm Hanuman. Everybody messes up. Everybody. We say something unkind, we grab, we leave someone out. The mess-up isn't the important part. The repair is. Let's pack your repair kit.",
      lines:[
        {cue:"Think of a time you hurt someone.",sub:"On purpose or by accident.",say:"Think of a time you hurt someone's feelings, on purpose or by accident. It's uncomfortable to remember. That's okay. That feeling means you care.",hold:13},
        {cue:"Tool 1: the honest look.",sub:"What did I actually do?",say:"Tool one in your kit: the honest look. Ask yourself: what did I actually do? Not what they did. Just your part.",hold:12},
        {cue:"Tool 2: the real sorry.",sub:"\"I'm sorry I ___.\"",say:"Tool two: the real sorry. A real sorry names the thing: I'm sorry I grabbed your pencil. I'm sorry I laughed. Not just a fast, empty sorry.",hold:13},
        {cue:"Tool 3: the listen.",sub:"Let them say how it felt.",say:"Tool three: the listen. After you say sorry, let them tell you how it felt, without arguing back. This is the hardest tool. It's also the strongest.",hold:13},
        {cue:"Tool 4: the do-different.",sub:"\"Next time I will ___.\"",say:"Tool four: the do-different. Say what you'll do next time: next time I'll ask first. Next time I'll wait. Repair means change, not just words.",hold:13},
        {cue:"Practice one inside, right now.",sub:"Pick your person. Say the real sorry.",say:"Practice quietly inside right now. Picture the person. Say the real sorry in your mind, with the thing named. Feel how brave that is.",hold:13},
        {cue:"Repair makes friendships STRONGER.",sub:"Like a bone that heals.",say:"Here's the amazing part: a friendship that gets repaired often grows back stronger, like a bone that heals. Mess-ups aren't the end. They're a chance to show who you are.",hold:12}
      ],
      close:"That's the Repair Kit. Honest look, real sorry, the listen, the do-different. Everyone breaks things. The strong ones repair." },
    { id:"askingforhelp", kind:"sel", demo:"desk", name:"Brave Enough to Ask", tag:"SEL \u00b7 Asking for help \u00b7 2 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Asking for help isn't weak. It's one of the bravest, smartest moves there is.",
      intro:"Hi, I'm Hanuman. Some kids think asking for help means you're not smart or not strong. Actually it's the opposite. Every hero has helpers. Every champion has a coach. Let's practice the bravest sentence there is.",
      lines:[
        {cue:"Think of something hard right now.",sub:"Schoolwork. A friend thing. A feeling.",say:"Think of something that's hard for you right now. Maybe schoolwork, maybe a friend thing, maybe a feeling that won't leave.",hold:12},
        {cue:"Notice the \"I should do it alone\" voice.",sub:"Lots of people have it.",say:"Notice if there's a voice saying: I should handle this alone. Lots of people have that voice. It sounds tough, but it usually makes things harder.",hold:12},
        {cue:"Pick your helper.",sub:"Who could actually help with THIS?",say:"Now pick your helper. Who could actually help with this thing? A teacher? A parent? A friend who's good at it? Picture their face.",hold:12},
        {cue:"Build the sentence: \"Can you help me with ___?\"",sub:"Name the thing.",say:"Build the brave sentence: can you help me with... and name the thing. Say it quietly inside, with your thing in the blank.",hold:12},
        {cue:"Practice it twice more.",sub:"Braver each time.",say:"Practice it twice more inside. Notice it gets a little easier each time. That's the brave muscle growing.",hold:11},
        {cue:"Helpers LIKE being asked.",sub:"Think how it feels when someone asks you.",say:"Here's a secret: helpers like being asked. Think about how it feels when a friend asks you for help. Pretty good, right? You're giving them that.",hold:12},
        {cue:"Your mission: ask for real today.",sub:"One ask. One helper.",say:"Your mission: sometime today, ask for real. One ask, one helper. That's it. The first ask is the hardest one you'll ever do.",hold:11}
      ],
      close:"That's Brave Enough to Ask. Strong people aren't the ones who never need help. They're the ones brave enough to ask for it." },
    { id:"theripple", kind:"sel", demo:"desk", name:"The Ripple", tag:"SEL \u00b7 Choices \u00b7 2 min", audience:"2nd-6th", src:"HudsonSeed",
      blurb:"Every choice is a stone dropped in water. Learn to see the ripples before you throw.",
      intro:"Hey, I'm Hanuman. Picture a still pond. Drop in one little stone, and rings spread out farther than you'd ever guess. Choices work exactly like that. Today we practice seeing the ripples before we throw the stone.",
      lines:[
        {cue:"Picture the still pond.",sub:"One slow breath.",say:"Close your eyes or look down soft. Picture a perfectly still pond. Take one slow breath.",hold:10},
        {cue:"Pick a choice you might make today.",sub:"Any real choice, big or small.",say:"Now pick a real choice you might face today. Joining a game or sitting out. Telling the truth or not. Being patient or snapping.",hold:13},
        {cue:"Drop it in. Watch ripple 1: YOU.",sub:"How do you feel right after?",say:"Drop that choice in the pond. First ripple: you. How do you feel one minute after making it? Proud? Relieved? Guilty? Watch honestly.",hold:13},
        {cue:"Ripple 2: the people nearby.",sub:"Friends. Classmates. Family.",say:"Second ripple: the people near you. How does your choice touch them? Someone feels included, or left out. Helped, or hurt.",hold:12},
        {cue:"Ripple 3: LATER.",sub:"Tomorrow. Next week.",say:"Third ripple: later. Tomorrow, next week. Some choices are gone by then. Some are still rippling. Which kind is yours?",hold:12},
        {cue:"Now try the OTHER choice.",sub:"Drop it in. Compare ripples.",say:"Now drop the other choice in the pond and watch its ripples. Compare. You just did something most grown-ups forget to do: you looked before you threw.",hold:13},
        {cue:"You're the stone thrower.",sub:"Ripples are yours to choose.",say:"Open your eyes. All day long you're the stone thrower. Small stones, big stones. The ripples are yours to choose.",hold:11}
      ],
      close:"That's the Ripple. You can't always see where every ring goes, but looking before you throw is what wise people do." },
    { id:"bravevoice", kind:"sel", demo:"desk", name:"My Brave Voice", tag:"SEL \u00b7 Speaking up \u00b7 2 min", audience:"2nd-6th", src:"HudsonSeed",
      blurb:"For the moments something isn't right: find the voice that's strong AND kind.",
      intro:"Hi, I'm Hanuman. Sometimes something happens that isn't right. Someone's unkind to you, or to somebody else. There's a voice inside you built exactly for those moments. It's not a mean voice, and it's not a silent voice. It's your brave voice. Let's warm it up.",
      lines:[
        {cue:"Stand tall inside. Feet grounded.",sub:"Brave starts in the body.",say:"Sit or stand tall, feet flat and grounded. Brave starts in the body, before any words come out.",hold:10},
        {cue:"Your brave voice is CALM and CLEAR.",sub:"Not yelling. Not whispering.",say:"Your brave voice is calm and clear. Not yelling, because yelling starts a fight. Not whispering, because whispers get ignored. Steady, like a mountain talking.",hold:13},
        {cue:"Practice line 1: \"Please stop.\"",sub:"Say it inside, steady.",say:"Practice line one, quietly inside, steady and strong: please stop.",hold:9},
        {cue:"Practice line 2: \"That's not okay.\"",sub:"For you, or for someone else.",say:"Line two: that's not okay. You can say it for yourself, or for someone else who needs backup.",hold:10},
        {cue:"Practice line 3: \"Come sit with us.\"",sub:"Brave isn't only stopping bad. It's starting good.",say:"Line three is my favorite: come sit with us. Because brave isn't only about stopping unkind things. It's about starting kind ones.",hold:12},
        {cue:"The backup rule: tell a trusted adult.",sub:"Brave voices ask for backup.",say:"And the backup rule: if something keeps happening, or feels too big, your brave voice's smartest move is telling a trusted adult. That's not tattling. That's protecting people.",hold:13},
        {cue:"Feel where your brave voice lives.",sub:"Chest? Belly? It's there.",say:"Take a breath and feel where your brave voice lives. Your chest? Your belly? It's in there, warmed up and ready.",hold:11}
      ],
      close:"That's My Brave Voice. Calm, clear, and kind. You won't need it every day. But the day you do, it'll be ready." },
    { id:"lettinggoleaf", kind:"sel", demo:"desk", name:"The Letting-Go Leaf", tag:"SEL \u00b7 Moving on \u00b7 2 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"For when one bad moment keeps replaying. Put it on a leaf and let the stream take it.",
      intro:"Hey, I'm Hanuman. You know when one bad moment gets stuck in your head and keeps replaying, like a song you can't turn off? Missed the goal, said the wrong thing, got a bad grade. Let's practice letting it float away.",
      lines:[
        {cue:"Find the stuck moment.",sub:"The one that keeps replaying.",say:"Take a slow breath, and find the moment that's been replaying in your head. You know the one.",hold:11},
        {cue:"Watch it ONE more time. Just once.",sub:"Then it's done playing.",say:"Watch it one more time in your mind, start to finish. Just once. After this, it's done playing.",hold:11},
        {cue:"Now picture a gentle stream.",sub:"Sunny. Slow. Leaves floating by.",say:"Now picture a gentle stream on a sunny day, moving slow, with big leaves floating by on the water.",hold:11},
        {cue:"Put the moment on a leaf.",sub:"Set it down gently.",say:"Take that stuck moment, and set it down gently on one of the leaves. It fits. It always fits.",hold:11},
        {cue:"Let the stream take it.",sub:"Watch it drift. Smaller... smaller...",say:"Now let the stream carry it. Watch the leaf drift away, getting smaller and smaller, around the bend.",hold:12},
        {cue:"If it floats back, that's normal.",sub:"Just put it on another leaf.",say:"Sometimes the moment floats back into your head. That's completely normal. Just put it on another leaf. There are always more leaves.",hold:12},
        {cue:"The moment is over. You're here.",sub:"Feet. Seat. Breath.",say:"Feel your feet, your seat, your breath. The moment is over. It happened, and it's done. You are here, now, and now is new.",hold:12}
      ],
      close:"That's the Letting-Go Leaf. Bad moments are visitors, not roommates. You've always got another leaf." },
    { id:"feelingsweather", kind:"sel", demo:"desk", name:"The Feelings Weather Report", tag:"SEL · Feelings · 2 min", audience:"PreK3-K", src:"HudsonSeed",
      blurb:"Check your inside weather: sunny, cloudy, stormy, foggy. Every weather is okay, and weather always changes.",
      intro:"Hey, I'm Hanuman. Did you know you have weather inside you? It's true. Sometimes it's sunny in there, sometimes it's stormy. Let's peek out your inside window and check today's weather.",
      lines:[
        {cue:"Sit tall like a mountain.",sub:"One slow breath.",say:"Sit tall like a mountain, and take one slow breath in... and out.",hold:9},
        {cue:"Peek inside. What's the weather?",sub:"Look out your inside window.",say:"Now peek inside yourself, like you're looking out a little window. What's the weather in there today?",hold:10},
        {cue:"Maybe it's SUNNY.",sub:"Warm. Smiley. Bouncy.",say:"Maybe it's sunny. Warm and smiley and bouncy, like you want to giggle.",hold:9},
        {cue:"Maybe it's CLOUDY.",sub:"A little gray. A little slow.",say:"Maybe it's cloudy. A little gray, a little slow, like a quiet day.",hold:9},
        {cue:"Maybe it's STORMY.",sub:"Thunder in your tummy.",say:"Maybe it's stormy. Thunder in your tummy, lightning in your legs. Storms happen to everyone.",hold:10},
        {cue:"Maybe it's FOGGY.",sub:"Sleepy. Mixed up. Hard to see.",say:"Or maybe it's foggy. Sleepy and mixed up, when you can't quite tell what you feel. Fog is a feeling too.",hold:10},
        {cue:"Point to your weather.",sub:"Sunny? Cloudy? Stormy? Foggy?",say:"Now point to your weather. Sunny? Cloudy? Stormy? Foggy? Whatever you picked, you got it right, because it's yours.",hold:11},
        {cue:"Weather always changes.",sub:"Storms pass. Sun comes back.",say:"And here's the best part: weather always changes. Storms pass. The sun always comes back.",hold:10},
        {cue:"One more breath, weather-checker.",sub:"",say:"Take one more slow breath. You just did your first weather report.",hold:9}
      ],
      close:"That's the Feelings Weather Report. Check your inside weather any time you like. Every weather is okay, and it always, always changes." },
    { id:"feelingfaces", kind:"sel", demo:"desk", name:"Feeling Faces", tag:"SEL · Feelings · 2 min", audience:"PreK3-K", src:"HudsonSeed",
      blurb:"Make a happy face, a sad face, a mad face. Feel how each one changes your whole body.",
      intro:"Hey, I'm Hanuman. Your face is like a little billboard for your feelings. Let's try some feeling faces together and see what each one does to your body. Ready? Warm up those cheeks.",
      lines:[
        {cue:"Make a HAPPY face.",sub:"Big smile. Bright eyes.",say:"First, make your biggest happy face. Huge smile, bright eyes. Feel your cheeks go up.",hold:10},
        {cue:"What does happy do to your body?",sub:"Light? Warm? Bouncy?",say:"Notice what that happy face does to your body. Does it feel light? Warm? A little bouncy?",hold:10},
        {cue:"Now a SAD face.",sub:"Mouth down. Shoulders droop.",say:"Now try a sad face. Let your mouth turn down, let your shoulders droop like a wilty flower.",hold:10},
        {cue:"Feel how sad is heavy.",sub:"Slow and droopy.",say:"Feel how sad is heavy and slow. That's how sad feels in real life too. Your body knows.",hold:10},
        {cue:"Now a MAD face.",sub:"Squeezy eyebrows. Tight jaw.",say:"Now a mad face. Squeeze your eyebrows together, make your jaw tight, grrr.",hold:10},
        {cue:"Feel how mad is tight.",sub:"Squeezed and hot.",say:"Feel how mad squeezes everything tight and hot. When you feel that squeeze on a real day, that's mad saying hello.",hold:11},
        {cue:"Now a SCARED face.",sub:"Big eyes. Little gasp.",say:"One more: a scared face. Big wide eyes, little gasp. Feel how scared makes your body freeze like a statue.",hold:10},
        {cue:"Now melt into a CALM face.",sub:"Soft eyes. Soft jaw. Slow breath.",say:"Now, the magic one. Melt everything into a calm face. Soft eyes, soft jaw, one slow breath. Ahh.",hold:11},
        {cue:"Your face can help your feelings.",sub:"Calm face, calmer body.",say:"Here's the secret: your face doesn't just show feelings, it can help change them. A calm face invites a calm body.",hold:10}
      ],
      close:"Those are Feeling Faces. Faces show feelings, and a soft calm face can help a big feeling settle down. Try it next time." },
    { id:"enginespeed", kind:"sel", demo:"desk", name:"My Engine Speed", tag:"SEL · Body check · 2 min", audience:"PreK3-K", src:"HudsonSeed",
      blurb:"Is your body engine running too fast, too slow, or just right? Check your speed, then shift it.",
      intro:"Hey, I'm Hanuman. Did you know your body has an engine? Sometimes it runs super fast, vroom vroom. Sometimes it runs slow, like a sleepy snail. Let's check your engine speed right now.",
      lines:[
        {cue:"Hands on your tummy.",sub:"Feel your engine.",say:"Put your hands on your tummy and sit still for a second. Your engine is in there, humming.",hold:9},
        {cue:"Is it running TOO FAST?",sub:"Wiggly legs. Racing thoughts. Vroom!",say:"Is your engine running too fast today? Wiggly legs, racing thoughts, like you might zoom out of your seat?",hold:10},
        {cue:"Is it running TOO SLOW?",sub:"Heavy eyes. Sleepy arms.",say:"Or is it running too slow? Heavy eyes, sleepy arms, like your batteries need charging?",hold:10},
        {cue:"Or is it JUST RIGHT?",sub:"Awake, calm, ready.",say:"Or is it just right? Awake and calm and ready, like a car waiting patiently at a green light?",hold:10},
        {cue:"Point: fast, slow, or just right.",sub:"Any answer is okay.",say:"Point to your answer: too fast, too slow, or just right. There's no wrong answer. Engines change all day.",hold:10},
        {cue:"Too fast? Three slow breaths.",sub:"Breathe out looong.",say:"If your engine is too fast, here's the trick: three slow breaths, with long, looong breath outs. Try one now. Feel it slow down?",hold:12},
        {cue:"Too slow? Wiggle and stretch!",sub:"Shake hands, reach up tall.",say:"If your engine is too slow, wiggle your hands, and reach up tall like you're picking apples. That wakes the engine up.",hold:11},
        {cue:"Just right? Say: 'I'm ready.'",sub:"",say:"And if your engine is just right, smile and say inside: I'm ready.",hold:8},
        {cue:"You're the driver.",sub:"You can check your speed any time.",say:"Remember: you're the driver of your engine. You can check your speed any time, and you know how to shift it.",hold:10}
      ],
      close:"That's My Engine Speed. Too fast, too slow, or just right, you're the driver, and drivers know how to shift." },
    { id:"feelingsthermometer", kind:"sel", demo:"desk", name:"The Feelings Thermometer", tag:"SEL · Feelings · 2 min", audience:"1st-3rd", src:"HudsonSeed",
      blurb:"Rate a feeling from 1 to 5, breathe, then rate it again. Discover you can move your own number.",
      intro:"Hey, I'm Hanuman. Feelings come in sizes. A little annoyed is not the same as super angry. Today we're using a feelings thermometer to measure a feeling, and then, watch this, we're going to change the number.",
      lines:[
        {cue:"Sit tall. One slow breath.",sub:"",say:"Sit tall and take one slow breath.",hold:8},
        {cue:"Find a feeling you have right now.",sub:"Any feeling. Big or small.",say:"Find a feeling you're having right now. Maybe excited, maybe tired, maybe a little worried. Any feeling works.",hold:11},
        {cue:"Picture a thermometer, 1 to 5.",sub:"1 = tiny. 5 = huge.",say:"Now picture a thermometer with numbers one to five. One means the feeling is tiny. Five means it's huge and taking up all the room.",hold:11},
        {cue:"What's your number right now?",sub:"Just notice. No wrong answers.",say:"What's your number right now? Just notice it. There are no wrong numbers on this thermometer.",hold:10},
        {cue:"Hold up that many fingers.",sub:"Quietly, by your lap.",say:"Hold up that many fingers, quietly, down by your lap. That's your starting number.",hold:9},
        {cue:"Now: three slow breaths.",sub:"In... and out. Nice and long.",say:"Now take three slow breaths with me. In... and out. In... and out. In... and out, nice and long.",hold:16},
        {cue:"Check the thermometer again.",sub:"Did the number move?",say:"Now check your thermometer again. Same feeling. What's the number now? Did it move, even a little bit?",hold:11},
        {cue:"YOU moved the number.",sub:"Noticing + breathing = the tool.",say:"If it moved, you did that. Just noticing a feeling and breathing can shrink it. And if it didn't move yet, that's okay. Thermometers take practice.",hold:12},
        {cue:"One more breath. Well measured.",sub:"",say:"One more slow breath. Nice work, feeling scientist.",hold:8}
      ],
      close:"That's the Feelings Thermometer. Measure the feeling, breathe, measure again. The number is yours to move." },
    { id:"twofeelings", kind:"sel", demo:"desk", name:"Two Feelings at Once", tag:"SEL · Feelings · 2 min", audience:"1st-3rd", src:"HudsonSeed",
      blurb:"Excited AND nervous. Happy AND missing someone. You can hold two feelings at the same time.",
      intro:"Hey, I'm Hanuman. Here's something most people don't know: you can have two feelings at the exact same time. Excited AND nervous. Happy AND a little sad. It's not weird, it's normal. Let's practice holding both.",
      lines:[
        {cue:"Sit tall. Hands open in your lap.",sub:"Palms up, like two little bowls.",say:"Sit tall, and put your hands in your lap with your palms up, like two little bowls.",hold:9},
        {cue:"Think of a time you felt TWO things.",sub:"First day of school? A sleepover? A big game?",say:"Think of a time you felt two things at once. Like the first day of school: excited AND nervous. Or a sleepover: happy AND missing home.",hold:12},
        {cue:"Put feeling one in your LEFT hand.",sub:"Look at it. Name it.",say:"Take the first feeling, and imagine placing it in your left hand. Look at it. Name it quietly. Maybe: excited.",hold:11},
        {cue:"Put feeling two in your RIGHT hand.",sub:"Look at it. Name it.",say:"Now take the second feeling and place it in your right hand. Name that one too. Maybe: nervous.",hold:11},
        {cue:"Hold them BOTH.",sub:"You don't have to pick one.",say:"Now here's the trick: just hold them both. You don't have to pick. You don't have to throw one away. Both hands, both feelings.",hold:12},
        {cue:"Both can be true.",sub:"Excited AND nervous. Happy AND sad.",say:"Both feelings are true at the same time. You're big enough inside to hold two feelings. Actually, you're big enough to hold a lot more.",hold:11},
        {cue:"Take one slow breath around both.",sub:"Room for everything.",say:"Take one slow breath, and imagine the breath making room for both feelings, like a big cozy blanket over both hands.",hold:11},
        {cue:"Gently close your hands. They're safe.",sub:"",say:"Now gently close your hands. Your feelings are safe with you, both of them.",hold:9}
      ],
      close:"That's Two Feelings at Once. Mixed feelings aren't broken feelings. They're proof you have a big heart with lots of rooms." },
    { id:"strengthsbackpack", kind:"sel", demo:"desk", name:"My Strengths Backpack", tag:"SEL · Strengths · 2 min", audience:"1st-3rd", src:"HudsonSeed",
      blurb:"Pack three things you're genuinely good at into an invisible backpack, and carry them all day.",
      intro:"Hey, I'm Hanuman. You carry a backpack to school with books and snacks. But you also have an invisible backpack, and it carries your strengths, the things you're good at. Let's pack it together.",
      lines:[
        {cue:"Sit tall. Backpack time.",sub:"One slow breath.",say:"Sit tall and take one slow breath. Time to pack the invisible backpack.",hold:9},
        {cue:"Strength 1: something you can DO.",sub:"Draw? Run? Build? Read? Sing?",say:"Strength number one: something you can do. Maybe you draw, or run fast, or build amazing things, or read, or sing. Pick one.",hold:12},
        {cue:"Pack it. Zip. It's in there.",sub:"",say:"Got it? Pack it into your backpack. Zzzzip. It's in there now.",hold:8},
        {cue:"Strength 2: something KIND you do.",sub:"Sharing? Helping? Including?",say:"Strength number two: something kind you do. Maybe you share, or help clean up, or invite people to play. Kindness counts as a strength. A big one.",hold:12},
        {cue:"Pack it in. Zip.",sub:"",say:"Pack that one in too. Zzzzip.",hold:7},
        {cue:"Strength 3: something you keep TRYING.",sub:"Even when it's hard.",say:"Strength number three is the strongest one: something you keep trying, even when it's hard. Tying shoes. Math. Making friends. Trying IS a strength.",hold:12},
        {cue:"Pack it. Your bag is full.",sub:"Three real strengths.",say:"Pack it in. Your invisible backpack now has three real strengths, and they're all true, because you picked them.",hold:10},
        {cue:"Wear it all day.",sub:"It's always on your back.",say:"Now put the backpack on. Here's the thing: it's invisible, so you can wear it everywhere. When something gets hard today, remember what you're carrying.",hold:12},
        {cue:"One more breath, strong one.",sub:"",say:"One more slow breath. You came in strong, and now you know it.",hold:8}
      ],
      close:"That's My Strengths Backpack. Your strengths go where you go. When the day gets heavy, remember what you packed." },
    { id:"thoughttrain", kind:"sel", demo:"desk", name:"The Thought Train", tag:"SEL · Thoughts · 2 min", audience:"1st-3rd", src:"HudsonSeed",
      blurb:"Thoughts are trains pulling into the station. You can watch them pass without climbing aboard.",
      intro:"Hey, I'm Hanuman. Your mind is like a busy train station, and thoughts are the trains. Here's the secret nobody tells kids: you don't have to get on every train. Let's practice just watching them.",
      lines:[
        {cue:"Sit tall. You're at the station.",sub:"One slow breath.",say:"Sit tall and take one slow breath. Welcome to your train station.",hold:9},
        {cue:"Watch for the next thought-train.",sub:"It's coming. It always comes.",say:"Now just wait, and watch for the next thought that pulls in. Maybe it's about lunch. Maybe it's about recess. Here it comes.",hold:11},
        {cue:"See it? Give it a sign.",sub:"'Lunch train.' 'Worry train.' 'Silly train.'",say:"When a thought pulls in, give it a little sign, like trains have. Oh look: the lunch train. The worry train. The silly train.",hold:11},
        {cue:"Now DON'T get on.",sub:"Just wave. Let it roll through.",say:"Now here's the trick: don't climb aboard. You don't have to ride it. Just wave at it, and let it roll on through the station.",hold:11},
        {cue:"Another train will come. Watch it pass.",sub:"You're the station, not the train.",say:"Another train will come. That's fine. Watch it slow down, wave, and let it keep going. You're the station. Trains pass through you all day.",hold:12},
        {cue:"Did you get pulled onto one? Hop off.",sub:"It happens to everyone.",say:"Did you accidentally get pulled onto a train and ride it for a while? That happens to everyone, even grown-ups. Just notice, hop off, and come back to the station.",hold:12},
        {cue:"Feel the quiet between trains.",sub:"That calm? That's you.",say:"And notice: between trains, the station is quiet. That quiet is always there, under all the trains. That's you.",hold:11},
        {cue:"One more breath at the station.",sub:"",say:"One more slow breath, station master. You just learned something huge.",hold:9}
      ],
      close:"That's the Thought Train. Thoughts come and go all day. You get to choose which ones you ride." },
    { id:"triggermap", kind:"sel", demo:"desk", name:"Trigger Map", tag:"SEL · Self-awareness · 2 min", audience:"4th-6th", src:"HudsonSeed",
      blurb:"Map the situations that reliably light your fuse. Knowing your buttons is the first step to owning them.",
      intro:"Hey, I'm Hanuman. Everyone has buttons, things that reliably set off their big feelings. Being cut in line. Losing a game. A certain tone of voice. Today, while you're calm, we're going to map yours. Because a button you know about loses its surprise attack.",
      lines:[
        {cue:"Sit tall. One slow breath.",sub:"Map-making needs a calm mapmaker.",say:"Sit tall and take one slow breath. Map-making works best when you're calm, which is exactly why we do this now.",hold:10},
        {cue:"Think: when did you last get BIG mad or upset?",sub:"Not the feeling. The situation.",say:"Think back to the last time a feeling got big fast. Not the feeling itself, the situation. What was happening right before?",hold:12},
        {cue:"That's trigger number one. Mark it.",sub:"'When someone ___, I go off.'",say:"That's trigger number one. Mark it on your map. Say it inside, like this: when someone cuts in line, I go off. When I lose, I go off. Just name yours.",hold:12},
        {cue:"Find one more. Mark trigger two.",sub:"A place? A time? A tone of voice?",say:"Now find one more. Maybe it's a place, a time of day, being hungry, being left out, a certain tone of voice. Mark trigger number two.",hold:12},
        {cue:"Look at your map. Two buttons, labeled.",sub:"Knowing them is power.",say:"Look at your map. Two buttons, labeled. That's real power, because now they can't sneak up on you the same way.",hold:11},
        {cue:"Plan the early-warning sign.",sub:"Hot face? Tight fists? Fast heart?",say:"Now, what happens in your body right when a trigger hits? Hot face? Tight fists? Fast heart? That's your early-warning alarm. Memorize it.",hold:12},
        {cue:"Rehearse the move: alarm → breath → space.",sub:"One breath buys you a choice.",say:"Rehearse the move right now: alarm goes off, you take one slow breath, you make a little space before you act. Practice that breath now.",hold:12},
        {cue:"Your buttons. Your map. Your move.",sub:"",say:"Your buttons aren't bad. Everybody has them. But now they're on YOUR map, which means you're in charge of the territory.",hold:10}
      ],
      close:"That's the Trigger Map. Know your buttons, know your alarm, and keep one breath between the trigger and you." },
    { id:"valuescompass", kind:"sel", demo:"desk", name:"The Values Compass", tag:"SEL · Values · 2 min", audience:"4th-6th", src:"HudsonSeed",
      blurb:"Pick the three things that matter most to you, then check one real choice against your compass.",
      intro:"Hey, I'm Hanuman. A compass tells you which way is north. People have compasses too, made of the things that matter most to them. Today you're going to find yours. It's been in your pocket this whole time.",
      lines:[
        {cue:"Sit tall. One slow breath.",sub:"",say:"Sit tall and take one slow breath.",hold:8},
        {cue:"Here are some values. Listen close.",sub:"Fairness. Courage. Kindness. Honesty. Loyalty. Fun. Family. Trying hard.",say:"Listen to this list, and notice which words tug at you: fairness. Courage. Kindness. Honesty. Loyalty. Fun. Family. Trying hard.",hold:13},
        {cue:"Pick your TOP THREE.",sub:"The three you'd defend.",say:"Now pick your top three. Not the ones a grown-up would pick for you. The three YOU would stand up for. Take your time.",hold:13},
        {cue:"That's your compass.",sub:"Three points. Yours.",say:"Those three things are your compass. When you're not sure what to do, they point your way.",hold:10},
        {cue:"Now test it. Think of one choice you made this week.",sub:"Any real choice.",say:"Let's test it. Think of one real choice you made this week. Big or small. Who you sat with. What you said. What you did when something was unfair.",hold:13},
        {cue:"Did that choice point NORTH?",sub:"Did it match your three?",say:"Hold that choice up to your compass. Did it point toward your three values, or away from them? Just notice. No trouble, no shame. Compasses are for learning.",hold:13},
        {cue:"If it matched: that's integrity.",sub:"Remember how that feels.",say:"If it matched, that feeling has a name: integrity. Doing what matters to you, even when nobody's watching. Remember how it feels.",hold:11},
        {cue:"If it didn't: now you know your north.",sub:"Next choice is a new chance.",say:"If it didn't match, that's useful too. Now you know which way north is, and the next choice is a brand new chance to walk toward it.",hold:11}
      ],
      close:"That's the Values Compass. Three things that matter most, in your pocket, every day. Check it before the big choices." },
    { id:"insidevoiceaudit", kind:"sel", demo:"desk", name:"Inside Voice Audit", tag:"SEL · Self-talk · 2 min", audience:"4th-6th", src:"HudsonSeed",
      blurb:"Listen to your own self-talk for one quiet minute. Is that voice a coach or a critic?",
      intro:"Hey, I'm Hanuman. There's a voice in your head that talks to you all day long. Most people never stop to actually listen to it. Today, we're doing an audit, which means we listen carefully and check: is that voice a coach, or a critic?",
      lines:[
        {cue:"Sit tall. Get quiet.",sub:"One slow breath.",say:"Sit tall, get quiet, and take one slow breath.",hold:9},
        {cue:"Now just listen inside.",sub:"What is the voice saying right now?",say:"Now just listen inside for a moment. What is your inside voice saying, right now? Maybe it's narrating. Maybe it's judging. Maybe it's quiet.",hold:12},
        {cue:"Think of a recent mistake.",sub:"Listen to what the voice says about it.",say:"Now think of a small mistake you made recently, and listen close. What does the voice say about it?",hold:11},
        {cue:"COACH voice: 'Good try. Adjust. Go again.'",sub:"Firm but on your side.",say:"A coach voice sounds like this: good try. Here's what to fix. Go again. A coach can be tough, but a coach is always on your team.",hold:12},
        {cue:"CRITIC voice: 'You always mess up.'",sub:"Words like ALWAYS and NEVER.",say:"A critic voice sounds like this: you always mess up. You'll never get it. Listen for the words always and never. That's the critic's favorite trick, and it's almost never true.",hold:13},
        {cue:"Which one did you hear?",sub:"Just notice. That's the audit.",say:"So, which did you hear today, coach or critic? Just notice. That noticing is the whole audit.",hold:10},
        {cue:"Caught a critic line? Re-say it as a coach.",sub:"'I messed up' → 'I'm still learning this.'",say:"If you caught a critic line, re-record it as a coach line right now. Instead of: I always mess up, try: I'm still learning this, and I'm going again.",hold:13},
        {cue:"You're the one holding the microphone.",sub:"Train the voice. It listens to you.",say:"Here's the big secret: that voice learns from what you practice. You're holding the microphone. Train it like a coach.",hold:11}
      ],
      close:"That's the Inside Voice Audit. Listen in once a day. Keep the coach, retrain the critic. It's your voice, after all." },
    { id:"maskcheck", kind:"sel", demo:"desk", name:"The Mask Check", tag:"SEL · Real feelings · 2 min", audience:"4th-6th", src:"HudsonSeed",
      blurb:"Sometimes your outside face doesn't match your inside feeling. Notice the mask, and know when it's safe to take it off.",
      intro:"Hey, I'm Hanuman. Sometimes we wear a mask. Not a Halloween mask, a feelings mask. Smiling on the outside while something hurts on the inside. Everybody does it sometimes. Today we just check: is my outside matching my inside?",
      lines:[
        {cue:"Sit tall. One slow breath.",sub:"",say:"Sit tall and take one slow breath.",hold:8},
        {cue:"Check your OUTSIDE.",sub:"What does your face show right now?",say:"First, check your outside. If someone looked at your face right now, what feeling would they guess?",hold:10},
        {cue:"Now check your INSIDE.",sub:"What's actually in there?",say:"Now check your inside. What are you actually feeling in there? Take a real look. Be honest with yourself. Nobody else can hear this.",hold:12},
        {cue:"Do they match?",sub:"Same feeling inside and out?",say:"Now compare. Does your outside match your inside? Sometimes it does. And sometimes we're wearing a mask, showing okay when we feel not-okay.",hold:12},
        {cue:"Masks aren't bad.",sub:"Sometimes they protect us.",say:"First, know this: masks aren't bad. Sometimes a mask gets you through a hard moment, and that's okay. Everyone wears one sometimes.",hold:11},
        {cue:"But masks get heavy.",sub:"Wearing one all day is exhausting.",say:"But wearing a mask all day, every day, gets heavy. Feelings that stay hidden don't shrink. They wait.",hold:10},
        {cue:"Find your safe person.",sub:"Someone you can be REAL with.",say:"So find your safe person. Someone you can show your real inside to. A friend, someone at home, a teacher, a counselor. Picture their face right now.",hold:12},
        {cue:"With them, let the mask down.",sub:"'Actually, I'm having a hard day.'",say:"With that person, you can let the mask down and say the real thing: actually, I'm having a hard day. That's not weakness. That's one of the bravest sentences there is.",hold:13},
        {cue:"And if the inside feeling is big or scary: tell a trusted adult.",sub:"Big hidden feelings need a grown-up.",say:"And listen: if what's behind the mask ever feels really big, really sad, or scary, that's a job for a trusted adult. Telling them is always the right move.",hold:12}
      ],
      close:"That's the Mask Check. Check your match once a day, and keep one safe person who gets to see the real you." },
    { id:"proudreplay", kind:"sel", demo:"desk", name:"Proud Moment Replay", tag:"SEL · Strengths · 2 min", audience:"4th-6th", src:"HudsonSeed",
      blurb:"Replay a moment you were proud of, in slow motion. Find the strength that made it happen. It's still yours.",
      intro:"Hey, I'm Hanuman. Sports players watch replays of their best moments to learn what worked. Today, you're the highlight reel. We're going to replay one moment you were proud of, in slow motion, and find the strength hiding inside it.",
      lines:[
        {cue:"Sit tall. One slow breath.",sub:"Cue the replay screen.",say:"Sit tall, take one slow breath, and picture a big screen in your mind. Cue the replay.",hold:10},
        {cue:"Find one PROUD moment.",sub:"Big or small. Yours.",say:"Find one moment you felt proud of yourself. It can be big, like a performance, or small, like helping someone when nobody asked. Small ones count double.",hold:13},
        {cue:"Press play... in SLOW MOTION.",sub:"Watch it frame by frame.",say:"Now press play, in slow motion. Watch it happen, frame by frame. Where were you? What did you do first? Then what?",hold:13},
        {cue:"Pause at the KEY moment.",sub:"The exact second you did the thing.",say:"Pause right at the key moment, the exact second you did the thing. Freeze the frame. Look at yourself there.",hold:11},
        {cue:"Name the strength in the frame.",sub:"Courage? Kindness? Grit? Focus?",say:"Now name the strength you see in that frame. Was it courage? Kindness? Grit? Focus? Patience? Give it a real name.",hold:12},
        {cue:"That strength isn't in the past.",sub:"It's standing in your shoes right now.",say:"Here's the part people miss: that strength isn't back there in the memory. It's in you, right now, sitting in your seat. Strengths don't expire.",hold:12},
        {cue:"Save the replay.",sub:"Title it. Keep it close.",say:"Save this replay and give it a title, like: the day I spoke up, or, the day I didn't give up. File it where you can find it fast.",hold:11},
        {cue:"Play it before hard things.",sub:"Your own highlight reel.",say:"Next time something hard is coming, a test, a tryout, a tough talk, play your highlight first. It's proof of what you've got.",hold:11}
      ],
      close:"That's Proud Moment Replay. You have real evidence of your own strength. Watch the tape whenever you forget." },
    { id:"turtletime", kind:"sel", demo:"desk", name:"Turtle Time", tag:"SEL · Calm down · 2 min", audience:"PreK3-K", src:"HudsonSeed",
