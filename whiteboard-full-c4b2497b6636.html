      blurb:"Sizing the problem before reacting: is this a little-deal problem or a big-deal problem?",
      intro:"Hi, I'm Hanuman. Problems come in sizes, just like shoes! Some are little-deal problems, and some are big-deal problems. Knowing the size helps you pick the right size reaction. Let's practice measuring.",
      lines:[
        {cue:"Sit tall. Hands ready to measure.",sub:"Little hands close, big arms wide!",say:"Sit tall and get your measuring hands ready. Hands close together means little deal. Arms stretched wide means big deal.",hold:10},
        {cue:"Measure: you wanted the blue cup, got the red one.",sub:"Show me the size!",say:"Measure this one: you wanted the blue cup, but you got the red cup. Show me with your hands: big deal or little deal? Little deal! Hands close together.",hold:12},
        {cue:"Little deals get little reactions.",sub:"A shrug. An \"oh well.\" Move on.",say:"Little deals get little reactions: a shrug, an oh-well, and we move on. The red cup still holds juice!",hold:10},
        {cue:"Measure: someone is hurt and crying.",sub:"Show me the size!",say:"Now measure this: someone falls down and is really hurt and crying. Show me: big deal or little deal? Big deal! Arms wide!",hold:11},
        {cue:"Big deals get GROWN-UP help.",sub:"Fast feet, find a grown-up!",say:"Big deals get big reactions: fast feet, find a grown-up, right away. Hurt bodies, scary things, big danger: those are always grown-up jobs.",hold:12},
        {cue:"Measure: your tower fell down.",sub:"Show me!",say:"One more: your block tower fell down. Show me the size. Little deal! It feels sad for a second... but you can build it again, even taller!",hold:12},
        {cue:"The trick: measure BEFORE you react.",sub:"Size the problem, then size the reaction.",say:"Here's the trick: measure before you react. A big cry over a little deal is like wearing giant boots on tiny feet. Match the size!",hold:12},
        {cue:"One breath, measurers!",sub:"You know your sizes now.",say:"One nice breath, my measurers. Now you know: little deals, little reactions. Big deals, get a grown-up. You've got the measuring hands!",hold:11}
      ],
      close:"That's Big Deal or Little Deal. Measure first, react second. Most problems are littler than they feel." },
    { id:"askfirst", kind:"sel", demo:"desk", name:"Ask First", tag:"SEL · Safety · 2 min", audience:"PreK3-K", src:"HudsonSeed",
      blurb:"The situations where checking with a grown-up comes before doing. Asking first is a smart-kid move.",
      intro:"Hi, I'm Hanuman. Some things are do-first things, like playing and coloring. But some things are ask-first things. Smart kids know the difference. Let's learn the ask-first list.",
      lines:[
        {cue:"Sit tall. Raise your asking hand!",sub:"That's your ask-first tool.",say:"Sit tall and raise your hand, nice and high. Look at that! That's your ask-first tool, and it's always attached.",hold:10},
        {cue:"Ask first: before going somewhere new.",sub:"Even just next door!",say:"Ask-first thing number one: going somewhere. Before you go anywhere, even next door, even the backyard, a grown-up needs to know. Ask first.",hold:12},
        {cue:"Ask first: before eating something you found.",sub:"Even if it looks yummy!",say:"Number two: eating something you found or someone gave you. Even if it looks super yummy. Grown-ups know which foods are safe for YOUR body. Ask first.",hold:12},
        {cue:"Ask first: before touching things that aren't yours.",sub:"Especially grown-up things.",say:"Number three: touching things that aren't yours, especially grown-up things like tools, medicines, or things that plug in. Ask first.",hold:11},
        {cue:"Ask first: when a stranger asks you to come with them.",sub:"ALWAYS check with YOUR grown-up first.",say:"And the biggest one: if anyone, even a friendly person, asks you to come with them or help them, you check with your grown-up first. Always. No matter what they say. That's the rule.",hold:13},
        {cue:"Why ask first? Because asking is SMART.",sub:"Not babyish. SMART.",say:"Now, some kids think asking first is babyish. Nope! Asking first is what smart, strong kids do. Even astronauts ask before they launch the rocket!",hold:12},
        {cue:"Practice the words: \"Can I ______?\"",sub:"Loud and proud!",say:"Practice your ask-first words: Can I go outside? Can I eat this? Can I use that? Easy words, and they keep you safe.",hold:11},
        {cue:"When in doubt, ask it out!",sub:"One more breath, smart kid.",say:"Here's your rhyme to remember: when in doubt, ask it out! One more breath, smart kid. Your asking hand is ready.",hold:10}
      ],
      close:"That's Ask First. Going, eating, touching, and going-with: those are ask-first things, every time. Smart kids ask." },
    { id:"tworoads", kind:"sel", demo:"desk", name:"The Two Roads", tag:"SEL · Choices · 2 min", audience:"1st-3rd", src:"HudsonSeed",
      blurb:"Before choosing, walk both roads in your mind all the way to their endings.",
      intro:"Hey, I'm Hanuman. Every choice is a fork with two roads. Most kids only look one step down each road. But choices make sense when you walk them ALL the way to the end. Let's practice mind-walking.",
      lines:[
        {cue:"Sit tall. One slow breath.",sub:"",say:"Sit tall and take one slow breath.",hold:8},
        {cue:"Here's the fork: your friend's test answers are RIGHT THERE.",sub:"Road 1: peek. Road 2: don't.",say:"Here's a fork in the road: you're stuck on a test, and your friend's paper is right there, easy to see. Road one: peek. Road two: don't peek. Let's walk both.",hold:13},
        {cue:"Walk Road 1: you peek.",sub:"First step: you get the answer.",say:"Walk road one. First step: you peek, you get the answer. Feels good for a second, right? But keep walking...",hold:11},
        {cue:"Keep walking Road 1...",sub:"Wobbly tummy. Maybe caught. And you still can't do the math.",say:"Next steps down road one: your tummy feels wobbly, because you know. Maybe the teacher saw. And here's the quiet one: next test, you STILL can't do that problem. The road ends in a swamp.",hold:14},
        {cue:"Now walk Road 2: you don't peek.",sub:"First step: it's HARDER.",say:"Now walk road two: you don't peek. First step, honestly? It's harder. You might get that one wrong. Real roads have bumpy starts sometimes.",hold:12},
        {cue:"Keep walking Road 2...",sub:"Clean tummy. Teacher helps. Next time you KNOW it.",say:"But keep walking: your tummy stays clean. The teacher sees what you don't know yet, and helps you. And next test? You actually know it. Road two ends on a hilltop.",hold:13},
        {cue:"Swamp or hilltop. NOW choose.",sub:"Walking first makes choosing easy.",say:"See what happened? When you walk both roads to the END, the choice almost makes itself. Swamp... or hilltop.",hold:11},
        {cue:"Use it on your next fork.",sub:"Walk both roads. All the way.",say:"Next time you hit a fork, any fork, pause and mind-walk both roads all the way to their endings. It takes ten seconds, and it makes you one of the wisest kids in the room.",hold:12}
      ],
      close:"That's The Two Roads. Every choice has two endings. Visit both before you pick which one you'll live in." },
    { id:"fairsharemath", kind:"sel", demo:"desk", name:"Fair Share Math", tag:"SEL · Fairness · 2 min", audience:"1st-3rd", src:"HudsonSeed",
      blurb:"What fair actually means when splitting, taking turns, and choosing teams. Fair isn't always identical.",
      intro:"Hey, I'm Hanuman. Everybody yells THAT'S NOT FAIR, but almost nobody stops to do the fair math. Here's the surprise: fair doesn't always mean exactly the same. Let's figure out what it DOES mean.",
      lines:[
        {cue:"Sit tall. One breath. Math brains on.",sub:"",say:"Sit tall, one slow breath, fair-math brains switched on.",hold:9},
        {cue:"Easy fair: 8 crackers, 2 kids.",sub:"Four and four. Done.",say:"Start easy: eight crackers, two kids. Fair math says four and four. Same snack, same split. That's fair-as-equal, and it works great for crackers.",hold:12},
        {cue:"Trickier: one kid didn't get a turn yesterday.",sub:"Who goes first today?",say:"Now trickier: choosing who goes first in the game. But wait: one kid never got a turn at ALL yesterday. Fair math says... they go first today. Not identical. But fair.",hold:13},
        {cue:"Fair sometimes means CATCHING UP.",sub:"Fair looks at the whole story.",say:"See the difference? Fair sometimes means catching up. Fair looks at the whole story, not just this minute.",hold:11},
        {cue:"Trickiest: a kid who needs extra help gets extra help.",sub:"Glasses aren't unfair. Neither is help.",say:"Trickiest one: a kid in class gets extra help, or extra time. Is that unfair? Think of it this way: some kids wear glasses to see the board. Extra help is just glasses for something else. Fair means everyone gets what they NEED to play.",hold:15},
        {cue:"So the real fair math is:",sub:"Same when it's crackers. Catch-up when someone's behind. Needs when needs differ.",say:"So real fair math has three answers: equal splits for cracker stuff, catch-up turns for the left-out kid, and what-you-need help for different needs. All three are fair.",hold:13},
        {cue:"Before you yell \"not fair\", do the math.",sub:"Which kind of fair fits here?",say:"Next time NOT FAIR jumps into your mouth, pause and do the math first: which kind of fair fits here? Sometimes it really is unfair, and you should say so! But check first.",hold:13},
        {cue:"One breath, fair mathematician.",sub:"",say:"One slow breath, my fair mathematician. This math makes teams, games, and classrooms work.",hold:9}
      ],
      close:"That's Fair Share Math. Equal, catch-up, or what-you-need. Knowing which fair fits is real playground wisdom." },
    { id:"truthmuscle", kind:"sel", demo:"desk", name:"The Truth Muscle", tag:"SEL · Honesty · 2 min", audience:"1st-3rd", src:"HudsonSeed",
      blurb:"Honesty when a lie would be easier. The truth muscle gets stronger every time you use it while it's hard.",
      intro:"Hey, I'm Hanuman. Telling the truth when everything's fine is easy. The truth MUSCLE only grows in the hard moments, when a lie would be so much easier. Let's train it.",
      lines:[
        {cue:"Sit tall. Flex your arms!",sub:"Muscles grow with hard reps. So does truth.",say:"Sit tall and flex your arm muscles. Muscles only grow when the lifting is hard. Your truth muscle works exactly the same way.",hold:11},
        {cue:"The hard moment: you broke something.",sub:"Nobody saw. A lie would be SO easy.",say:"Here's the hard moment: you knocked something over and it broke. Nobody saw it happen. A lie is standing right there being easy: I don't know what happened.",hold:13},
        {cue:"Feel the fork: easy lie or heavy truth?",sub:"Your heart beats faster right here.",say:"Feel that fork in your chest? Heart beating a little faster? That exact feeling is the truth muscle's gym. This is where the rep happens.",hold:12},
        {cue:"The truth rep: \"I did it. It was an accident.\"",sub:"Seven words. Heaviest lift there is.",say:"The truth rep sounds like: I did it. It was an accident. I'm sorry. Short words, heavy lift. That's a maximum-weight rep right there.",hold:12},
        {cue:"Why lift it? Lies multiply.",sub:"One lie needs two more to guard it.",say:"Why lift the heavy truth? Because lies multiply. One lie needs two more lies to guard it, and soon you're carrying a whole backpack of them. The truth is heavy ONCE. Lies are heavy forever.",hold:14},
        {cue:"Truth + accident = trouble gets SMALLER.",sub:"Grown-ups go easier on honest kids. Really.",say:"And here's the secret kids don't believe until they try it: when you tell the truth about an accident, the trouble almost always gets smaller. Grown-ups go easier on honest kids. Really.",hold:13},
        {cue:"Every rep makes the next one easier.",sub:"Strong truth muscles = people TRUST you.",say:"Every truth rep makes the next one easier, and something amazing starts happening: people trust you. Trusted kids get believed, even in confusing moments. That's the prize.",hold:13},
        {cue:"One breath. Muscle flexed.",sub:"",say:"One slow breath, and pat that truth muscle. It's stronger than it was two minutes ago.",hold:9}
      ],
      close:"That's the Truth Muscle. Hard truths are heavy reps, and heavy reps are the only ones that make you strong." },
    { id:"whoseproblem", kind:"sel", demo:"desk", name:"Whose Problem Is It?", tag:"SEL · Sorting · 2 min", audience:"1st-3rd", src:"HudsonSeed",
      blurb:"Sorting: my problem, your problem, our problem. Each kind gets a different move.",
      intro:"Hey, I'm Hanuman. Problems are like mail: every single one is addressed to somebody. Some are addressed to you, some to other people, and some to the whole group. Delivering them right saves SO much drama. Let's sort the mail.",
      lines:[
        {cue:"Sit tall. One breath. Mail-sorting time.",sub:"Three piles: mine, yours, ours.",say:"Sit tall, one slow breath. We're sorting problem-mail into three piles: my problem, your problem, our problem.",hold:11},
        {cue:"Sort: you forgot your homework.",sub:"Whose pile?",say:"First letter: you forgot your homework at home. Whose pile? That one's addressed to... me. My problem. My move: tell the teacher honestly and make a plan to remember.",hold:13},
        {cue:"MY problems get MY action.",sub:"Own it, fix it, learn from it.",say:"My-problems get my action: own it, fix it, learn the lesson. Nobody else can do those reps for you.",hold:10},
        {cue:"Sort: your friend is mad at HER sister.",sub:"Whose pile?",say:"Next letter: your friend is upset because of a fight with her sister. Whose pile? That's her problem. Not yours to fix!",hold:11},
        {cue:"YOUR-problems get my SUPPORT, not my STEERING.",sub:"Listen. Care. Don't grab the wheel.",say:"Other people's problems get your support, not your steering. Listen. Say, that sounds hard. But don't grab their wheel: you can't drive their car, and trying usually crashes the friendship.",hold:13},
        {cue:"Sort: the game keeps ending in arguments.",sub:"Whose pile?",say:"Last letter: every recess, the same game keeps ending in arguments and nobody's having fun. Whose pile? That one's addressed to everybody: our problem.",hold:12},
        {cue:"OUR-problems get a TEAM move.",sub:"\"Can we make a rule together?\"",say:"Our-problems get team moves: hey, can we make a rule together so this stops happening? Group problems only die when the group fixes them.",hold:12},
        {cue:"Sort before you act!",sub:"Mine = act. Yours = support. Ours = team up.",say:"So before you jump into any problem, check the address. Mine? Act. Yours? Support. Ours? Team up. One breath, mail sorter. You just saved yourself a hundred headaches.",hold:13}
      ],
      close:"That's Whose Problem Is It. Check the address before you deliver your energy. Mine, yours, or ours: each gets its own move." },
    { id:"stopthinkdetective", kind:"sel", demo:"desk", name:"Stop and Think Detective", tag:"SEL · Wise choices · 2 min", audience:"1st-3rd", src:"HudsonSeed",
      blurb:"Gather clues before deciding. First feelings are loud but they're not always right.",
      intro:"Hey, I'm Hanuman. A good detective never arrests the first suspect just because the crowd is yelling. And a wise kid never lets the first loud feeling make the whole decision. Grab your magnifying glass. Detective training begins.",
      lines:[
        {cue:"Sit tall. Magnifying glass up!",sub:"Detective posture.",say:"Sit tall and hold up your imaginary magnifying glass. Detective posture: calm, curious, sharp-eyed.",hold:9},
        {cue:"The case: your marker is GONE and Kai has one just like it.",sub:"First feeling shouts: HE TOOK IT!",say:"Here's your case: your favorite marker is gone, and Kai, across the room, is using one exactly like it. Your first feeling shouts: HE TOOK IT! Case closed!",hold:13},
        {cue:"STOP. First feelings are LOUD, not always RIGHT.",sub:"Detectives don't arrest on a shout.",say:"But stop. First feelings are loud, but loud isn't the same as right. Real detectives never close a case on a shout.",hold:11},
        {cue:"CLUE 1: Check your own stuff.",sub:"Desk? Backpack? Pocket? Floor?",say:"Gather clue one: check your own stuff first. Desk, backpack, pocket, under the chair. Half of all mysteries end right here.",hold:11},
        {cue:"CLUE 2: Look closer at the \"suspect.\"",sub:"Lots of markers look the same.",say:"Clue two: look closer through the glass. Is Kai's marker actually yours? Or do a million markers look exactly like that? Hmm.",hold:11},
        {cue:"CLUE 3: Ask a QUESTION, not an accusation.",sub:"\"Hey, did you see a green marker?\"",say:"Clue three, the detective's best tool: a calm question. Hey Kai, did you see a green marker anywhere? Questions open cases. Accusations start wars.",hold:12},
        {cue:"NOW decide, with clues.",sub:"Evidence first. Verdict second.",say:"Now, and only now, decide what to do, with clues instead of shouts. Evidence first, verdict second. That's the whole detective code.",hold:11},
        {cue:"One breath. Badge earned.",sub:"Stop. Clues. Then choose.",say:"One slow breath, detective. Your badge says: stop, gather clues, then choose. Wear it everywhere.",hold:10}
      ],
      close:"That's Stop and Think Detective. The first feeling gets a vote, but the clues get the verdict." },
    { id:"regrettest", kind:"sel", demo:"desk", name:"The Regret Test", tag:"SEL · Choices · 2 min", audience:"4th-6th", src:"HudsonSeed",
      blurb:"Will future-you be glad? Check the choice at ten minutes and ten days.",
      intro:"Hey, I'm Hanuman. You have a built-in choice-checker that most people never use: future-you. Today you learn the Regret Test: checking any choice with the you of ten minutes from now, and the you of ten days from now.",
      lines:[
        {cue:"Sit tall. One slow breath.",sub:"",say:"Sit tall and take one slow breath.",hold:8},
        {cue:"Pick a real choice you're facing.",sub:"Or use this one: skip practice to play games?",say:"Pick a real choice you're actually facing. Or borrow this one: you're thinking about skipping practice, or homework, to play games instead.",hold:12},
        {cue:"TEST 1: Ask TEN-MINUTE-YOU.",sub:"Right after the choice... glad or wincing?",say:"Test one: fast-forward ten minutes past the choice and ask that you: glad, or wincing? Ten-minute-you knows about the quick stuff: the fun, the sugar rush, the little guilt starting.",hold:13},
        {cue:"TEST 2: Ask TEN-DAY-YOU.",sub:"The wiser one. What do they see?",say:"Test two, the big one: fast-forward ten days. Ten-day-you is standing where the results live: the skill you didn't build, the grade that came back, or the rest you actually needed. Ask them: was it worth it?",hold:14},
        {cue:"The tests can DISAGREE.",sub:"Fun at 10 minutes. Regret at 10 days.",say:"Here's the interesting part: the two tests can disagree. Plenty of choices feel great at ten minutes and terrible at ten days. Those are the trap choices. The test exposes them.",hold:13},
        {cue:"When they disagree, trust TEN-DAY-YOU.",sub:"They're the one who has to live there.",say:"When the two of you disagree, trust ten-day-you. They're the one who has to live with it. Ten-minute-you just wants the cookie.",hold:11},
        {cue:"Sometimes fun WINS the test. That's allowed!",sub:"Rest, play, joy: ten-day-you approves plenty.",say:"And to be clear: sometimes the fun choice passes both tests! Rest, play, time with friends: ten-day-you approves of joy, as long as it isn't stealing from something bigger.",hold:12},
        {cue:"One breath. Run the test on one real choice today.",sub:"Ten minutes. Ten days. Then decide.",say:"One slow breath. Today, run the Regret Test on one real choice: ten minutes, ten days, then decide. Future-you is already grateful.",hold:11}
      ],
      close:"That's the Regret Test. Ten minutes tells you about the fun. Ten days tells you the truth." },
    { id:"peerpressureoff", kind:"sel", demo:"desk", name:"The Peer Pressure Off-Switch", tag:"SEL · Choices · 2 min", audience:"4th-6th", src:"HudsonSeed",
      blurb:"Deciding for yourself when everyone is pushing: whose voice is actually choosing right now?",
      intro:"Hey, I'm Hanuman. When a group is pushing you: come on, everyone's doing it, don't be scared, something sneaky happens: their voices get inside your head and start sounding like YOUR voice. Today you install the off-switch.",
      lines:[
        {cue:"Sit tall. One slow breath.",sub:"",say:"Sit tall and take one slow breath.",hold:8},
        {cue:"Feel the push. Learn its sound.",sub:"\"Everyone's doing it.\" \"Don't be a baby.\" \"Just this once.\"",say:"First, learn the sound of the push: everyone's doing it. Don't be a baby. Just this once. Nobody will know. When you hear those phrases, the pressure machine is ON.",hold:13},
        {cue:"The off-switch is ONE question.",sub:"\"Whose voice is choosing right now?\"",say:"Here's the off-switch, one question, asked inside: whose voice is actually choosing right now? Mine... or theirs?",hold:11},
        {cue:"Run the check: would I do this ALONE?",sub:"No crowd, no audience. Would I?",say:"Run the alone-check: if nobody were watching, no crowd, no audience, would I do this? If the answer is no, then it was never your choice. It was theirs, wearing your sneakers.",hold:13},
        {cue:"Body check: gut tight? Chest buzzy?",sub:"Your body votes early and honestly.",say:"Check your body too. Tight gut? Buzzy chest? Feet wanting to leave? Your body votes on choices before your brain finishes, and it's an honest voter.",hold:12},
        {cue:"Off-switch phrases: short, no drama.",sub:"\"Nah, I'm good.\" \"Not my thing.\" Repeat if needed.",say:"When the switch flips, you need words. Keep them short and boring: nah, I'm good. Not my thing. No speech, no apology. Boring phrases are hard to argue with. Repeat as needed.",hold:13},
        {cue:"If the pressure is about something DANGEROUS...",sub:"...leave AND tell a trusted adult. That's strength.",say:"And listen: if the push is toward something dangerous, to your body, to someone else, to your future, leave, and tell a trusted adult. That's not snitching. That's you being the strongest person in the story.",hold:14},
        {cue:"One breath. Switch installed.",sub:"Your feet, your voice, your choice.",say:"One slow breath. The off-switch is installed: whose voice is choosing? Make sure the answer, every time, is yours.",hold:11}
      ],
      close:"That's the Peer Pressure Off-Switch. Crowds are loud, but they don't live your life. You do." },
    { id:"digitalpause", kind:"sel", demo:"desk", name:"The Digital Pause", tag:"SEL · Online choices · 2 min", audience:"4th-6th", src:"HudsonSeed",
      blurb:"Before you post, send, or forward: would you say it to their face, and does it stay forever?",
      intro:"Hey, I'm Hanuman. Online, your thumbs can move faster than your wisdom. One tap and a message is out there, and here's the thing about out there: there's no eraser. Today we install the two-second Digital Pause.",
      lines:[
        {cue:"Sit tall. Thumbs up... now FREEZE them.",sub:"That freeze is the whole skill.",say:"Sit tall, thumbs up like you're about to type... and freeze. That tiny freeze, right before sending, is the whole skill we're training.",hold:11},
        {cue:"PAUSE QUESTION 1: Would I say this to their FACE?",sub:"Eyes to eyes. Would the words survive?",say:"Pause question one: would I say this to their face? Eyes to eyes, one step away. Screens make mean feel easy because you can't see the landing. If the words wouldn't survive face-to-face, they don't get sent.",hold:14},
        {cue:"PAUSE QUESTION 2: Does this stay FOREVER?",sub:"Screenshots outlive deletes.",say:"Pause question two: does this stay forever? Spoiler: yes. Deletes don't beat screenshots. Every post is a tattoo, not a whiteboard. Would you ink THIS one?",hold:13},
        {cue:"The angry-message rule: write it, DON'T send it.",sub:"Wait. Re-read. It always looks different.",say:"Special rule for angry messages: you're allowed to write it. You're just not allowed to send it yet. Wait, even ten minutes, and re-read. Angry messages always look different after the lava cools.",hold:13},
        {cue:"Forwarding counts TOO.",sub:"Passing along a mean thing = choosing it.",say:"And forwarding counts too. Passing along someone else's mean post, embarrassing photo, or rumor is choosing it. The pause questions apply to everything your thumb touches.",hold:12},
        {cue:"See something cruel or scary online?",sub:"Don't reply. Save it. Tell a trusted adult.",say:"One more: if something online is cruel, or scary, or makes your stomach drop, about you or anyone, don't answer it. Tell a trusted adult and show them. Online problems are real problems, and you should never carry one alone.",hold:14},
        {cue:"One breath. Pause installed.",sub:"Face test. Forever test. Then tap.",say:"One slow breath. The Digital Pause is installed: face test, forever test, then, and only then, tap.",hold:10}
      ],
      close:"That's the Digital Pause. Two questions, two seconds. Your thumbs are fast, but now your wisdom is faster." },
    { id:"littlechoices", kind:"sel", demo:"desk", name:"Little Choices, Big Habits", tag:"SEL · Habits · 2 min", audience:"4th-6th", src:"HudsonSeed",
      blurb:"Repeated small choices quietly build who you are. Pick one small choice worth repeating.",
      intro:"Hey, I'm Hanuman. Nobody becomes a great reader, a great athlete, or a great friend in one big moment. It happens in tiny choices, repeated so many times they turn invisible. Today we make yours visible again.",
      lines:[
        {cue:"Sit tall. One slow breath.",sub:"",say:"Sit tall and take one slow breath.",hold:8},
        {cue:"A habit is a choice you've repeated until it drives itself.",sub:"Brushing teeth. Checking your phone. Saying \"thanks.\"",say:"Here's what a habit really is: a choice you repeated until it started driving itself. Brushing your teeth. Checking a screen first thing. Saying thanks. Nobody chooses those anymore. They just run.",hold:14},
        {cue:"Tiny choices are BRICKS.",sub:"One brick = nothing. A wall of them = who you are.",say:"Every tiny choice is a brick. One brick is nothing. But you lay hundreds a week, and one day you look up and the bricks have built something: your skills, your reputation, your character.",hold:13},
        {cue:"Find one brick you're ALREADY laying.",sub:"Something small you do every day. Good or bad. Just see it.",say:"Find one brick you're already laying every day without noticing. Reading before bed? Interrupting? Practicing shots? Giving up fast on homework? Don't judge it yet. Just see it.",hold:14},
        {cue:"Ask: what is this brick BUILDING?",sub:"Repeat it for a year... what exists?",say:"Now ask the big question: if I keep laying this brick every day for a year, what gets built? A stronger reader? A kid people can't trust with a secret? A better teammate? Bricks always build SOMETHING.",hold:14},
        {cue:"Now pick ONE small choice worth repeating.",sub:"So small you can't fail: 5 minutes, 1 kind word, 1 page.",say:"Now pick one small choice worth repeating on purpose. The trick: make it almost too small to fail. Five minutes of practice. One page. One kind word at lunch. Small bricks, laid daily, beat giant plans laid never.",hold:14},
        {cue:"Attach it to something you already do.",sub:"\"After I sit down at lunch, I will ___.\"",say:"Last trick: glue your new brick to a habit that already runs. After I sit down for lunch, I'll say one kind thing. After I get home, I'll read one page. The old habit carries the new one.",hold:13},
        {cue:"One breath. First brick is today.",sub:"",say:"One slow breath. Your first on-purpose brick gets laid today. A year from now, somebody's going to ask how you got so good.",hold:10}
      ],
      close:"That's Little Choices, Big Habits. You're always building something. Might as well choose the blueprint." },
    { id:"forkaftermistake", kind:"sel", demo:"desk", name:"The Fork After a Mistake", tag:"SEL · Owning it · 2 min", audience:"4th-6th", src:"HudsonSeed",
      blurb:"Own it or hide it: walk both roads to their endings. Owning is a hill; hiding is a hole.",
      intro:"Hey, I'm Hanuman. The mistake already happened. That part's over. But right after every mistake there's a fork with two roads: own it, or hide it. Everything that happens NEXT depends on which road you take. Let's walk both.",
      lines:[
        {cue:"Sit tall. One slow breath.",sub:"The mistake is behind you. The fork is in front.",say:"Sit tall, one slow breath. Picture it: the mistake is already behind you on the road. You can't unmake it. But the fork is right in front of you, and that part is one hundred percent yours.",hold:13},
        {cue:"Walk the HIDE road first.",sub:"Step one: relief. Nobody knows.",say:"Walk the hide road first. Step one feels like relief: nobody knows, nothing happens, you got away with it. The hide road always starts downhill and easy.",hold:12},
        {cue:"Keep walking the hide road...",sub:"Carrying the secret. Guarding the story. Waiting.",say:"Keep walking. Now you're carrying the secret everywhere. Guarding your story. A little jump every time the topic comes up. The hide road turns into a hole, and holes only go down.",hold:13},
        {cue:"And if it's found LATER...",sub:"Mistake + cover-up = double trouble.",say:"And if the truth surfaces later, and it usually does, you're no longer explaining one mistake. You're explaining a mistake AND a cover-up. Double weight, and the trust damage is way worse.",hold:13},
        {cue:"Now walk the OWN-IT road.",sub:"Step one is STEEP: \"That was me. I'm sorry.\"",say:"Now the own-it road. Step one is steep, no lie: saying, that was me. I messed up. I'm sorry. Your heart pounds. It's the hardest thirty seconds on either road.",hold:13},
        {cue:"But keep walking...",sub:"The weight DROPS. The fix begins. Respect grows.",say:"But keep walking: the secret's weight drops off your back instantly. The fixing can actually start. And here's what surprises everyone: people, teachers, parents, friends, respect the kid who owned it. Every time.",hold:14},
        {cue:"Hills end at the TOP. Holes don't.",sub:"Steep beats deep.",say:"See the shape of it? Owning is a hill: hard climb, but it ends at the top, lighter and taller. Hiding is a hole: easy first step, and then it just keeps going down. Steep beats deep.",hold:13},
        {cue:"One breath. Choose the hill.",sub:"Next mistake, you know the fork.",say:"One slow breath. Mistakes are guaranteed, for every human, forever. The fork after them is the real test. Choose the hill.",hold:11}
      ],
      close:"That's the Fork After a Mistake. You can't pick whether you'll mess up. You always pick what happens next." }
  ];

    { id:"thereset", kind:"class", demo:"desk", name:"The Reset", tag:"Class · 3 min", audience:"All ages", src:"HudsonSeed",

      intro:"Hey, I'm Hanuman. Sounds like it's been a big, loud, fast kind of moment. That's okay. We're going to bring all that energy back down together, in three minutes. First job: get in your seat and find the floor with your feet.",

        {cue:"Feet on the floor. Hands on your legs.",sub:"Everybody lands.",say:"Feet on the floor. Hands on your legs. Everybody lands.",hold:10,pose:"feet"},

        {cue:"And... freeze. Hands down.",sub:"Still as a statue.",say:"And... freeze. Hands down. Still as a statue.",hold:8,pose:"hands"},

  // ---- step-aware engine: a single breath = a 1-step run; a sequence = many steps ----
  var STEPS=[], stepStarts=[], stepIdx=-1, CURRENT=null;
  function buildSteps(item){
    STEPS=[]; stepStarts=[];
    if(item.steps){ var acc=0;
      item.steps.forEach(function(s){var b=breathById(s.breathId); if(b){STEPS.push({breath:b,dur:s.seconds});stepStarts.push(acc);acc+=s.seconds;}});
    } else { STEPS=[{breath:item,dur:item.duration}]; stepStarts=[0]; }
    return STEPS.reduce(function(a,s){return a+s.dur;},0);
  }
  function stepAt(t){var i=0;for(;i<STEPS.length;i++){if(t<stepStarts[i]+STEPS[i].dur)return i;}return STEPS.length-1;}

  function loop(now){
    var t=(now-startT)/1000, remain=Math.max(0,Math.ceil(TOTAL-t));
    timerEl.textContent="0"+Math.floor(remain/60)+":"+String(remain%60).padStart(2,"0");
    if(t>=TOTAL)return finish();
    var si=stepAt(t);
    if(si!==stepIdx){ stepIdx=si; ci=0; lastPhase=""; if(si>0){var br=BRIDGES[STEPS[si].breath.id]; if(br)say(br);} }
    var FLOW=STEPS[si].breath, localT=t-stepStarts[si];
    var ph=phaseAt(localT,FLOW.pattern); setBall(ph.p);
    if(ph.name!==lastPhase){
      lastPhase=ph.name;
      if(ph.name==="in"){var a=pair(FLOW.inhale);if(a){cue.textContent=a[0];sub.textContent=a[1];say(a[0]+" "+a[1]);}}
      else if(ph.name==="out"){var b=pair(FLOW.exhale);if(b){cue.textContent=b[0];sub.textContent=b[1];say(b[0]+" "+b[1]);}ci++;}
      else if(ph.name==="hold"&&FLOW.holdCue){cue.textContent=FLOW.holdCue[0];sub.textContent=FLOW.holdCue[1]||"";if(FLOW.holdCue[0])say(FLOW.holdCue[0]);}
      else if(ph.name==="rest"&&FLOW.restCue){cue.textContent=FLOW.restCue[0];sub.textContent=FLOW.restCue[1]||"";if(FLOW.restCue[0])say(FLOW.restCue[0]);}
    }
    raf=requestAnimationFrame(loop);
  }
  function finish(){running=false;cancelAnimationFrame(raf);setBall(0);timerEl.textContent="00:00";
    hsLog("complete",CURRENT,(Date.now()-hsT0)/1000);
    cue.textContent="Beautiful. The room is calm and ready.";
    sub.textContent="Say it with me: I am happy. I am safe. I am brave. I am strong. I am love.";
    say("Beautiful. The room is calm and ready. Say it with me if you'd like. I am happy. I am safe. I am brave. I am strong. I am love.");
    againBtn.classList.remove("hide");}

  // ---- anonymous usage metrics: write-only insert, silent failure, no personal data ----
  var HS_METRICS={url:"https://pebhikfbpgntedvbxqph.supabase.co/rest/v1/hanuman_events",key:"sb_publishable_7wnGQX91msxCwzq7QRqF1w_MWfgWCWT"};
  var hsClientId=(function(){try{var k="hs_cid",v=localStorage.getItem(k);if(!v){v="c"+Math.random().toString(36).slice(2,10)+Date.now().toString(36);localStorage.setItem(k,v);}return v;}catch(e){return "c"+Math.random().toString(36).slice(2,10);}})();
  var hsT0=0;
  function hsLog(ev,item,dur){
    try{
      var body=JSON.stringify({event:ev,tool_id:(item&&item.id)||null,tool_name:(item&&item.name)||"unknown",kind:(item&&item.kind)||"breath",category:(item&&item.tag)||null,duration_seconds:(dur!=null)?Math.round(dur):null,client_id:hsClientId});
      fetch(HS_METRICS.url,{method:"POST",keepalive:true,headers:{"apikey":HS_METRICS.key,"Authorization":"Bearer "+HS_METRICS.key,"Content-Type":"application/json","Prefer":"return=minimal"},body:body}).catch(function(){});
    }catch(e){}
  }

  function run(item){
    stopMed(); deskOn(false);
    CURRENT=item; running=true; audioUnlocked=true; if(!chosenVoice)pickVoice();
    hsT0=Date.now(); hsLog("start",item);
    TOTAL=buildSteps(item); stepIdx=-1; ci=0; lastPhase=""; startT=performance.now();
    menu.style.display="none"; player.style.display="flex"; againBtn.classList.add("hide");
    cue.textContent=""; sub.textContent=""; setBall(0);
    say(item.intro);
    var delay=Math.min(7000, Math.max(3500, item.intro.length*55));
    setTimeout(function(){ if(running) raf=requestAnimationFrame(loop); }, delay);
  }
  function toMenu(){running=false;cancelAnimationFrame(raf);stopMed();deskOn(false);if(window.speechSynthesis)speechSynthesis.cancel();
    player.style.display="none";menu.style.display="flex";timerEl.textContent="02:00";}

  backBtn.onclick=toMenu;
  againBtn.onclick=function(){ if(CURRENT&&CURRENT.lines) runMeditation(CURRENT); else run(CURRENT); };

  // ---- desk demo engine: swap scene to Hanuman-at-desk, drive poses per line ----
  var deskWrap=document.getElementById("deskWrap"), monkeyWrap=document.getElementById("monkeyWrap"), ballWrap=document.getElementById("ballWrap");
  function setDeskPose(p){var s=document.getElementById("deskSvg");if(s)s.setAttribute("data-pose",p);}
  function deskOn(on){deskWrap.style.display=on?"flex":"none";monkeyWrap.style.display=on?"none":"";ballWrap.style.display=on?"none":"";if(on)setDeskPose("neutral");}

  // ---- meditation engine: warm glow + ring ripples, line-by-line narration ----
  var medActive=false, medTimeouts=[], medTick=null, medRipple=null, medRemain=0, CURRENTMED=null;
  function fmt(s){return "0"+Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}
  function spawnRipple(){var w=document.getElementById("ballWrap");var r=document.createElement("div");r.className="ripple";w.appendChild(r);setTimeout(function(){if(r.parentNode)r.parentNode.removeChild(r);},4100);}
  function startGlow(){ball.style.transform="";ball.style.background="";ball.style.boxShadow="";ball.classList.add("glow");spawnRipple();medRipple=setInterval(spawnRipple,2200);}
  function stopGlow(){if(medRipple){clearInterval(medRipple);medRipple=null;}ball.classList.remove("glow");var w=document.getElementById("ballWrap");var rs=w.querySelectorAll(".ripple");for(var i=0;i<rs.length;i++)rs[i].remove();}
  function clearMedTimers(){for(var i=0;i<medTimeouts.length;i++)clearTimeout(medTimeouts[i]);medTimeouts=[];if(medTick){clearInterval(medTick);medTick=null;}}
  function stopMed(){medActive=false;clearMedTimers();stopGlow();}
  function playLine(item,i){
    if(!medActive)return;
    var L=item.lines[i];
    cue.textContent=L.cue; sub.textContent=L.sub||""; say(L.say);
    if(L.pose)setDeskPose(L.pose);
    var next=(i+1<item.lines.length)?function(){playLine(item,i+1);}:function(){finishMed(item);};
    medTimeouts.push(setTimeout(next, L.hold*1000));
  }
  function finishMed(item){
    medActive=false; clearMedTimers(); if(medRipple){clearInterval(medRipple);medRipple=null;}
    hsLog("complete",item,(Date.now()-hsT0)/1000);
    if(item.demo==="desk")setDeskPose("steady");
    timerEl.textContent="00:00";
    cue.textContent="Beautiful work."; sub.textContent="The room is calm and ready.";
    say(item.close||"Beautiful work.");
    againBtn.classList.remove("hide");
  }
  function runMeditation(item){
    running=false; cancelAnimationFrame(raf); stopMed();
    CURRENT=item; CURRENTMED=item; medActive=true; audioUnlocked=true; if(!chosenVoice)pickVoice();
    hsT0=Date.now(); hsLog("start",item);
    menu.style.display="none"; player.style.display="flex"; againBtn.classList.add("hide");
    cue.textContent=""; sub.textContent="";
    if(item.demo==="desk"){deskOn(true);} else {deskOn(false); startGlow();}
    var delay=Math.min(8000,Math.max(3500,item.intro.length*55));
    medRemain=item.lines.reduce(function(a,l){return a+l.hold;},0)+Math.round(delay/1000);
    timerEl.textContent=fmt(medRemain);
    say(item.intro);
    medTick=setInterval(function(){medRemain=Math.max(0,medRemain-1);timerEl.textContent=fmt(medRemain);},1000);
    medTimeouts.push(setTimeout(function(){ if(medActive) playLine(item,0); }, delay));
  }

  function addCard(f){
    var c=document.createElement("div");c.className="card"+(f.kind==="meditation"?" med":"")+(f.kind==="chair"?" chair":"")+(f.kind==="sel"?" sel":"")+(f.kind==="class"?" cls":"");
    c.innerHTML="<span class='tag'>"+f.tag+"</span><h3>"+f.name+"</h3><p>"+f.blurb+"</p><div class='src'>"+f.audience+" · "+f.src+"</div>";
    c.onclick=function(){ if(f.lines) runMeditation(f); else run(f); };
    cards.appendChild(c);
  }
  FLOWS.forEach(addCard);
  MEDITATIONS.forEach(addCard);
  CHAIR.forEach(addCard);
  SEL.forEach(addCard);
  CLASSES.forEach(addCard);
  SEQUENCES.forEach(addCard);
  setBall(0);
})();
