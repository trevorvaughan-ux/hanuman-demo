      blurb:"When it's too much: stop, tuck into your shell, three breaths, come out ready.",
      intro:"Hi, I'm Hanuman. Do you know what a turtle does when the world gets too loud or too much? It tucks into its shell, gets calm, and comes back out when it's ready. You have a shell too. Let's practice.",
      lines:[
        {cue:"Sit in your seat. Feet on the floor.",sub:"Turtle practice time!",say:"Sit in your seat with your feet on the floor. It's turtle practice time.",hold:9},
        {cue:"Something feels TOO MUCH? Say: \"Turtle time.\"",sub:"Quietly, to yourself.",say:"When something feels too big, too loud, or too much, you say quietly to yourself: turtle time.",hold:10},
        {cue:"TUCK: pull your arms in close.",sub:"Hug yourself. Chin down.",say:"Now tuck! Pull your arms in close, give yourself a squeeze, and let your chin drop down. You're in your shell now.",hold:10},
        {cue:"It's quiet in the shell.",sub:"Nobody can rush a turtle.",say:"It's quiet and safe in your shell. Nobody can rush a turtle in its shell. You have time.",hold:10},
        {cue:"Shell breath 1: in... and out.",sub:"Slow like a turtle.",say:"Now three shell breaths, slow like a turtle. Breath one: in... and out.",hold:10},
        {cue:"Shell breath 2: in... and out.",sub:"",say:"Breath two: in... and slowly out.",hold:9},
        {cue:"Shell breath 3: in... and out.",sub:"Feel your body get softer.",say:"Breath three: in... and out. Feel your body getting softer inside your shell.",hold:10},
        {cue:"Peek out. Ready?",sub:"Lift your chin. Open your arms.",say:"Now peek out. Lift your chin, open your arms slowly. Is the world still there? Yes. Are you calmer? Check and see.",hold:11},
        {cue:"Turtles come out when THEY are ready.",sub:"Your shell is always with you.",say:"Turtles come out when they're ready, not when someone yells at the shell. And your shell? It's always with you.",hold:11}
      ],
      close:"That's Turtle Time. Too much? Tuck, three breaths, come out ready. Slow and steady really does win." },
    { id:"squeezemelt", kind:"sel", demo:"desk", name:"Squeeze and Melt", tag:"SEL · Calm down · 2 min", audience:"PreK3-K", src:"HudsonSeed",
      blurb:"Squeeze every muscle stiff like uncooked spaghetti, then melt soft like cooked spaghetti.",
      intro:"Hi, I'm Hanuman. Have you ever seen spaghetti before it's cooked? Stiff as a stick! And after? Soft and wiggly. Your body can do both. Let's cook some spaghetti.",
      lines:[
        {cue:"Sit tall. Arms by your sides.",sub:"Raw spaghetti time!",say:"Sit tall with your arms by your sides. Time to be raw spaghetti.",hold:8},
        {cue:"SQUEEZE your hands into fists.",sub:"Tight tight tight!",say:"Squeeze your hands into the tightest fists you can. Tight, tight, tight!",hold:8},
        {cue:"SQUEEZE your arms and shoulders.",sub:"Shoulders up to your ears!",say:"Now squeeze your arms stiff and pull your shoulders way up to your ears. Stiff like uncooked spaghetti!",hold:9},
        {cue:"SQUEEZE your face!",sub:"Scrunch everything!",say:"Now your face! Scrunch your eyes, scrunch your nose, squeeze everything tight!",hold:8},
        {cue:"SQUEEZE your legs and curl your toes.",sub:"Whole body stiff! Hold it...",say:"Legs stiff, toes curled, whole body squeezed! Hold it... hold it... hold it...",hold:9},
        {cue:"Now... MELT!",sub:"Flop! Soft spaghetti!",say:"And now... melt! Let everything go floppy and soft. Cooked spaghetti! Arms soft, shoulders down, face soft.",hold:10},
        {cue:"Feel the warm melty feeling.",sub:"That's your body saying thank you.",say:"Feel that warm, melty, heavy feeling in your arms and legs? That's your body saying thank you.",hold:10},
        {cue:"One more time! SQUEEZE...",sub:"Everything tight!",say:"One more time, because it's fun. Squeeze everything tight... tight... tight...",hold:9},
        {cue:"...and MELT.",sub:"Soft. Calm. Cooked.",say:"And melt. All soft. All calm. Perfectly cooked spaghetti.",hold:9}
      ],
      close:"That's Squeeze and Melt. When your body feels tight and grumpy, cook the spaghetti: squeeze it tight, then melt it soft." },
    { id:"bubblepatience", kind:"sel", demo:"desk", name:"Bubble Patience", tag:"SEL · Waiting · 2 min", audience:"PreK3-K", src:"HudsonSeed",
      blurb:"Blow an imaginary bubble so slowly it doesn't pop. Waiting practice disguised as a game.",
      intro:"Hi, I'm Hanuman. Blowing bubbles is easy. But blowing a GIANT bubble that doesn't pop? That takes the slowest, gentlest breath in the world. Let's try.",
      lines:[
        {cue:"Sit tall. Hold your bubble wand.",sub:"Pinch your fingers in a circle.",say:"Sit tall and hold up your imaginary bubble wand. Make a circle with your fingers. There it is.",hold:9},
        {cue:"Dip it in the bubble juice.",sub:"Slooowly.",say:"Dip your wand in the bubble juice. Slowly. No rushing, or you'll spill it.",hold:8},
        {cue:"Big breath in through your nose.",sub:"Fill up your belly.",say:"Now take a big breath in through your nose, and fill your belly up like a balloon.",hold:9},
        {cue:"Blow the SLOWEST breath ever.",sub:"Too fast and it pops!",say:"Now blow through your wand, the slowest, gentlest breath ever. If you blow too fast... pop! Gone.",hold:11},
        {cue:"Watch your bubble grow.",sub:"Bigger... bigger...",say:"Keep blowing gently, and watch your bubble grow. Bigger... bigger... careful...",hold:10},
        {cue:"Breathe in again. Keep it alive!",sub:"Gentle gentle.",say:"Breathe in through your nose again, then keep blowing, gentle, gentle. Your bubble is huge now!",hold:10},
        {cue:"Let it float away.",sub:"Watch it go up, up, up.",say:"Now stop blowing, and let your giant bubble float away. Watch it go up... up... up... over the school.",hold:11},
        {cue:"You waited. It worked.",sub:"Slow and gentle wins.",say:"You know what made that bubble work? Going slow when you wanted to go fast. That's called patience, and you just did it.",hold:11},
        {cue:"One more quiet breath.",sub:"",say:"One more quiet breath while your bubble flies to somewhere amazing.",hold:8}
      ],
      close:"That's Bubble Patience. Waiting is hard. But you're a giant-bubble blower now, and bubble blowers know how to go slow." },
    { id:"redobutton", kind:"sel", demo:"desk", name:"The Redo Button", tag:"SEL · Do-overs · 2 min", audience:"1st-3rd", src:"HudsonSeed",
      blurb:"Everyone gets do-overs. Practice noticing a wrong turn, pausing, and asking for a redo.",
      intro:"Hey, I'm Hanuman. In video games, when something goes wrong, you don't throw the whole game away. You hit redo and try again. Real life has a redo button too. Most kids just never learn where it is.",
      lines:[
        {cue:"Sit tall. One slow breath.",sub:"",say:"Sit tall and take one slow breath.",hold:8},
        {cue:"Think of a moment today that went WRONG.",sub:"Said something? Did something? Small counts.",say:"Think of a little moment today or yesterday that went wrong. Maybe you said something snappy, or grabbed, or ignored someone. Small counts.",hold:12},
        {cue:"That was a wrong turn. Not a wrong KID.",sub:"Big difference.",say:"Here's the first secret: that was a wrong turn, not a wrong kid. Big, big difference.",hold:10},
        {cue:"Find the redo button.",sub:"Tap your chest twice.",say:"Now find your redo button. Tap your chest twice. That's it, right there. Installed and working.",hold:9},
        {cue:"Press it. Say: \"Can I try that again?\"",sub:"The five magic redo words.",say:"When you press it in real life, you say five words: can I try that again? To a friend, a teacher, even to yourself.",hold:11},
        {cue:"Replay YOUR moment, the redo way.",sub:"What would take-two look like?",say:"Now replay your wrong-turn moment in your head, but this time do the redo version. What does take-two look like? What do you say instead?",hold:13},
        {cue:"See it clearly. That version is ready now.",sub:"Loaded for next time.",say:"See it clearly? Good. That redo version is now loaded and ready. Next time a moment like that comes, take-two is right there.",hold:11},
        {cue:"Redos aren't cheating. They're growing.",sub:"Everyone gets them. Even grown-ups.",say:"And remember: redos aren't cheating. They're how people grow. Grown-ups need them all the time. Trust me.",hold:10}
      ],
      close:"That's the Redo Button. A bad moment doesn't ruin a day. Tap twice, ask for take-two, and go again." },
    { id:"braintrafficlight", kind:"sel", demo:"desk", name:"Brain Traffic Light", tag:"SEL · Impulse control · 2 min", audience:"1st-3rd", src:"HudsonSeed",
      blurb:"Red: stop. Yellow: think of choices. Green: go with the wise one. Impulse control in three colors.",
      intro:"Hey, I'm Hanuman. Cars have traffic lights so they don't crash. Your brain has one too, for when big urges show up. Red, yellow, green. Let's turn yours on.",
      lines:[
        {cue:"Sit tall. Picture a traffic light.",sub:"Red on top. Yellow. Green.",say:"Sit tall and picture a traffic light in your mind. Red on top, yellow in the middle, green at the bottom.",hold:10},
        {cue:"An urge shows up: grab, yell, blurt, push.",sub:"That's when the light turns on.",say:"Now imagine a big urge shows up. You want to grab the thing, yell the word, blurt the answer, push to the front. That's the exact moment your light turns on.",hold:13},
        {cue:"RED: STOP.",sub:"Freeze your body. One breath.",say:"Red means stop. Freeze your body. Feet still, hands still, mouth closed. Take one breath at the red light.",hold:11},
        {cue:"YELLOW: THINK.",sub:"What are my choices? Count them.",say:"Yellow means think. What are my choices here? There's always more than one. I could grab it... or ask for it... or wait my turn. Count your choices.",hold:13},
        {cue:"GREEN: GO with the WISE choice.",sub:"The one future-you high-fives.",say:"Green means go, but only with the wise choice. The one that future-you, five minutes from now, would high-five you for.",hold:12},
        {cue:"Practice: someone cuts in line.",sub:"Red... yellow... green...",say:"Let's practice. Pretend someone cuts in front of you in line. Red: freeze and breathe. Yellow: I could push... or tell them how I feel... or tell the teacher. Green: pick the wise one and go.",hold:15},
        {cue:"The light takes 3 seconds.",sub:"Fast enough for real life.",say:"The whole light takes about three seconds. That's fast enough for real life, and strong enough to stop a crash.",hold:10},
        {cue:"One more breath. Light's installed.",sub:"",say:"One more slow breath. Your brain traffic light is installed and blinking.",hold:9}
      ],
      close:"That's the Brain Traffic Light. Urges are fast, but red-yellow-green is faster. Stop, think, go wise." },
    { id:"boredomninja", kind:"sel", demo:"desk", name:"The Boredom Ninja", tag:"SEL · Patience · 2 min", audience:"1st-3rd", src:"HudsonSeed",
      blurb:"Sitting with nothing to do, without melting down. Boredom tolerance as a trainable skill.",
      intro:"Hey, I'm Hanuman. Here's a secret: boredom is not an emergency. But most people treat it like one! A boredom ninja can sit with nothing to do and stay totally calm. Ninja training starts now.",
      lines:[
        {cue:"Sit tall. Put EVERYTHING down.",sub:"Empty hands. This is the training.",say:"Sit tall and put everything down. Empty hands, empty desk. This emptiness IS the ninja training.",hold:10},
        {cue:"Do... nothing.",sub:"Just sit. Just breathe.",say:"Now, do nothing. Just sit and breathe. Nothing to watch, nothing to press, nothing to hold.",hold:11},
        {cue:"Feel the itchy \"I'm BORED\" feeling?",sub:"Good. That's the training working.",say:"Feel that itchy, squirmy, I'm-so-bored feeling starting? Good. That means the training is working. A ninja doesn't run from it.",hold:12},
        {cue:"Boredom is not an emergency.",sub:"Nothing is wrong. Say it inside.",say:"Say this inside: boredom is not an emergency. Nothing is wrong. I'm just... between things.",hold:11},
        {cue:"Now watch what your brain does.",sub:"It starts making its OWN fun.",say:"Now the ninja secret: watch what your brain does with nothing to do. It starts wondering. Imagining. Making its own fun. That's where ideas come from.",hold:13},
        {cue:"Notice one interesting thing right here.",sub:"A sound. A shadow. A thought.",say:"Find one interesting thing right here in this boring moment. A sound you didn't notice. A shadow on the wall. A funny thought. Boredom hides treasure.",hold:12},
        {cue:"You're still okay. Still breathing.",sub:"The itch gets quieter when you don't scratch it.",say:"Check: you're still okay. Still breathing. And notice, the itchy feeling gets quieter when you don't scratch it right away.",hold:11},
        {cue:"Ninja level one: complete.",sub:"Waiting rooms fear you now.",say:"Ninja level one, complete. Car rides, waiting rooms, and long lines fear you now.",hold:9}
      ],
      close:"That's the Boredom Ninja. Bored is where imagination starts. Sit with it, and it turns into something." },
    { id:"focusfortress", kind:"sel", demo:"desk", name:"The Focus Fortress", tag:"SEL · Focus · 2 min", audience:"4th-6th", src:"HudsonSeed",
      blurb:"One task, one target, and a plan for each distraction that attacks the walls.",
      intro:"Hey, I'm Hanuman. Focus isn't magic. It's a fortress you build on purpose: one target inside, and walls that know exactly what's going to attack them. Let's build yours before your next work block.",
      lines:[
        {cue:"Sit tall. One breath.",sub:"Architect mode.",say:"Sit tall, one slow breath. You're the architect now.",hold:8},
        {cue:"Pick ONE target.",sub:"One task. Not three. ONE.",say:"First, pick one target: the single task you need to finish. Not three tasks. One. Say it to yourself clearly.",hold:11},
        {cue:"Put the target in the center of your fortress.",sub:"That's what the walls protect.",say:"Put that task in the center of your fortress. Everything we build now protects that one thing.",hold:10},
        {cue:"Now scout the attackers.",sub:"What ALWAYS distracts you? Name your top 2.",say:"Now scout the enemies. What always attacks your focus? Noise? A chatty neighbor? Daydreams? A screen? Name your top two attackers honestly.",hold:13},
        {cue:"Build a wall for attacker 1.",sub:"A plan is a wall.",say:"Build a wall for the first one. A wall is just a plan. Noise? I'll move seats or ask about headphones. Chatty neighbor? I'll say, talk at break.",hold:13},
        {cue:"Build a wall for attacker 2.",sub:"Daydreams? Write the thought down, return to target.",say:"Wall for the second. Daydreams? Keep scrap paper, write the wandering thought down, and walk back to the target. The thought will wait.",hold:13},
        {cue:"Set your fortress timer.",sub:"10 focused minutes beats 30 leaky ones.",say:"Last stone: a timer. Pick a small, real number, like ten minutes of pure fortress time. Ten focused minutes beats thirty leaky ones.",hold:12},
        {cue:"Fortress built. One breath.",sub:"Target locked.",say:"Fortress built. One slow breath. Target locked. When the attack comes, and it will, your walls already know what to do.",hold:11}
      ],
      close:"That's the Focus Fortress. Distraction isn't defeated by trying harder. It's defeated by planning smarter." },
    { id:"testdaysteady", kind:"sel", demo:"desk", name:"Test-Day Steady", tag:"SEL · Nerves · 2 min", audience:"4th-6th", src:"HudsonSeed",
      blurb:"A pre-performance routine: long exhales plus ready words, for tests, tryouts, and presentations.",
      intro:"Hey, I'm Hanuman. Athletes have pre-game routines. Musicians have pre-show routines. Today you get yours: for tests, tryouts, presentations, anything with butterflies. Two minutes, and you walk in steady.",
      lines:[
        {cue:"Sit tall. Feet flat. Hands on your desk.",sub:"Grounded position.",say:"Sit tall, both feet flat on the floor, hands resting on your desk. This is your grounded position.",hold:10},
        {cue:"Notice the butterflies. Don't fight them.",sub:"Butterflies mean you CARE.",say:"Notice the nervous feeling, the butterflies. Don't fight them. Butterflies just mean you care about this. Even pros get them.",hold:11},
        {cue:"Long exhale 1: in for 4... out for 6.",sub:"The long OUT-breath is the off switch.",say:"Now the body part. Breathe in for four... and out for six. The long out-breath is your body's built-in off switch for panic.",hold:13},
        {cue:"Long exhale 2: in for 4... out for 6.",sub:"Shoulders drop.",say:"Again. In, two, three, four... out, two, three, four, five, six. Let your shoulders drop on the way out.",hold:12},
        {cue:"Long exhale 3: in for 4... out for 6.",sub:"Butterflies flying in formation now.",say:"One more. In... and long, slow out. The butterflies are still there, but now they're flying in formation.",hold:12},
        {cue:"Ready words: \"I know more than I think I do.\"",sub:"Say it inside. It's true.",say:"Now the mind part. Say your ready words inside: I know more than I think I do. Say it again, slower. It's true, and there's proof: you prepared.",hold:13},
        {cue:"\"One question at a time.\"",sub:"That's the whole job.",say:"Second ready phrase: one question at a time. You never have to do the whole test at once. Just the one in front of you. That's the whole job.",hold:12},
        {cue:"Roll your shoulders. You're steady.",sub:"Walk in like you've done this. You have.",say:"Roll your shoulders back once. You're steady now. Walk in like someone who's done this before. Because you have.",hold:10}
      ],
      close:"That's Test-Day Steady. Three long exhales, two ready phrases, one question at a time. Take it into every big moment." },
    { id:"frustrationladder", kind:"sel", demo:"desk", name:"The Frustration Ladder", tag:"SEL · Perseverance · 2 min", audience:"4th-6th", src:"HudsonSeed",
      blurb:"Stuck on hard work? Climb in order: try again, try different, take a break, ask for help.",
      intro:"Hey, I'm Hanuman. When work gets hard, most people jump straight from stuck to giving up. But there's a ladder between those two places, with four strong rungs. Learn the ladder, and stuck stops being scary.",
      lines:[
        {cue:"Sit tall. Think of your last STUCK moment.",sub:"Hard math? Tricky writing? A skill that wouldn't click?",say:"Sit tall and think of the last time you were really stuck. Hard math, tricky writing, a game move that wouldn't click. Feel that stuck feeling again, just a little.",hold:13},
        {cue:"Stuck is a PLACE, not an ending.",sub:"And places have exits.",say:"First truth: stuck is a place, not an ending. And every place has exits. Here's your ladder out.",hold:10},
        {cue:"Rung 1: TRY AGAIN.",sub:"Same way, one more honest time.",say:"Rung one: try again. Same way, one more honest time. Sometimes the second try just works. But only once. Trying the same thing ten times isn't climbing, it's stomping.",hold:13},
        {cue:"Rung 2: TRY DIFFERENT.",sub:"New angle. Other direction. Draw it. Say it out loud.",say:"Rung two: try different. Attack from a new angle. Read it out loud. Draw a picture of it. Start from the end. Different beats harder.",hold:13},
        {cue:"Rung 3: TAKE A BREAK.",sub:"Brains solve things in the background.",say:"Rung three: take a real break. Get water, stretch, look out a window. Brains keep working on problems in the background. Walking away IS a strategy.",hold:12},
        {cue:"Rung 4: ASK FOR HELP.",sub:"With a smart question: \"I tried X and Y. I'm stuck at Z.\"",say:"Rung four: ask for help, the strong way. Not, I can't do this. Instead: I tried this and this, and I'm stuck right here. That question gets real help, fast.",hold:14},
        {cue:"NEVER skip to \"give up.\"",sub:"It's not on the ladder.",say:"Notice what's not on the ladder: giving up. It's not a rung. Four exits before that door, every single time.",hold:11},
        {cue:"One breath. Ladder in your pocket.",sub:"",say:"One slow breath. Fold the ladder up and keep it in your pocket for the next hard thing.",hold:9}
      ],
      close:"That's the Frustration Ladder. Try again, try different, take a break, ask smart. Stuck never gets the last word." },
    { id:"facereading", kind:"sel", demo:"desk", name:"Face Reading", tag:"SEL · Empathy · 2 min", audience:"PreK3-K", src:"HudsonSeed",
      blurb:"What faces tell us: happy, sad, mad, surprised. The first empathy tool: look at the face.",
      intro:"Hi, I'm Hanuman. Faces talk without words! A face can say I'm happy, or I'm sad, or I'm mad, without one single sound. Let's learn to read faces, like reading a book.",
      lines:[
        {cue:"Sit criss-cross. Eyes on me!",sub:"Face reading school is open.",say:"Sit criss-cross and get your eyes ready. Face reading school is open!",hold:9},
        {cue:"A HAPPY face: smile, bright eyes.",sub:"Make one! Now you can read it.",say:"A happy face has a smile and bright, crinkly eyes. Make a happy face right now. See? Now you know what happy looks like on a friend.",hold:12},
        {cue:"A SAD face: mouth down, eyes low.",sub:"Make a gentle sad face.",say:"A sad face has a mouth that goes down, and eyes that look low. Make a gentle sad face. When a friend looks like this, their heart feels heavy.",hold:12},
        {cue:"A MAD face: scrunchy brows, tight mouth.",sub:"Grr! Make one.",say:"A mad face has scrunchy eyebrows and a tight mouth. Make one. Grr! When a friend looks like this, their inside weather is stormy.",hold:11},
        {cue:"A SURPRISED face: big eyes, round mouth!",sub:"Ooooh! Make one.",say:"A surprised face has big wide eyes and a round mouth. Oooh! Make one! Surprised can be happy-surprised or scared-surprised.",hold:11},
        {cue:"Why do we read faces?",sub:"So we know how to be a good friend.",say:"Why do we read faces? Because when you know how a friend feels, you know how to be a good friend to them.",hold:11},
        {cue:"Sad face? Ask: \"Are you okay?\"",sub:"Those three words are magic.",say:"If you read a sad face, you can ask: are you okay? Those three words are magic friend-words.",hold:10},
        {cue:"You're a face reader now!",sub:"Read faces everywhere you go.",say:"You're an official face reader now. Read the faces around you today, at recess, at lunch, at home. Faces are talking all the time.",hold:11}
      ],
      close:"That's Face Reading. Faces talk without words, and now you speak their language." },
    { id:"gentlehands", kind:"sel", demo:"desk", name:"Gentle Hands, Gentle Voice", tag:"SEL · Kindness · 2 min", audience:"PreK3-K", src:"HudsonSeed",
      blurb:"How our volume and our touch land on other people's bodies and feelings.",
      intro:"Hi, I'm Hanuman. Your hands and your voice are like volume knobs. They can be big and loud, or soft and gentle. Let's practice the gentle settings, because gentle is how friends feel safe.",
      lines:[
        {cue:"Sit tall. Hands up!",sub:"Time to test our settings.",say:"Sit tall and hold your hands up. Time to test your settings.",hold:8},
        {cue:"Clap one BIG loud clap.",sub:"That's the loud setting.",say:"Clap one big, loud clap. That's your loud setting. Loud is fun outside, at games, at parties.",hold:9},
        {cue:"Now the SOFTEST clap in the world.",sub:"So quiet a butterfly could sleep.",say:"Now make the softest clap in the world. So quiet a butterfly could sleep through it. That's your gentle setting.",hold:10},
        {cue:"Pat your own arm, gently.",sub:"Like petting a tiny kitten.",say:"Now pat your own arm, so gently, like you're petting a tiny sleeping kitten. Feel how nice gentle feels? That's how gentle hands land on friends.",hold:12},
        {cue:"Big voice: say \"HELLO!\"",sub:"Outside voice!",say:"Now voices. Say hello in your big outside voice. HELLO!",hold:8},
        {cue:"Now whisper: \"hello.\"",sub:"Inside voice. Cozy voice.",say:"Now whisper it, soft and cozy: hello. Feel the difference? Big voices can feel like wind. Gentle voices feel like sunshine.",hold:11},
        {cue:"When friends are close, go gentle.",sub:"Gentle hands. Gentle voice.",say:"Here's the rule of thumb: the closer a friend is, the gentler we go. Gentle hands, gentle voice, when people are near.",hold:11},
        {cue:"Gentle helps everyone feel safe.",sub:"You have the power!",say:"Gentle is a superpower, because gentle helps everybody around you feel safe. And you can switch it on any time.",hold:10}
      ],
      close:"That's Gentle Hands, Gentle Voice. You have all the settings. Knowing which one to use? That's what makes a great friend." },
    { id:"everyonegetsaturn", kind:"sel", demo:"desk", name:"Everyone Gets a Turn", tag:"SEL · Noticing · 2 min", audience:"PreK3-K", src:"HudsonSeed",
      blurb:"Noticing when somebody hasn't had a turn yet, before a grown-up has to say it.",
      intro:"Hi, I'm Hanuman. In games and circle time, everybody wants a turn. But somebody always gets missed. Today you learn a special power: noticing the kid who hasn't had a turn, all by yourself.",
      lines:[
        {cue:"Sit criss-cross. One breath.",sub:"",say:"Sit criss-cross and take one nice breath.",hold:8},
        {cue:"Think about your favorite game.",sub:"Blocks? Tag? Pretend?",say:"Think about your favorite game to play with friends. Blocks, tag, pretend, anything.",hold:9},
        {cue:"Turns make games FAIR.",sub:"And fair makes games fun.",say:"Games work because of turns. Your turn, my turn, her turn, his turn. Turns make it fair, and fair is what makes it fun for everybody.",hold:11},
        {cue:"But sometimes... someone gets missed.",sub:"They go quiet. They look down.",say:"But sometimes, someone gets missed. They wait and wait, and their turn never comes. They go quiet. They look down at their shoes.",hold:11},
        {cue:"Be a TURN NOTICER.",sub:"Look around: who hasn't gone yet?",say:"Here's your new power: be a turn noticer. In any game, look around and ask yourself: who hasn't gone yet?",hold:11},
        {cue:"Say the magic words: \"You haven't had a turn!\"",sub:"\"Want to go next?\"",say:"When you spot them, say the magic words: hey, you haven't had a turn! Want to go next?",hold:10},
        {cue:"Watch their face when you say it.",sub:"It lights up like a sunrise.",say:"And watch their face when you say it. It lights up like a sunrise. You did that, without any grown-up asking.",hold:11},
        {cue:"Turn noticers make the best friends.",sub:"Try it today!",say:"Turn noticers make the very best friends. Try your new power today, at recess or centers or at home.",hold:10}
      ],
      close:"That's Everyone Gets a Turn. The kids who notice are the kids everyone wants to play with." },
    { id:"howwouldthatfeel", kind:"sel", demo:"desk", name:"How Would That Feel?", tag:"SEL · Empathy · 2 min", audience:"PreK3-K", src:"HudsonSeed",
      blurb:"The simplest perspective flip: if that happened to you, what would your heart do?",
      intro:"Hi, I'm Hanuman. Today we learn the most important question in the whole world. Ready? Here it is: how would that feel... if it happened to ME? Let's practice asking it.",
      lines:[
        {cue:"Sit tall. Hand on your heart.",sub:"Your heart is the answer-checker.",say:"Sit tall and put one hand on your heart. Your heart is going to be our answer-checker.",hold:9},
        {cue:"Pretend: someone shares their snack with you.",sub:"How would that feel?",say:"Let's pretend. Someone shares their yummy snack with you. Ask your heart: how would that feel? Warm? Happy? Nice?",hold:11},
        {cue:"Pretend: someone knocks your tower down.",sub:"How would that feel?",say:"Now pretend someone knocks down the tower you built. Ask your heart: how would that feel? Sad? Mad? Ouchy inside?",hold:11},
        {cue:"Pretend: someone says \"come play with us!\"",sub:"How would that feel?",say:"Now pretend someone says: come play with us! How would that feel? Like sunshine in your belly?",hold:10},
        {cue:"Pretend: nobody lets you play.",sub:"How would that feel?",say:"And now pretend nobody lets you play. How would that feel? Heavy? Lonely? Like rain inside?",hold:10},
        {cue:"Your heart knows every answer!",sub:"That's called empathy.",say:"See how your heart knows every single answer? That knowing has a big fancy name: empathy. You already have it!",hold:11},
        {cue:"Before you do something to a friend...",sub:"...ask the question first!",say:"So here's the magic: before you do something to a friend, ask the question first. How would that feel if it happened to me?",hold:11},
        {cue:"If your heart says \"ouchy,\" pick something kinder.",sub:"Your heart is a good boss.",say:"If your heart says ouchy, pick something kinder instead. Your heart is a very good boss. Listen to it.",hold:10}
      ],
      close:"That's How Would That Feel. One little question, asked before you act. It makes you the kindest kind of friend." },
    { id:"invisiblebackpack", kind:"sel", demo:"desk", name:"The Invisible Backpack", tag:"SEL · Empathy · 2 min", audience:"1st-3rd", src:"HudsonSeed",
      blurb:"Everyone carries things you can't see: worries, hurts, hopes. Walk gently.",
      intro:"Hey, I'm Hanuman. Everyone in your class walked in today wearing an invisible backpack. Not the one with books. A secret one, full of things you can't see: worries, hurts, hopes. Let's talk about it.",
      lines:[
        {cue:"Sit tall. One slow breath.",sub:"",say:"Sit tall and take one slow breath.",hold:8},
        {cue:"Picture your OWN invisible backpack.",sub:"What are you carrying today?",say:"First, picture your own invisible backpack. What's in it today? Maybe a worry. Maybe something exciting. Maybe something heavy from home. Only you know.",hold:13},
        {cue:"Feel its weight. It's real.",sub:"Some days light, some days heavy.",say:"Feel its weight. Some days it's light as a feather. Some days it's full of rocks. Both kinds of days are real.",hold:11},
        {cue:"Now look around: EVERYONE has one.",sub:"Every kid. Every teacher. Everyone.",say:"Now here's the big idea: every single person around you is wearing one too. Every kid. Every teacher. Even the grumpy ones. Especially the grumpy ones.",hold:12},
        {cue:"You can't see what's inside theirs.",sub:"A sick pet? A lost game? A hard morning?",say:"And you can't see inside theirs. That kid who snapped at you? Maybe a sick pet, a hard morning, a worry rock in the backpack. You never know the whole story.",hold:13},
        {cue:"So the rule is: walk gently.",sub:"Everyone's carrying something.",say:"So the rule is simple: walk gently. Everyone you meet is carrying something you can't see.",hold:10},
        {cue:"Gentle looks like: patience, a smile, a second chance.",sub:"Small things lighten heavy packs.",say:"Walking gently looks like patience when someone's slow, a smile when someone's quiet, a second chance when someone's snappy. Small kindnesses make heavy backpacks lighter.",hold:13},
        {cue:"One breath for every backpack in this room.",sub:"Including yours.",say:"Take one slow breath for every invisible backpack in this room. Including yours. You're all carrying, and you're all doing better than you think.",hold:11}
      ],
      close:"That's the Invisible Backpack. Be kind. Always. You never know what someone's carrying." },
    { id:"newkidglasses", kind:"sel", demo:"desk", name:"New Kid Glasses", tag:"SEL · Perspective · 2 min", audience:"1st-3rd", src:"HudsonSeed",
      blurb:"Put on imaginary glasses and see the classroom the way a brand-new kid sees it.",
      intro:"Hey, I'm Hanuman. You know this classroom so well you could walk it with your eyes closed. But imagine seeing it for the very first time, knowing nobody. Today we put on New Kid Glasses.",
      lines:[
        {cue:"Sit tall. Put on your invisible glasses.",sub:"Blink twice to turn them on.",say:"Sit tall and put on your invisible New Kid Glasses. Blink twice to turn them on.",hold:9},
        {cue:"Look around like you've NEVER been here.",sub:"First day. First hour.",say:"Now look around the room like you have never, ever been here. It's your first day. Your first hour. You know zero people.",hold:12},
        {cue:"What looks confusing?",sub:"Where do things go? What are the rules?",say:"Through new kid glasses, what looks confusing? Where does the lunch line start? Where do backpacks go? What are the rules everyone else just... knows?",hold:12},
        {cue:"What feels scary?",sub:"Recess with no friend yet. Lunch with no seat.",say:"What feels a little scary? Maybe recess, when everyone runs to friends they already have. Maybe lunch, holding a tray, looking for a seat.",hold:12},
        {cue:"What would help most?",sub:"One kid saying: \"sit with me.\"",say:"Now the important question: what would help the most? Probably one thing: a single kid saying, hey, you can sit with me.",hold:12},
        {cue:"Take the glasses off. Remember the feeling.",sub:"",say:"Okay, take the glasses off. But keep the feeling. That's what new feels like from the inside.",hold:10},
        {cue:"Someday a new kid WILL walk in.",sub:"You'll be ready.",say:"Someday a new kid will walk through that door for real. And now you'll know exactly what they're feeling, and exactly what to do.",hold:11},
        {cue:"Be the \"sit with me\" kid.",sub:"They'll remember you forever.",say:"Be the sit-with-me kid. Here's a secret: people remember the first kid who was kind to them. Forever.",hold:10}
      ],
      close:"That's New Kid Glasses. Every expert in this room was new once. Keep the glasses in your pocket." },
    { id:"sameanddifferent", kind:"sel", demo:"desk", name:"Same and Different", tag:"SEL · Connection · 2 min", audience:"1st-3rd", src:"HudsonSeed",
      blurb:"Find three ways you match a classmate and three ways you differ. Both lists make the team stronger.",
      intro:"Hey, I'm Hanuman. Pick any kid in this class, and I promise you two things are true: you're alike in ways you haven't noticed, and different in ways that make you a better team. Let's prove it.",
      lines:[
        {cue:"Think of a classmate you don't know well.",sub:"Not your best friend. Someone else.",say:"Think of a classmate you don't know very well. Not your best friend. Someone you've barely talked to.",hold:11},
        {cue:"Find 3 SAMES.",sub:"Same school. Same recess. What else?",say:"Now find three ways you're the same. Easy ones count: same school, same grade, same recess. But dig deeper. Same favorite subject? Both have little sisters? Both love pizza?",hold:14},
        {cue:"Sames are bridges.",sub:"Every same is a place to meet.",say:"Every same you found is a bridge, a place where you could meet. That's how friendships start: on a same.",hold:11},
        {cue:"Now find 3 DIFFERENTS.",sub:"Different foods, games, languages, talents?",say:"Now find three ways you're probably different. Different foods at home, different games, maybe a different language, a different talent.",hold:12},
        {cue:"Differents are GIFTS.",sub:"They know things you don't!",say:"Here's the twist: those differences are gifts. Someone different from you knows things you don't know, and can teach you things you'd never learn alone.",hold:12},
        {cue:"A team of sames is weak.",sub:"All the same skills = one skill.",say:"Think about it: a team where everyone is exactly the same has only one set of skills. A team of different kids can solve anything.",hold:11},
        {cue:"Same makes us close. Different makes us strong.",sub:"You need both.",say:"So remember both halves: same makes us close. Different makes us strong. A good class needs every kind of kid in it.",hold:11},
        {cue:"Maybe say hi to that classmate today.",sub:"Start on a same.",say:"And hey, maybe say hi to that classmate today. Start on one of your sames. See where the bridge goes.",hold:10}
      ],
      close:"That's Same and Different. Alike enough to connect, different enough to matter. That's what a team is." },
    { id:"helperspotter", kind:"sel", demo:"desk", name:"The Helper Spotter", tag:"SEL · Hope · 2 min", audience:"1st-3rd", src:"HudsonSeed",
      blurb:"In any room, any problem, any news story: find the helpers. They're always there.",
      intro:"Hey, I'm Hanuman. A very wise TV neighbor once taught kids: when something scary happens, look for the helpers. You will always find people helping. Today we train your helper-spotting eyes.",
      lines:[
        {cue:"Sit tall. One slow breath.",sub:"Spotter training begins.",say:"Sit tall and take one slow breath. Helper spotter training begins now.",hold:9},
        {cue:"Spot the helpers in THIS school.",sub:"Who helps you every day?",say:"Start easy: spot the helpers in this school. Teachers. The nurse. Cafeteria crew. Crossing guards. Custodians. Count how many you can name.",hold:13},
        {cue:"Spot the KID helpers.",sub:"Who shares? Who includes? Who cheers people up?",say:"Now spot the kid helpers. Who shares supplies? Who invites people into games? Who makes you laugh when you're down? Kids are helpers too.",hold:12},
        {cue:"Think of a hard moment you had.",sub:"Who helped, even a little?",say:"Think of a hard moment you had recently. Now look for the helper in that memory. Someone who helped, even a tiny bit. There's almost always someone.",hold:12},
        {cue:"Scary news? Same trick: FIND THE HELPERS.",sub:"Firefighters. Doctors. Neighbors. Always there.",say:"And when you see or hear scary news, use the same trick. Look for the helpers in the story: firefighters, doctors, neighbors carrying people to safety. They are always, always there.",hold:14},
        {cue:"Helpers are proof.",sub:"Proof that good shows up.",say:"Helpers are proof. Proof that when things go wrong, good people show up. Every single time.",hold:10},
        {cue:"One more spot: YOU.",sub:"You've been someone's helper already.",say:"One more helper to spot: you. Think of a time you helped someone. See? You're already on the list.",hold:11},
        {cue:"Keep your spotter eyes on today.",sub:"Count helpers all day.",say:"Keep your spotter eyes on today. Count the helpers you see. The world looks braver when you know where to look.",hold:10}
      ],
      close:"That's the Helper Spotter. Look for the helpers. Be one when you can. That's the whole secret." },
    { id:"cheerpractice", kind:"sel", demo:"desk", name:"Cheer Practice", tag:"SEL · Big heart · 2 min", audience:"1st-3rd", src:"HudsonSeed",
      blurb:"Feeling genuinely glad when someone ELSE wins. The rarest skill on the playground.",
      intro:"Hey, I'm Hanuman. Cheering when YOU win is easy. Cheering when someone ELSE wins, especially when you wanted it? That's the rarest skill on the playground. Champions of the heart practice it. Let's practice.",
      lines:[
        {cue:"Sit tall. One breath.",sub:"",say:"Sit tall, one slow breath.",hold:8},
        {cue:"Remember a time someone else WON.",sub:"The prize, the game, the part you wanted.",say:"Remember a time someone else won something you wanted. The game, the prize, the line-leader spot, the part in the play.",hold:12},
        {cue:"Feel the ouch. It's honest.",sub:"Wanting to win is normal.",say:"Feel that little ouch in the memory? That's honest. Wanting to win is normal. You don't have to pretend it away.",hold:11},
        {cue:"Now find the SECOND feeling.",sub:"Look for the tiny happy-for-them spark.",say:"But now look under the ouch for a second feeling: a tiny spark that's glad for them. It might be small. Find it.",hold:12},
        {cue:"Blow on the spark. Make it bigger.",sub:"\"They worked hard. They must feel great.\"",say:"Now blow on that spark like a little campfire. Think: they worked hard. They must feel amazing right now. I know that feeling. It's the best.",hold:13},
        {cue:"Say the champion words: \"Congrats. You earned it.\"",sub:"Practice them now, quietly.",say:"Now practice the champion words, quietly: congrats, you earned it. Say it like you mean it, because the spark helps you mean it.",hold:12},
        {cue:"Here's the secret: joy is not pizza.",sub:"Their slice doesn't shrink yours.",say:"Here's the secret nobody tells you: joy is not pizza. Someone else getting a big slice doesn't make your slice smaller. There's always more.",hold:12},
        {cue:"Your turn is coming. And they'll cheer for YOU.",sub:"Because you showed them how.",say:"And your turn is coming. When it does, guess who learned how to cheer for you? Everyone you practiced on.",hold:11}
      ],
      close:"That's Cheer Practice. Being happy for other people doubles the happiness in the room, and some of the extra is yours." },
    { id:"readtheroom", kind:"sel", demo:"desk", name:"Read the Room", tag:"SEL · Awareness · 2 min", audience:"4th-6th", src:"HudsonSeed",
      blurb:"Sensing a group's mood and energy before you speak or act. What is this room feeling right now?",
      intro:"Hey, I'm Hanuman. Rooms have moods, just like people. A room can be excited, tense, tired, or silly. People who can read the room before they speak have a real superpower. Training starts now.",
      lines:[
        {cue:"Sit tall. Go quiet. Antennas up.",sub:"",say:"Sit tall, go quiet, and put your invisible antennas up.",hold:9},
        {cue:"Read THIS room's energy right now.",sub:"Fast or slow? Loud or soft?",say:"Read this room right now. Is the energy fast or slow? Loud or soft? Wiggly or still? Just gather data.",hold:12},
        {cue:"Read the FACES.",sub:"Focused? Tired? Excited? Frustrated?",say:"Now scan the faces around you, gently, without staring. Mostly focused? Tired? Excited? Somebody frustrated? Faces are the room's weather report.",hold:12},
        {cue:"Read the SOUND.",sub:"Buzzing? Silent? Tense-quiet or cozy-quiet?",say:"Now the sound. Is the room buzzing? Silent? And if it's quiet, which kind: tense quiet, like before a test, or cozy quiet, like reading time? They're different.",hold:13},
        {cue:"Name the room's mood in one word.",sub:"Your reading.",say:"Put it together and name this room's mood in one word. That's your reading. Calm? Antsy? Sleepy? Ready?",hold:11},
        {cue:"Why it matters: MATCH before you act.",sub:"A silly joke lands wrong in a tense room.",say:"Why does this matter? Because what you say lands differently in different rooms. A silly joke in a tense room lands wrong. The same joke at recess? Perfect.",hold:13},
        {cue:"Before you speak, take the 3-second read.",sub:"Room first. Words second.",say:"So here's the habit: before you speak up or act big, take a three-second read. Room first, words second.",hold:11},
        {cue:"One breath. Antennas stay on.",sub:"",say:"One slow breath. Keep those antennas on today, in every room you enter.",hold:9}
      ],
      close:"That's Read the Room. The kids who read the room end up leading it." },
    { id:"bothsides", kind:"sel", demo:"desk", name:"Both Sides of the Story", tag:"SEL · Perspective · 2 min", audience:"4th-6th", src:"HudsonSeed",
      blurb:"One playground conflict, told honestly twice, once from each side. Both tellings are true to the teller.",
      intro:"Hey, I'm Hanuman. Every argument has at least two stories, and here's the hard part: both usually feel one hundred percent true to the person telling them. Today we practice telling both.",
      lines:[
        {cue:"Sit tall. One slow breath.",sub:"",say:"Sit tall and take one slow breath.",hold:8},
        {cue:"Picture this: two kids, one basketball, last one at recess.",sub:"Jordan grabs it. Sam had it first. Or... did they?",say:"Picture this: recess, one basketball left. Jordan grabs it. Sam yells, I had it first! Jordan says, it was on the GROUND! Now they're both furious.",hold:13},
        {cue:"Tell SAM's story. Honestly.",sub:"In Sam's head, what happened?",say:"First, be Sam. Tell the story from inside Sam's head: I put the ball down for ONE second to tie my shoe. Everyone saw me playing with it. Jordan swooped in and STOLE it.",hold:14},
        {cue:"Feel how TRUE that feels to Sam.",sub:"Sam isn't lying.",say:"Feel how true that story feels from inside Sam. Sam is not lying. That's really how it looked from there.",hold:11},
        {cue:"Now tell JORDAN's story. Honestly.",sub:"In Jordan's head, what happened?",say:"Now switch. Be Jordan: I've been waiting ALL recess for a ball. I finally see one sitting on the ground, nobody holding it. I grab it, fair and square, and suddenly I'm getting yelled at.",hold:14},
        {cue:"Feel how TRUE that feels too.",sub:"Jordan isn't lying either.",say:"Feel it? Jordan's story is also true from inside Jordan. Nobody's lying. They just saw different halves of the same minute.",hold:12},
        {cue:"Two true stories. One missing piece each.",sub:"That's most arguments.",say:"Two honest kids, two true stories, each missing one piece the other one has. That, right there, is most arguments on earth.",hold:11},
        {cue:"The fix: \"Tell me what it looked like to you.\"",sub:"Trade stories BEFORE trading insults.",say:"So next time you're in it, use the magic sentence: tell me what it looked like to you. Trade stories before you trade insults. Most fights dissolve right there.",hold:13}
      ],
      close:"That's Both Sides of the Story. You don't have to agree with the other side. You just have to know it exists." },
    { id:"exclusionradar", kind:"sel", demo:"desk", name:"The Exclusion Radar", tag:"SEL · Including · 2 min", audience:"4th-6th", src:"HudsonSeed",
      blurb:"Training your eyes to notice who's on the edge of the group, at lunch, at recess, in the game.",
      intro:"Hey, I'm Hanuman. In every cafeteria, every recess, every group project, somebody is standing on the edge, half-in, half-out, hoping someone notices. Today we install your radar for spotting them.",
      lines:[
        {cue:"Sit tall. Radar powering on.",sub:"One slow breath.",say:"Sit tall, one slow breath. Radar powering on.",hold:8},
        {cue:"Picture your lunch table yesterday.",sub:"Scan the whole scene, wide angle.",say:"Picture lunch yesterday. But instead of seeing just your friends, pull the camera back. Wide angle. See the whole room.",hold:12},
        {cue:"Now scan the EDGES.",sub:"Who's sitting alone? Who's at the end, saying nothing?",say:"Now scan the edges of the picture. Who's sitting alone? Who's at the end of a table, there but not really included? The radar looks at edges, not centers.",hold:13},
        {cue:"Recess scan: who's ALMOST in the game?",sub:"Standing near it. Watching. Waiting.",say:"Now scan recess. Who stands near the game but never in it? Watching, waiting for an invite that doesn't come? That hovering is the radar's strongest signal.",hold:13},
        {cue:"Edge kids aren't weird. They're WAITING.",sub:"New, shy, or just left out.",say:"Important: kids on the edge aren't weird. They're waiting. Some are new. Some are shy. Some got left out so many times they stopped trying. All of them are one invite away.",hold:13},
        {cue:"The move: make the invite TINY and EASY.",sub:"\"We need one more.\" \"There's a seat here.\"",say:"When your radar pings, the move is small: we need one more player. There's a seat here. Want in? Six words, tops. Tiny for you, giant for them.",hold:13},
        {cue:"You don't have to be their best friend.",sub:"You just have to open the door.",say:"And relax: you don't have to become their best friend. You just have to open the door. What happens next is up to them.",hold:11},
        {cue:"Radar stays on. One breath.",sub:"Edges first.",say:"One slow breath. Radar stays on today: lunch, recess, group work. Scan the edges first.",hold:10}
      ],
      close:"That's the Exclusion Radar. Someone at the edge of the group will remember, for years, the kid who waved them in." },
    { id:"wordslanddifferently", kind:"sel", demo:"desk", name:"Words Land Differently", tag:"SEL · Impact · 2 min", audience:"4th-6th", src:"HudsonSeed",
      blurb:"The same joke lands soft on one person and hard on another. Impact matters even when intent was good.",
      intro:"Hey, I'm Hanuman. Here's a puzzle: you make a joke, one friend laughs, another goes quiet. Same words. Different landings. Today we figure out why, and what to do when your words land hard.",
      lines:[
        {cue:"Sit tall. One slow breath.",sub:"",say:"Sit tall and take one slow breath.",hold:8},
        {cue:"Words are like throws.",sub:"You control the throw, not the catch.",say:"Think of words like throwing a ball. You control the throw. But you don't control the catch, because you can't see the other person's hands.",hold:12},
        {cue:"Why? Invisible backpacks.",sub:"A joke about failing lands hard on a kid who's struggling.",say:"Why do the same words land differently? Because everyone's carrying different stuff. A joke about failing a test is funny to a kid who aced it, and a punch to a kid who's secretly struggling.",hold:14},
        {cue:"\"I was just joking\" doesn't unbruise anyone.",sub:"Intent is real. So is impact.",say:"Here's the hard truth: saying, I was just joking, doesn't unbruise anyone. Your intent was real. But so is their bruise. Both things are true at once.",hold:13},
        {cue:"Watch the LANDING, not just the laugh.",sub:"Quiet? Fake smile? Looking away?",say:"So become a landing-watcher. After you joke or tease, check the face. Real laugh? Great. Quiet? Fake smile? Looking away? Your words landed hard.",hold:13},
        {cue:"Hard landing? The fix is short.",sub:"\"Hey, that came out wrong. You good?\"",say:"When you spot a hard landing, the fix takes five seconds: hey, that came out wrong. You good? That's it. No big speech.",hold:12},
        {cue:"That tiny check-in is strength, not weakness.",sub:"Only confident people can say \"my bad.\"",say:"And know this: checking in isn't weak. It takes way more confidence to say, my bad, than to double down on a joke that hurt someone.",hold:12},
        {cue:"One breath. Throw kind. Watch the catch.",sub:"",say:"One slow breath. Today: throw your words kindly, and watch how they're caught.",hold:9}
      ],
      close:"That's Words Land Differently. Funny is good. Kind and funny is better. Watch the landing." },
    { id:"takingturnstimer", kind:"sel", demo:"desk", name:"Taking Turns Timer", tag:"SEL · Sharing · 2 min", audience:"PreK3-K", src:"HudsonSeed",
      blurb:"The wait-your-turn muscle: my turn, your turn, my turn again. It always comes back around.",
      intro:"Hi, I'm Hanuman. Waiting for your turn is one of the hardest things in the whole world when you're little. But here's the secret: turns always come back around, like a merry-go-round. Let's build your waiting muscle.",
      lines:[
        {cue:"Sit criss-cross. Hands in your lap.",sub:"",say:"Sit criss-cross with your hands resting in your lap.",hold:8},
        {cue:"Turns go around like a circle.",sub:"My turn... your turn... my turn again!",say:"Turns move in a circle: my turn, your turn, then my turn again. The circle never forgets you.",hold:10},
        {cue:"Waiting has a feeling. Find it.",sub:"Wiggly? Squeezy? \"I want it NOW\"?",say:"Waiting has a feeling in your body. Find it. Is it wiggly? Squeezy? A big I-want-it-now feeling in your chest?",hold:11},
        {cue:"That feeling is your waiting muscle working!",sub:"It gets stronger every time.",say:"That feeling means your waiting muscle is working! Just like legs get stronger from running, your waiting muscle gets stronger every time you wait.",hold:12},
        {cue:"While you wait: breathe like a turtle.",sub:"One slow turtle breath.",say:"Here's what to do while you wait. First: one slow turtle breath. In... and out.",hold:10},
        {cue:"While you wait: cheer for the kid whose turn it is!",sub:"\"Nice one!\" makes waiting fun.",say:"Second: cheer for the kid whose turn it is! Say, nice one! Cheering makes waiting go faster. It's like magic.",hold:11},
        {cue:"While you wait: get your idea ready.",sub:"Plan your awesome turn.",say:"Third: use the waiting time to get ready. Plan your turn. What will you build? Where will you jump? Ready players have the best turns.",hold:12},
        {cue:"And then... it's YOUR turn again!",sub:"The circle always comes back.",say:"And then, just like always, the circle comes back around, and it's your turn again! Waiting worked!",hold:10},
        {cue:"One more turtle breath. Strong muscle!",sub:"",say:"One more slow turtle breath. Your waiting muscle just got stronger. I can tell.",hold:9}
      ],
      close:"That's the Taking Turns Timer. Breathe, cheer, get ready. The circle always, always comes back to you." },
    { id:"sharingchoice", kind:"sel", demo:"desk", name:"Sharing Is My Choice", tag:"SEL · Sharing · 2 min", audience:"PreK3-K", src:"HudsonSeed",
      blurb:"Practicing the offer: noticing you have something someone wants, and choosing to share it.",
      intro:"Hi, I'm Hanuman. Sharing is extra special when nobody makes you do it, when YOU notice, and YOU choose. Today we practice the noticing part and the choosing part.",
      lines:[
        {cue:"Sit tall. One breath.",sub:"",say:"Sit tall and take one nice breath.",hold:8},
        {cue:"Pretend you have a big box of crayons.",sub:"All the best colors!",say:"Pretend you have a big, beautiful box of crayons in front of you. All the best colors. They're yours.",hold:10},
        {cue:"Look over: a friend has NO crayons.",sub:"They're just watching you color.",say:"Now pretend you look over, and a friend has no crayons at all. They're just sitting there, watching you color.",hold:11},
        {cue:"NOTICING is step one.",sub:"You saw it all by yourself!",say:"Guess what? You just did step one: noticing. Nobody told you to look. Your kind eyes saw it all by themselves.",hold:11},
        {cue:"Now comes the CHOICE.",sub:"Your hands. Your crayons. Your choice.",say:"Now comes step two: the choice. They're your crayons. Your hands. Nobody is making you do anything. You get to choose.",hold:11},
        {cue:"Try the sharing words: \"Want some of mine?\"",sub:"Say it out loud, soft.",say:"If you choose to share, here are the words: want some of mine? Try saying it softly right now. Want some of mine?",hold:11},
        {cue:"Look at their pretend face!",sub:"Sharing makes TWO happy people.",say:"Now picture your friend's face when you say it. That big smile? Here's the amazing part: sharing makes two happy people. Them... and you.",hold:12},
        {cue:"Choosing to share feels warm inside.",sub:"That warm feeling is yours to keep.",say:"Sharing you chose all by yourself makes a warm, glowy feeling inside. And that feeling? Nobody has to give it back. It's yours to keep.",hold:12}
      ],
      close:"That's Sharing Is My Choice. Notice with your eyes, choose with your heart. Chosen sharing is the warmest kind." },
    { id:"kindask", kind:"sel", demo:"desk", name:"Kind Ask, Kind Answer", tag:"SEL · Manners · 2 min", audience:"PreK3-K", src:"HudsonSeed",
      blurb:"Please and thank you as connection tools, not just rules.",
      intro:"Hi, I'm Hanuman. Please and thank you aren't just rules grown-ups made up. They're magic connector words: they tell people, I see you, and you matter. Let's practice the magic.",
      lines:[
        {cue:"Sit tall. Get your voice ready.",sub:"Magic words coming.",say:"Sit tall and get your kind voice ready. Magic words are coming.",hold:8},
        {cue:"A grabby ask sounds like: \"GIMME THAT!\"",sub:"How does that feel to hear?",say:"First, listen to a grabby ask: GIMME THAT! Ooh. How does that feel to hear? A little like a push, right?",hold:10},
        {cue:"A kind ask sounds like: \"Can I use that, please?\"",sub:"Feel the difference?",say:"Now a kind ask: can I use that, please? Same wanting, but it feels like a knock on the door instead of a push.",hold:11},
        {cue:"Practice: \"Can I have a turn, please?\"",sub:"Say it in your kindest voice.",say:"Your turn to practice. Say it with me, kind and clear: can I have a turn, please?",hold:10},
        {cue:"Now the answer side! Someone shares with YOU.",sub:"What do we say?",say:"Now flip it. Pretend someone just shared their toy with you. What do we say? Thank you!",hold:10},
        {cue:"Make your thank-you SPARKLE.",sub:"Look at them. Smile. \"Thank you!\"",say:"But here's the secret to a magic thank-you: look right at the person, smile, and mean it. Thank you! A sparkly thank-you makes people want to share again.",hold:12},
        {cue:"Kind asks open doors. Thank-yous keep them open.",sub:"",say:"Kind asks open doors. Thank-yous keep them open. That's how the magic works.",hold:9},
        {cue:"Use both magics today!",sub:"Count how many smiles you make.",say:"Use both magic words today, and watch what happens. Count the smiles you make. I bet it's a lot.",hold:10}
      ],
      close:"That's Kind Ask, Kind Answer. Please opens the door, thank you keeps it open, and kindness walks through." },
    { id:"theinvitation", kind:"sel", demo:"desk", name:"The Invitation", tag:"SEL · Friendship · 2 min", audience:"1st-3rd", src:"HudsonSeed",
      blurb:"Practicing the five bravest playground words: do you want to play?",
      intro:"Hey, I'm Hanuman. There are five words that take more courage than almost anything on the playground: do you want to play? Five little words. Today we make them easy.",
      lines:[
        {cue:"Sit tall. One brave breath.",sub:"",say:"Sit tall and take one brave breath.",hold:8},
        {cue:"Why is inviting scary?",sub:"Because they might say no.",say:"Let's be honest about why inviting someone is scary: because they might say no. That's it. That's the whole scary part.",hold:11},
        {cue:"But look what's on the other side...",sub:"A new friend. A better game. A great day.",say:"But look what's on the other side of those five words: maybe a new friend. A better game. Someone's whole day turned around. Big prizes behind one small door.",hold:12},
        {cue:"Practice the words: \"Do you want to play?\"",sub:"Say them quietly right now.",say:"Let's practice so the words are ready. Say them quietly right now: do you want to play? Again, a little braver: do you want to play?",hold:12},
        {cue:"Add the friendly extras.",sub:"Their name + what you're playing.",say:"Now add the friendly extras: their name at the front, and the game at the end. Maya, do you want to play tag? See? Even warmer.",hold:12},
        {cue:"If they say YES: awesome!",sub:"New player unlocked.",say:"If they say yes: awesome! New player unlocked. The game just got better.",hold:9},
        {cue:"If they say no: you're still a hero.",sub:"\"Maybe next time!\" and move on.",say:"And if they say no? Listen carefully: you're still a hero. Brave is in the asking, not the answer. Say, maybe next time! and move on. Your courage still counts.",hold:13},
        {cue:"Who will you invite today?",sub:"Pick someone in your mind.",say:"Now, think: who could you invite today? Someone new? Someone on the edge of the game? Pick them in your mind. The words are loaded and ready.",hold:12}
      ],
      close:"That's The Invitation. Five brave words. Most friendships in the world started with somebody saying them first." },
    { id:"complimentcraft", kind:"sel", demo:"desk", name:"Compliment Craft", tag:"SEL · Kindness · 2 min", audience:"1st-3rd", src:"HudsonSeed",
      blurb:"Real compliments are specific: not \"cool\" but \"I liked how you kept trying.\" Build one and deliver it today.",
      intro:"Hey, I'm Hanuman. There are two kinds of compliments: the flat kind, like cool, and the golden kind, the kind people remember for weeks. Today you learn to craft the golden kind.",
      lines:[
        {cue:"Sit tall. One breath.",sub:"Compliment workshop is open.",say:"Sit tall, one slow breath. The compliment workshop is open.",hold:9},
        {cue:"Flat compliment: \"cool.\" \"nice.\" \"good job.\"",sub:"Fine... but forgettable.",say:"First, the flat kind: cool. Nice. Good job. They're fine. But they slide right off, because they could be about anything or anyone.",hold:11},
        {cue:"Golden compliments are SPECIFIC.",sub:"They prove you really noticed.",say:"Golden compliments are specific. They name the exact thing, which proves you actually noticed. And being noticed is what people love.",hold:11},
        {cue:"Formula: \"I liked how you...\"",sub:"...kept trying. ...helped Sam up. ...drew those clouds.",say:"Here's the formula: I liked how you, plus the exact thing. I liked how you kept trying on that hard problem. I liked how you helped Sam up. I liked how you drew those clouds.",hold:14},
        {cue:"Now build one for real.",sub:"Think of someone from today or yesterday.",say:"Now build a real one. Think of someone from today or yesterday who did something you noticed. A classmate, a teacher, someone at home.",hold:12},
        {cue:"Fill in the formula.",sub:"\"I liked how you ______.\"",say:"Fill in the formula in your head: I liked how you... what? Make it exact. Make it true. That's your golden compliment, crafted.",hold:12},
        {cue:"Now plan the delivery.",sub:"Today. Face to face. Watch their face.",say:"Now plan the delivery: sometime today, face to face. And watch their face when it lands. Golden compliments make people glow.",hold:11},
        {cue:"One breath. Compliment loaded.",sub:"",say:"One slow breath. Your compliment is loaded and ready for delivery.",hold:8}
      ],
      close:"That's Compliment Craft. Specific, true, delivered. One golden compliment a day makes you the kid everyone loves to be around." },
    { id:"disagreelikefriends", kind:"sel", demo:"desk", name:"Disagree Like Friends", tag:"SEL · Talking · 2 min", audience:"1st-3rd", src:"HudsonSeed",
      blurb:"\"I see it differently\" without it becoming a fight. Disagreement is not war.",
      intro:"Hey, I'm Hanuman. Friends don't agree about everything. Best pizza topping? Best game? Best superhero? Friends disagree all the time and stay friends. There's a trick to it. Let's learn it.",
      lines:[
        {cue:"Sit tall. One breath.",sub:"",say:"Sit tall and take one slow breath.",hold:8},
        {cue:"Disagreeing is NORMAL.",sub:"Different brains see different things.",say:"First, the truth: disagreeing is totally normal. You have different brains, different eyes, different favorites. Of course you see things differently sometimes.",hold:12},
        {cue:"A disagreement becomes a fight when we attack the PERSON.",sub:"\"You're dumb\" = fight starter.",say:"A disagreement only becomes a fight when someone attacks the person instead of talking about the idea. You're dumb, is a fight starter. Every time.",hold:12},
        {cue:"The friend way: \"I see it differently.\"",sub:"Four peace-keeping words.",say:"The friend way starts with four words: I see it differently. Try them quietly right now. I see it differently. No attack. Just honesty.",hold:12},
        {cue:"Then say YOUR side, about the IDEA.",sub:"\"I think tag is better because everyone can play.\"",say:"Then say your side, keeping it about the idea: I think tag is better because everyone can play at once. Idea versus idea. Not kid versus kid.",hold:13},
        {cue:"Then the champion move: \"Why do you like yours?\"",sub:"Actually listen to the answer.",say:"Then the real champion move: ask, why do you like yours? And actually listen. You might learn something. You might even change your mind. That's allowed!",hold:13},
        {cue:"You can END a disagreement still disagreeing!",sub:"\"We like different stuff. Wanna play?\"",say:"And here's the part nobody teaches: you're allowed to end a disagreement still disagreeing! We like different stuff. Cool. Wanna play? Friendship survives.",hold:12},
        {cue:"One breath. Ideas can wrestle. Friends don't have to.",sub:"",say:"One slow breath. Remember: ideas can wrestle all day long. Friends don't have to.",hold:10}
      ],
      close:"That's Disagree Like Friends. Different opinions, same team. That's what strong friendships are made of." },
    { id:"interruptioncatcher", kind:"sel", demo:"desk", name:"The Interruption Catcher", tag:"SEL · Listening · 2 min", audience:"1st-3rd", src:"HudsonSeed",
      blurb:"Noticing the urge to interrupt, holding your idea like a firefly in your hands until it's your turn.",
      intro:"Hey, I'm Hanuman. You know that feeling when someone's talking and your idea is SO good it starts jumping out of your mouth? Today we learn to catch it, hold it gently, and let it go at the right time.",
      lines:[
        {cue:"Sit tall. Cup your hands together.",sub:"Make a little cage, like for a firefly.",say:"Sit tall and cup your hands together, like a gentle little cage you'd hold a firefly in. This is your idea catcher.",hold:10},
        {cue:"The interrupt-urge feels like POPCORN.",sub:"Your idea wants to POP out. Feel it?",say:"When someone else is talking and you get an idea, it feels like popcorn: hot, jumpy, ready to pop right out of your mouth. Everyone knows that feeling.",hold:12},
        {cue:"Popping out = interrupting.",sub:"It squishes the other person's turn.",say:"But when it pops out while someone's still talking, that's interrupting. And it squishes the other person's turn, like stepping on their sandcastle.",hold:11},
        {cue:"So CATCH the idea instead.",sub:"Close your hands gently around it.",say:"So here's the move: catch the idea instead. Feel it coming, and close your hands gently around it, like catching that firefly. Got it. Safe.",hold:12},
        {cue:"Whisper to it: \"Wait, little idea.\"",sub:"It won't fly away. Promise.",say:"Whisper to it inside: wait, little idea. Your turn is coming. And here's the good news: held ideas don't fly away as fast as you fear.",hold:12},
        {cue:"Keep listening while you hold it.",sub:"You might even catch a BETTER idea.",say:"Keep listening while you hold it. Funny thing: sometimes while you listen, your idea grows even better. Or you catch a second one.",hold:11},
        {cue:"When the talker finishes... open your hands!",sub:"NOW your idea gets to fly.",say:"Then, when the other person finishes, open your hands and let your idea fly! Now it gets heard all the way, with everyone actually listening.",hold:12},
        {cue:"One breath. Catcher ready.",sub:"",say:"One slow breath. Your interruption catcher is ready for the next group talk.",hold:9}
      ],
      close:"That's the Interruption Catcher. Catch it, hold it, release it at your turn. Ideas heard fully beat ideas popped early." },
    { id:"peacepath", kind:"sel", demo:"desk", name:"The Peace Path", tag:"SEL · Conflict · 2 min", audience:"4th-6th", src:"HudsonSeed",
      blurb:"Two-person conflict steps: each person speaks, each repeats the other back, together find one fix to try.",
      intro:"Hey, I'm Hanuman. When two people are stuck in a real conflict, yelling louder never fixes it. But there's a path, four steps, that works so well that grown-up peacemakers use it. Walk it with me.",
      lines:[
        {cue:"Sit tall. One slow breath.",sub:"Cool heads walk the path.",say:"Sit tall and take one slow breath. The peace path only works with a cooled-down head, so breath first, always.",hold:11},
        {cue:"STEP 1: Person A speaks. Just the facts + the feeling.",sub:"\"When ___ happened, I felt ___.\"",say:"Step one: the first person speaks, short and honest. The formula: when this happened, I felt this. When you showed everyone my drawing, I felt embarrassed. No insults. Facts plus feeling.",hold:14},
        {cue:"STEP 2: Person B repeats it BACK.",sub:"\"So you felt ___ when ___. Did I get it?\"",say:"Step two, the step almost nobody does: the second person repeats it back. So you felt embarrassed when I showed your drawing. Did I get that right? Being heard cools a conflict by half.",hold:14},
        {cue:"STEP 3: Switch. B speaks, A repeats back.",sub:"Same rules. Same respect.",say:"Step three: switch. Now the second person says their side, when this happened, I felt this, and the first person repeats it back. Same rules, same respect, both directions.",hold:13},
        {cue:"STEP 4: Ask together: \"What's ONE thing we can try?\"",sub:"One fix. Small is fine.",say:"Step four: ask together, what's one thing we can try? One fix, and small is fine. I'll ask before showing your stuff. We'll take turns picking the game. Deal.",hold:13},
        {cue:"Notice what the path NEVER asks.",sub:"Nobody has to say who's ALL wrong.",say:"Notice what the path never asks: it never asks who was all right and who was all wrong. Most conflicts are mixed. The path skips the blame contest and goes straight to the fix.",hold:13},
        {cue:"Can't walk it alone? Get a guide.",sub:"A teacher or counselor can walk it with you.",say:"And if the other person won't walk the path, or it's too big or too hot? Get a guide. A teacher or counselor can walk the path with you both. That's wisdom, not weakness.",hold:13},
        {cue:"One breath. Path memorized.",sub:"Speak, repeat, switch, fix.",say:"One slow breath. The path in four words: speak, repeat, switch, fix. Keep it in your pocket.",hold:10}
      ],
      close:"That's the Peace Path. Speak, repeat back, switch, find one fix. It works because everyone finally gets heard." },
    { id:"teamglue", kind:"sel", demo:"desk", name:"Team Glue", tag:"SEL · Teamwork · 2 min", audience:"4th-6th", src:"HudsonSeed",
      blurb:"What actually holds a group project together: roles, encouragement, and pulling your weight.",
      intro:"Hey, I'm Hanuman. Group projects: sometimes great, sometimes a disaster. The difference is never luck. It's glue. Three kinds of glue, actually. Learn them, and you can hold any team together.",
      lines:[
        {cue:"Sit tall. One breath.",sub:"Think of your last group project.",say:"Sit tall, one slow breath, and think of your last group project. The good, the bad, the chaos.",hold:10},
        {cue:"GLUE 1: Everyone gets a real ROLE.",sub:"No role = someone drifts away.",say:"Glue number one: roles. Every person needs a real job: the researcher, the drawer, the writer, the presenter. A teammate without a role drifts away. Every time.",hold:13},
        {cue:"Match roles to strengths.",sub:"Good drawer draws. Brave talker presents.",say:"And match roles to strengths: the good drawer draws, the brave talker presents, the organized one keeps the checklist. Teams win when people do what they're good at.",hold:12},
        {cue:"GLUE 2: Encouragement.",sub:"\"That part looks great\" keeps engines running.",say:"Glue number two: encouragement. Teams run on it like cars run on fuel. That part looks great. Good idea. We're getting there. Five seconds to say, hours of energy created.",hold:13},
        {cue:"Zero encouragement = team runs out of gas.",sub:"Criticism-only teams quit early.",say:"Watch what happens on teams with zero encouragement: they run out of gas and start picking at each other. Criticism-only teams quit early.",hold:11},
        {cue:"GLUE 3: Pull YOUR weight.",sub:"The strongest glue is your own work.",say:"Glue number three, the strongest: pull your own weight. Do your part, on time, done right. One person slacking unsticks the whole team faster than anything.",hold:12},
        {cue:"Slacker on the team? Use glue, not blame.",sub:"\"We need your part. Which piece do you want?\"",say:"And if someone else is slacking? Try glue before blame: hey, we need your part. Which piece do you want to take? Sometimes slackers are just kids without a role.",hold:13},
        {cue:"One breath. Three glues loaded.",sub:"Roles. Cheers. Your own work.",say:"One slow breath. Three glues: roles, cheers, and your own work. Next group project, you're the one holding it together.",hold:11}
      ],
      close:"That's Team Glue. Roles, encouragement, pull your weight. Every great team you've ever seen is just those three glues." },
    { id:"sayingnokindly", kind:"sel", demo:"desk", name:"Saying No Kindly", tag:"SEL · Boundaries · 2 min", audience:"4th-6th", src:"HudsonSeed",
      blurb:"Boundaries without meanness: no thank you, I don't want to, please stop. A no can be kind and still be a no.",
      intro:"Hey, I'm Hanuman. Some kids think saying no is mean, so they say yes to everything and feel awful. Other kids say no like a slammed door. Today: the third way. A no that's kind, clear, and still a real no.",
      lines:[
        {cue:"Sit tall. One slow breath.",sub:"",say:"Sit tall and take one slow breath.",hold:8},
        {cue:"Truth first: you're ALLOWED to say no.",sub:"To games, trades, dares, hugs, anything.",say:"First truth: you are allowed to say no. To a game you don't want to play, a trade that feels unfair, a dare, a joke about you, even a hug. Your no is yours.",hold:13},
        {cue:"A kind no is SHORT and CLEAR.",sub:"\"No thank you.\" \"I don't want to.\"",say:"A kind no is short and clear: no thank you. I don't want to. I'm good. Notice: no meanness, no excuses, no ten-minute story. Short and clear IS the kindness.",hold:13},
        {cue:"Practice: \"No thank you, I don't want to trade.\"",sub:"Calm voice. Friendly face.",say:"Practice one quietly: no thank you, I don't want to trade. Calm voice, friendly face, spine straight. Feel how that's kind AND strong at the same time?",hold:13},
        {cue:"If they push: repeat it. Same words. Same calm.",sub:"A repeated no is still kind.",say:"If they push, and pushers push, you don't need new words. Repeat the same ones, same calm: no thank you. A no doesn't get meaner by being repeated. It just gets clearer.",hold:13},
        {cue:"For stop-situations: \"Please stop.\"",sub:"Name it once, clearly.",say:"When someone's doing something to you, teasing, poking, grabbing your stuff, the words are: please stop. Once, clearly, looking at them. That's a boundary, out loud.",hold:12},
        {cue:"If \"please stop\" doesn't work, level up.",sub:"Walk away. Tell a trusted adult. Not tattling. Protecting.",say:"And if please stop doesn't work? Level up: walk away, and tell a trusted adult. That's not tattling. Tattling is trying to get someone in trouble. This is protecting yourself. Big difference.",hold:14},
        {cue:"One breath. Your no is ready.",sub:"Kind. Clear. Yours.",say:"One slow breath. Your kind no is packed and ready: short, clear, calm, and completely yours.",hold:10}
      ],
      close:"That's Saying No Kindly. You can be a kind person and still have fences. The kindest people usually do." },
    { id:"gossipofframp", kind:"sel", demo:"desk", name:"The Gossip Off-Ramp", tag:"SEL · Choices · 2 min", audience:"4th-6th", src:"HudsonSeed",
      blurb:"How to exit a mean conversation without a scene: change the subject, say something kind, or just walk.",
      intro:"Hey, I'm Hanuman. Gossip is like a highway: easy to get on, fast-moving, and it always crashes eventually. You don't have to give a speech to get off it. You just need to know where the exits are. Three off-ramps, coming up.",
      lines:[
        {cue:"Sit tall. One breath.",sub:"",say:"Sit tall and take one slow breath.",hold:8},
        {cue:"Picture it: the group starts talking about someone.",sub:"Someone who isn't there.",say:"Picture the moment: you're with a group, and the talk turns mean, about somebody who isn't there to speak for themselves. You know the feeling. Everything speeds up.",hold:13},
        {cue:"First, feel the PULL.",sub:"Joining feels safe. That's the trap.",say:"Notice the pull. Joining in feels safe, like it keeps the spotlight off you. That's the trap that keeps the gossip highway full.",hold:11},
        {cue:"OFF-RAMP 1: Change the subject.",sub:"\"Oh! Did you see the game last night?\"",say:"Off-ramp one, the smoothest: change the subject. Oh, that reminds me, did you see the game last night? Are we still playing at recess? Gossip runs out of gas fast when someone changes the road.",hold:14},
        {cue:"OFF-RAMP 2: Drop one kind fact.",sub:"\"She's actually really nice to me.\"",say:"Off-ramp two, the braver one: drop one kind fact about the person. Honestly, she's always been nice to me. That's it. One sentence. It doesn't start a fight, but it slows the whole highway down.",hold:14},
        {cue:"OFF-RAMP 3: Just leave.",sub:"\"I gotta go.\" Feet are allowed to talk.",say:"Off-ramp three, always available: just leave. I gotta go, and walk. No speech needed. Your feet are allowed to say what your mouth doesn't want to.",hold:12},
        {cue:"Why bother? The whisper test.",sub:"They talk ABOUT people TO you... and about you to others.",say:"Why does it matter? The whisper test: people who gossip to you about others... gossip about you to others. Leaving the highway protects the absent kid today, and you tomorrow.",hold:13},
        {cue:"One breath. Exits memorized.",sub:"Change it. Kind fact. Or walk.",say:"One slow breath. Three exits, memorized: change the subject, drop a kind fact, or walk. You'll need one this week. Now you have it.",hold:11}
      ],
      close:"That's the Gossip Off-Ramp. You can't stop every mean conversation. But you never have to ride along." },
    { id:"safeornotsafe", kind:"sel", demo:"desk", name:"Safe or Not Safe?", tag:"SEL · Safety · 2 min", audience:"PreK3-K", src:"HudsonSeed",
      blurb:"The very first sort every choice goes through. When unsure, ask a grown-up.",
      intro:"Hi, I'm Hanuman. Before any choice, there's one super-important question that comes first, always: is it safe, or not safe? Let's practice sorting, like sorting toys into bins.",
      lines:[
        {cue:"Sit tall. Make two invisible bins.",sub:"Safe bin. Not-safe bin.",say:"Sit tall and put two invisible bins in front of you. One says safe. One says not safe. We're going to sort!",hold:10},
        {cue:"Sort: walking down the stairs slowly.",sub:"Which bin?",say:"First one: walking down the stairs slowly, holding the rail. Which bin? Point to it. Yes! Safe bin!",hold:10},
        {cue:"Sort: climbing UP the slide when kids are sliding DOWN.",sub:"Which bin?",say:"Next: climbing up the slide while kids are coming down. Which bin? That's right: not safe. Crash city!",hold:11},
        {cue:"Sort: asking before petting a dog.",sub:"Which bin?",say:"Next: asking the owner before petting a dog you don't know. Which bin? Safe bin! Asking first is what safe kids do.",hold:11},
        {cue:"Sort: keeping a secret that makes your tummy feel bad.",sub:"Which bin?",say:"Here's a tricky one: keeping a secret that makes your tummy feel bad or scared. Which bin? Not safe. Bad-tummy secrets always go to a grown-up you trust.",hold:13},
        {cue:"Some choices are TRICKY to sort.",sub:"Not sure? That's important to notice!",say:"Sometimes a choice is tricky, and you can't tell which bin. Guess what? Noticing you're not sure is a superpower.",hold:11},
        {cue:"The not-sure rule: ASK A GROWN-UP.",sub:"Teacher. Parent. Someone you trust.",say:"Here's the golden rule: when you're not sure, ask a grown-up you trust. A teacher, a parent, a grandma. Not-sure means ask-first. Every time.",hold:12},
        {cue:"Sort first, choose second!",sub:"You're a safety sorter now.",say:"You're an official safety sorter now! Remember the order: sort first, choose second. Safe bin choices are go. Not-safe means stop. Not-sure means ask.",hold:12}
      ],
      close:"That's Safe or Not Safe. Sort every choice first, and when you can't tell, that's exactly what trusted grown-ups are for." },
    { id:"bigdeallittledeal", kind:"sel", demo:"desk", name:"Big Deal or Little Deal?", tag:"SEL · Problem size · 2 min", audience:"PreK3-K", src:"HudsonSeed",
