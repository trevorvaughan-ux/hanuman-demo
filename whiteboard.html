<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hanuman · Whiteboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--teal:#2F6B6E;--teal-d:#136b6b;--cream:#FDF8F0;--charcoal:#3A3A3A;--gold:#D99A4E;--display:"Playfair Display",Georgia,serif;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:"DM Sans",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
  html,body{height:100%;}
  body{background:var(--cream);color:var(--charcoal);overflow:hidden;}
  #stage{height:100vh;height:100dvh;display:flex;flex-direction:column;}
  #topbar{display:flex;justify-content:space-between;align-items:center;padding:16px 26px;}
  #brand{font-weight:800;color:var(--teal-d);font-size:20px;letter-spacing:-.5px;}
  #brand b{color:var(--gold);}
  #right{display:flex;gap:16px;align-items:center;}
  #voiceToggle{background:none;border:none;color:var(--teal-d);font-weight:700;cursor:pointer;font-size:15px;}
  #timer{font-variant-numeric:tabular-nums;font-size:32px;font-weight:800;color:var(--teal-d);}
  #menu{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:26px;padding:24px 6vw 48px;overflow-y:auto;min-height:0;}
  #menuTitle{font-family:var(--display);font-size:clamp(26px,4vw,46px);font-weight:700;color:var(--teal-d);text-align:center;}
  #menuSub{font-size:clamp(15px,1.8vw,20px);color:var(--charcoal);text-align:center;margin-top:-14px;}
  #cards{display:flex;flex-wrap:wrap;gap:18px;justify-content:center;max-width:1100px;}
  .card{background:#fff;border:2px solid #e6efef;border-left:8px solid var(--teal);border-radius:16px;padding:22px 24px;width:250px;cursor:pointer;transition:.15s;text-align:left;}
  .card:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,.08);}
  .card h3{font-size:22px;color:var(--teal-d);margin-bottom:6px;}
  .card .tag{display:inline-block;background:var(--cream);color:var(--gold);font-weight:700;font-size:12px;padding:3px 9px;border-radius:20px;margin-bottom:10px;}
  .card p{font-size:14px;color:var(--charcoal);line-height:1.45;}
  .card .src{font-size:11px;color:#9bb;margin-top:10px;}.watchBtn{display:inline-block;margin-top:10px;background:var(--teal);color:#fff;font-weight:700;font-size:12px;padding:6px 14px;border:none;border-radius:20px;cursor:pointer;}.watchBtn:hover{background:var(--teal-d);}#hanumanModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;align-items:center;justify-content:center;}#hanumanModal.show{display:flex;}#hanumanModal video{max-width:90vw;max-height:80vh;border-radius:16px;}#hanumanModal .closeModal{position:absolute;top:20px;right:28px;color:#fff;font-size:32px;cursor:pointer;background:none;border:none;}
  #player{flex:1;display:none;flex-direction:column;}
  #scene{flex:1;display:flex;align-items:center;justify-content:center;gap:4vw;padding:0 4vw;}
  #monkeyWrap{flex:0 0 28%;max-width:320px;}
  #ballWrap{flex:0 0 40%;display:flex;align-items:center;justify-content:center;height:58vh;position:relative;overflow:visible;}
  #ball{width:32vh;height:32vh;border-radius:50%;will-change:transform;}
  /* meditation: warm glow that spreads outward in rings */
  #ball.glow{background:radial-gradient(circle at 50% 50%,rgba(217,154,78,.95),rgba(217,154,78,.38) 45%,rgba(31,138,138,.14) 70%,rgba(31,138,138,0) 80%);box-shadow:0 0 90px rgba(217,154,78,.55);animation:glowPulse 6s ease-in-out infinite;}
  @keyframes glowPulse{0%,100%{transform:scale(.9);}50%{transform:scale(1.08);}}
  .ripple{position:absolute;left:50%;top:50%;width:30vh;height:30vh;border-radius:50%;border:3px solid rgba(217,154,78,.45);transform:translate(-50%,-50%) scale(.35);animation:rippleOut 4s ease-out forwards;pointer-events:none;}
  @keyframes rippleOut{0%{transform:translate(-50%,-50%) scale(.35);opacity:.7;}100%{transform:translate(-50%,-50%) scale(2.6);opacity:0;}}
  .card.med{border-left-color:var(--gold);}
  .card.chair{border-left-color:#3fa34d;}
  .card.sel{border-left-color:#7d6bb8;}
  .card.cls{border-left-color:#c9704f;}
  /* ---- desk demo: Hanuman seated at a school desk, performing each cue ---- */
  #deskWrap{display:none;flex:0 0 52%;max-width:460px;align-items:center;justify-content:center;height:58vh;}
  #deskWrap svg{width:100%;height:100%;max-height:56vh;}
  #deskSvg #dmUpper,#deskSvg .armL,#deskSvg .armR,#deskSvg #dmFeet,#deskSvg .lid{transition:transform 1.4s ease-in-out;transform-box:fill-box;}
  #deskSvg #dmUpper{transform-origin:50% 100%;}
  #deskSvg .armL,#deskSvg .armR{transform-origin:50% 8%;}
  #deskSvg .lid{transform:translateY(-11px);}
  #deskSvg[data-pose="tall"] #dmUpper{transform:translateY(-7px);}
  #deskSvg[data-pose="feet"] #dmFeet{animation:feetTap 1.1s ease-in-out 3;}
  #deskSvg[data-pose="roll"] .armL{animation:rollA 1.5s ease-in-out 2;}
  #deskSvg[data-pose="roll"] .armR{animation:rollB 1.5s ease-in-out 2;}
  #deskSvg[data-pose="hands"] .armL,#deskSvg[data-pose="hands"] .armR{animation:settleDown .9s ease-out 1;}
  #deskSvg[data-pose="soft"] .lid{transform:translateY(-4px);}
  #deskSvg[data-pose="soft"] #dmUpper{transform:translateY(-6px);}
  #deskSvg[data-pose="inhale"] #dmUpper{transform:translateY(-10px) scale(1.035);transition-duration:3s;}
  #deskSvg[data-pose="exhale"] #dmUpper{transform:translateY(-5px) scale(1);transition-duration:4s;}
  #deskSvg[data-pose="steady"] #dmUpper{transform:translateY(-5px);}
  #deskSvg[data-pose="breathe"] #dmUpper{animation:deskBreath 8s ease-in-out 1 forwards;}
  @keyframes feetTap{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
  @keyframes rollA{0%,100%{transform:rotate(0deg);}30%{transform:rotate(-15deg) translateY(-4px);}65%{transform:rotate(7deg);}}
  @keyframes rollB{0%,100%{transform:rotate(0deg);}30%{transform:rotate(15deg) translateY(-4px);}65%{transform:rotate(-7deg);}}
  @keyframes settleDown{0%{transform:translateY(-9px);}100%{transform:translateY(0);}}
  @keyframes deskBreath{0%,100%{transform:translateY(-5px) scale(1);}45%{transform:translateY(-10px) scale(1.035);}}
  #deskSvg #dmHead{transition:transform 1.4s ease-in-out;transform-box:fill-box;transform-origin:50% 92%;}
  #deskSvg[data-pose="arch"] #dmUpper{transform:translateY(-7px) scale(1.02);}
  #deskSvg[data-pose="arch"] #dmHead{transform:rotate(-5deg) translateY(-3px);}
  #deskSvg[data-pose="arch"] .armL{transform:rotate(-7deg) translateY(-3px);}
  #deskSvg[data-pose="arch"] .armR{transform:rotate(7deg) translateY(-3px);}
  #deskSvg[data-pose="round"] #dmUpper{transform:translateY(4px) scale(.985);}
  #deskSvg[data-pose="round"] #dmHead{transform:rotate(6deg) translateY(8px);}
  #deskSvg[data-pose="round"] .armL{transform:rotate(8deg) translateY(3px);}
  #deskSvg[data-pose="round"] .armR{transform:rotate(-8deg) translateY(3px);}
  #deskSvg[data-pose="shake"] .armL{animation:shakeA .45s ease-in-out 6;}
  #deskSvg[data-pose="shake"] .armR{animation:shakeB .45s ease-in-out 6;}
  @keyframes shakeA{0%,100%{transform:rotate(-30deg) translateY(-6px);}50%{transform:rotate(-48deg) translateY(-10px);}}
  @keyframes shakeB{0%,100%{transform:rotate(30deg) translateY(-6px);}50%{transform:rotate(48deg) translateY(-10px);}}
  #deskSvg[data-pose="center"] #dmUpper{transform:translateY(-4px);}
  #deskSvg .pup{transition:transform 1.2s ease-in-out;transform-box:fill-box;}
  #deskSvg #dmFace{transition:transform 1.8s ease-in-out;transform-box:fill-box;}
  #deskSvg #dmReachR,#deskSvg #dmReachL{opacity:0;transition:opacity 1.6s ease-in-out;}
  #deskSvg .armL,#deskSvg .armR{transition:transform 1.4s ease-in-out,opacity 1.6s ease-in-out;}
  #deskSvg[data-pose="twistR"] #dmUpper{transform:scaleX(.86) rotate(3deg);transition-duration:2.2s;}
  #deskSvg[data-pose="twistR"] #dmHead{transform:translateX(11px) scaleX(.93);transition-duration:2.2s;}
  #deskSvg[data-pose="twistR"] #dmFace{transform:translateX(10px);transition-duration:2.2s;}
  #deskSvg[data-pose="twistR"] .pup{transform:translateX(5px);}
  #deskSvg[data-pose="twistR"] .armL{opacity:0;}
  #deskSvg[data-pose="twistR"] #dmReachR{opacity:1;}
  #deskSvg[data-pose="twistR"] .armR{transform:rotate(-42deg) translate(-6px,-4px);transition-duration:2.2s;}
  #deskSvg[data-pose="twistL"] #dmUpper{transform:scaleX(.86) rotate(-3deg);transition-duration:2.2s;}
  #deskSvg[data-pose="twistL"] #dmHead{transform:translateX(-11px) scaleX(.93);transition-duration:2.2s;}
  #deskSvg[data-pose="twistL"] #dmFace{transform:translateX(-10px);transition-duration:2.2s;}
  #deskSvg[data-pose="twistL"] .pup{transform:translateX(-5px);}
  #deskSvg[data-pose="twistL"] .armR{opacity:0;}
  #deskSvg[data-pose="twistL"] #dmReachL{opacity:1;}
  #deskSvg[data-pose="twistL"] .armL{transform:rotate(42deg) translate(6px,-4px);transition-duration:2.2s;}
  #deskSvg[data-pose="wings"] .armL{transform:rotate(-78deg) translateY(-4px);}
  #deskSvg[data-pose="wings"] .armR{transform:rotate(78deg) translateY(-4px);}
  #deskSvg #dmEagle,#deskSvg #dmEagle2{opacity:0;transition:opacity 1.4s ease-in-out,transform 1.4s ease-in-out;transform-box:fill-box;}
  #deskSvg[data-pose="wrap"] .armL,#deskSvg[data-pose="wrap"] .armR{opacity:0;}
  #deskSvg[data-pose="wrap"] #dmEagle{opacity:1;}
  #deskSvg[data-pose="wrapup"] .armL,#deskSvg[data-pose="wrapup"] .armR{opacity:0;}
  #deskSvg[data-pose="wrapup"] #dmEagle{opacity:1;transform:translateY(-10px);}
  #deskSvg[data-pose="wrapup"] #dmUpper{transform:translateY(-5px);}
  #deskSvg[data-pose="wrap2"] .armL,#deskSvg[data-pose="wrap2"] .armR{opacity:0;}
  #deskSvg[data-pose="wrap2"] #dmEagle2{opacity:1;}
  #deskSvg[data-pose="wrapup2"] .armL,#deskSvg[data-pose="wrapup2"] .armR{opacity:0;}
  #deskSvg[data-pose="wrapup2"] #dmEagle2{opacity:1;transform:translateY(-10px);}
  #deskSvg[data-pose="wrapup2"] #dmUpper{transform:translateY(-5px);}
  #deskSvg[data-pose="fold"] #dmUpper{transform:translateY(24px) scale(1,.84);transition-duration:2.6s;}
  #deskSvg[data-pose="fold"] #dmHead{transform:rotate(8deg) translateY(12px);transition-duration:2.6s;}
  #deskSvg[data-pose="fold"] .armL{transform:rotate(-14deg) translateY(10px);transition-duration:2.6s;}
  #deskSvg[data-pose="fold"] .armR{transform:rotate(14deg) translateY(10px);transition-duration:2.6s;}
  #deskSvg[data-pose="fold"] .lid{transform:translateY(-4px);}
  #deskSvg[data-pose="rollup"] #dmUpper{transform:translateY(-4px);transition-duration:4.5s;}
  #deskSvg[data-pose="rollup"] #dmHead{transform:none;transition-duration:5.5s;}
  #deskSvg[data-pose="rollup"] .armL,#deskSvg[data-pose="rollup"] .armR{transform:none;transition-duration:4.5s;}
  #deskSvg[data-pose="earR"] #dmHead{transform:rotate(15deg);transition-duration:2.4s;}
  #deskSvg[data-pose="earL"] #dmHead{transform:rotate(-15deg);transition-duration:2.4s;}
  #deskSvg[data-pose="chinDown"] #dmHead{transform:translateY(9px) rotate(0deg);transition-duration:2.4s;}
  #deskSvg[data-pose="chinSweepL"] #dmHead{animation:chinSweepL 6s ease-in-out 1 forwards;}
  @keyframes chinSweepL{0%{transform:rotate(15deg);}45%{transform:rotate(6deg) translateY(8px);}60%{transform:rotate(0deg) translateY(9px);}80%{transform:rotate(-8deg) translateY(5px);}100%{transform:rotate(-15deg);}}
  #deskSvg[data-pose="circle"] #dmHead{animation:neckCircle 11s ease-in-out 1 forwards;}
  @keyframes neckCircle{0%{transform:rotate(15deg);}25%{transform:rotate(6deg) translateY(8px);}45%{transform:rotate(-15deg);}65%{transform:rotate(-6deg) translateY(8px);}90%{transform:rotate(15deg);}100%{transform:rotate(0deg);}}
  #cuebar{text-align:center;padding:0 6vw 2vh;}
  #cue{font-size:clamp(24px,4vw,48px);font-weight:800;color:var(--charcoal);min-height:1.3em;line-height:1.25;}
  #sub{font-size:clamp(14px,1.7vw,21px);color:var(--teal-d);margin-top:8px;font-weight:600;min-height:1.2em;}
  #controls{display:flex;justify-content:center;gap:14px;padding-bottom:4vh;}
  .btn{border:none;border-radius:12px;padding:14px 28px;font-size:18px;font-weight:700;cursor:pointer;}
  .primary{background:var(--teal);color:#fff;}.primary:hover{background:var(--teal-d);}
  .ghost{background:transparent;color:var(--teal-d);border:2px solid var(--teal);}
  .hide{display:none !important;}
  /* phones: stack monkey above ball, shrink, keep controls on screen */
  @media (max-width:640px){
    #topbar{padding:12px 16px;}
    #brand{font-size:17px;}
    #timer{font-size:26px;}
    #menu{gap:16px;padding:0 5vw;}
    #cards{gap:12px;}
    .card{width:min(300px,88vw);padding:18px 18px;}
    #scene{flex-direction:column;gap:2vh;padding:0 5vw;}
    #monkeyWrap{flex:0 0 auto;width:110px;max-width:110px;}
    #ballWrap{flex:0 0 auto;height:auto;}
    #deskWrap{flex:0 0 auto;height:auto;max-width:88vw;}
    #deskWrap svg{max-height:42vh;}
    #ball{width:46vw;height:46vw;}
    #cuebar{padding:0 5vw 1.5vh;}
    #controls{flex-wrap:wrap;padding-bottom:3vh;}
    .btn{padding:13px 22px;font-size:17px;}
  }
</style>
</head>
<body>
<div id="stage">
  <div id="topbar">
    <div id="brand">HudsonSeed · <b>Hanuman</b></div>
    <div id="right"><button id="voiceToggle">🔊 voice on</button><div id="timer">02:00</div></div>
  </div>

  <div id="menu">
    <div>
      <div id="menuTitle">Pick a reset for your class</div>
      <div id="menuSub">Tap one. Hanuman runs it on the board while you catch your breath.</div>
    </div>
    <div id="cards"></div>
  </div>

  <div id="player">
    <div id="scene">
      <div id="monkeyWrap">
        <svg viewBox="0 0 260 320" xmlns="http://www.w3.org/2000/svg" aria-label="Hanuman the monkey">
          <path d="M70 250 q-60 10 -55 -55 q3 -34 30 -30 q18 3 12 24 q-5 16 -16 10" fill="none" stroke="#136b6b" stroke-width="14" stroke-linecap="round"/>
          <ellipse cx="100" cy="300" rx="22" ry="16" fill="#136b6b"/>
          <ellipse cx="160" cy="300" rx="22" ry="16" fill="#136b6b"/>
          <ellipse cx="130" cy="235" rx="68" ry="62" fill="#1f8a8a"/>
          <ellipse cx="130" cy="245" rx="42" ry="44" fill="#FDF8F0"/>
          <path d="M70 215 q-34 -6 -40 24 q-4 18 16 20" fill="none" stroke="#1f8a8a" stroke-width="22" stroke-linecap="round"/>
          <path d="M192 210 q40 -20 46 -58" fill="none" stroke="#1f8a8a" stroke-width="22" stroke-linecap="round"/>
          <circle cx="130" cy="120" r="80" fill="#1f8a8a"/>
          <circle cx="58" cy="110" r="26" fill="#1f8a8a"/><circle cx="58" cy="110" r="13" fill="#D99A4E"/>
          <circle cx="202" cy="110" r="26" fill="#1f8a8a"/><circle cx="202" cy="110" r="13" fill="#D99A4E"/>
          <ellipse cx="130" cy="135" rx="58" ry="56" fill="#FDF8F0"/>
          <path d="M108 70 l10 16 l12 -20 l12 20 l10 -16" fill="none" stroke="#D99A4E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
          <ellipse cx="106" cy="128" rx="20" ry="23" fill="#fff" stroke="#136b6b" stroke-width="2"/>
          <ellipse cx="154" cy="128" rx="20" ry="23" fill="#fff" stroke="#136b6b" stroke-width="2"/>
          <g id="pL"><circle cx="106" cy="128" r="9" fill="#3fa34d"/><circle cx="109" cy="124" r="3" fill="#fff"/></g>
          <g id="pR"><circle cx="154" cy="128" r="9" fill="#3fa34d"/><circle cx="157" cy="124" r="3" fill="#fff"/></g>
          <ellipse cx="130" cy="165" rx="30" ry="22" fill="#FDF8F0"/>
          <ellipse cx="130" cy="154" rx="6" ry="4" fill="#3A3A3A"/>
          <path d="M114 176 q16 14 32 0" fill="none" stroke="#3A3A3A" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </div>
      <div id="ballWrap"><div id="ball"></div></div>
      <div id="deskWrap">
        <svg id="deskSvg" viewBox="0 0 320 340" xmlns="http://www.w3.org/2000/svg" aria-label="Hanuman seated at a school desk" data-pose="neutral">
          <line x1="20" y1="326" x2="300" y2="326" stroke="#e3d9c8" stroke-width="4" stroke-linecap="round"/>
          <rect x="127" y="272" width="18" height="46" rx="9" fill="#1f8a8a"/>
          <rect x="175" y="272" width="18" height="46" rx="9" fill="#1f8a8a"/>
          <g id="dmFeet">
            <ellipse cx="134" cy="320" rx="21" ry="10" fill="#136b6b"/>
            <ellipse cx="186" cy="320" rx="21" ry="10" fill="#136b6b"/>
          </g>
          <rect x="112" y="242" width="96" height="44" rx="20" fill="#1f8a8a"/>
          <path d="M212 226 q48 -4 42 -48 q-4 -26 -27 -21" fill="none" stroke="#1f8a8a" stroke-width="12" stroke-linecap="round"/>
          <g id="dmUpper">
            <ellipse cx="160" cy="222" rx="57" ry="48" fill="#1f8a8a"/>
            <ellipse cx="160" cy="230" rx="36" ry="34" fill="#FDF8F0"/>
            <g id="dmHead">
            <circle cx="160" cy="116" r="55" fill="#1f8a8a"/>
            <circle cx="102" cy="100" r="20" fill="#1f8a8a"/><circle cx="102" cy="100" r="10" fill="#D99A4E"/>
            <circle cx="218" cy="100" r="20" fill="#1f8a8a"/><circle cx="218" cy="100" r="10" fill="#D99A4E"/>
            <g id="dmFace">
            <ellipse cx="160" cy="128" rx="43" ry="41" fill="#FDF8F0"/>
            <path d="M141 82 l8 13 l11 -16 l11 16 l8 -13" fill="none" stroke="#D99A4E" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
            <ellipse cx="143" cy="122" rx="14" ry="16" fill="#fff" stroke="#136b6b" stroke-width="2"/>
            <ellipse cx="177" cy="122" rx="14" ry="16" fill="#fff" stroke="#136b6b" stroke-width="2"/>
            <g class="pup"><circle cx="143" cy="123" r="7" fill="#3fa34d"/><circle cx="145.5" cy="120" r="2.4" fill="#fff"/></g>
            <g class="pup"><circle cx="177" cy="123" r="7" fill="#3fa34d"/><circle cx="179.5" cy="120" r="2.4" fill="#fff"/></g>
            <rect class="lid" x="128" y="106" width="30" height="15" rx="7" fill="#FDF8F0"/>
            <rect class="lid" x="162" y="106" width="30" height="15" rx="7" fill="#FDF8F0"/>
            <ellipse cx="160" cy="148" rx="23" ry="16" fill="#FDF8F0"/>
            <ellipse cx="160" cy="142" rx="5" ry="3.5" fill="#3A3A3A"/>
            <path d="M148 154 q12 9 24 0" fill="none" stroke="#3A3A3A" stroke-width="3" stroke-linecap="round"/>
            </g>
            </g>
          </g>
          <rect x="74" y="228" width="172" height="14" rx="4" fill="#c99a66" stroke="#8a5a3b" stroke-width="2"/>
          <rect x="74" y="240" width="172" height="5" fill="#8a5a3b" opacity=".4"/>
          <rect x="84" y="245" width="9" height="78" rx="3" fill="#8a5a3b"/>
          <rect x="227" y="245" width="9" height="78" rx="3" fill="#8a5a3b"/>
          <g transform="translate(114,192)"><g class="armL">
            <path d="M0 -8 q-16 16 -9 32" fill="none" stroke="#1f8a8a" stroke-width="17" stroke-linecap="round"/>
            <circle cx="-6" cy="30" r="11" fill="#FDF8F0" stroke="#1f8a8a" stroke-width="2.5"/>
          </g></g>
          <g transform="translate(206,192)"><g class="armR">
            <path d="M0 -8 q16 16 9 32" fill="none" stroke="#1f8a8a" stroke-width="17" stroke-linecap="round"/>
            <circle cx="6" cy="30" r="11" fill="#FDF8F0" stroke="#1f8a8a" stroke-width="2.5"/>
          </g></g>
          <g id="dmReachR">
            <path d="M114 186 q58 14 94 32" fill="none" stroke="#1f8a8a" stroke-width="17" stroke-linecap="round"/>
            <circle cx="212" cy="221" r="11" fill="#FDF8F0" stroke="#1f8a8a" stroke-width="2.5"/>
          </g>
          <g id="dmReachL">
            <path d="M206 186 q-58 14 -94 32" fill="none" stroke="#1f8a8a" stroke-width="17" stroke-linecap="round"/>
            <circle cx="108" cy="221" r="11" fill="#FDF8F0" stroke="#1f8a8a" stroke-width="2.5"/>
          </g>

  // ===== SEL TOOLS: social-emotional learning, PreK3-6th. Narrated like meditations. =====

{ id:"nameit", kind:"sel", demo:"desk", name:"Name It to Tame It", tag:"SEL · Self-Awareness · 2 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Find the feeling, give it a name, watch it get smaller. Big feelings shrink when we name them.",
      intro:"Hey, I'm Hanuman. Sometimes a feeling gets big and loud inside us. Here's a secret: when you give a feeling a name, it gets smaller. Let's try it together.",
      lines:[
        {cue:"Sit tall. One slow breath.",sub:"",say:"Sit tall, and take one slow breath in... and out.",hold:9},
        {cue:"Check inside. What's there?",sub:"Like checking the weather.",say:"Now check inside yourself, like you're checking the weather. Is it sunny in there? Stormy? Cloudy? Windy?",hold:11},
        {cue:"Find where it lives in your body.",sub:"Belly? Chest? Shoulders? Head?",say:"Find where that feeling lives in your body. Is it in your belly? Your chest? Your shoulders? Your head?",hold:11},
        {cue:"Now give it a name.",sub:"Mad. Sad. Worried. Excited. Tired. Happy.",say:"Now give it a name, quietly in your head. Maybe it's mad. Or sad. Or worried. Or excited. Or tired. Or happy. Any name is okay.",hold:12},
        {cue:"Say hi to it.",sub:"\"I see you, worried.\"",say:"Say hi to it, like this: I see you, worried. Or, I see you, mad. You're not in trouble. Feelings are visitors.",hold:11},
        {cue:"Breathe in. Make room for it.",sub:"",say:"Breathe in, and make a little room for that feeling.",hold:8},
        {cue:"Breathe out. Let it get smaller.",sub:"Named feelings shrink.",say:"Breathe out, and let it get a little smaller. That's the trick. Named feelings shrink.",hold:10},
        {cue:"You're the sky. Feelings are the weather.",sub:"Weather always passes.",say:"Remember: you're the sky, and feelings are just the weather. And weather always, always passes.",hold:11},
        {cue:"One more breath. You did it.",sub:"",say:"One more slow breath. You just did something that some grown-ups are still learning.",hold:9}
      ],
      close:"That's Name It to Tame It. Any time a feeling gets big, find it, name it, and watch it shrink." },
{ id:"grounding54321", kind:"sel", demo:"desk", name:"5-4-3-2-1 Grounding", tag:"SEL · Self-Management · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Use your five senses to come back to right here, right now. The worry-brain off switch.",
      intro:"Hey, I'm Hanuman. When our brains get worried, they run off to yesterday or tomorrow. This game brings your brain back to right here, right now, using your five senses. Ready?",
      lines:[
        {cue:"Look around. Find 5 things you can SEE.",sub:"Count them quietly. Any 5 things.",say:"First, look around the room. Find five things you can see. Count them quietly in your head. A door. A light. A shoe. Anything.",hold:29},
        {cue:"Find 4 things you can FEEL.",sub:"Your chair. Your shirt. The floor. The air.",say:"Now find four things you can feel. Maybe your chair holding you up. Your shirt on your shoulders. The floor under your feet. The air on your face.",hold:29},
        {cue:"Find 3 things you can HEAR.",sub:"Close ones and far ones.",say:"Now listen. Find three things you can hear. Close sounds, and far away sounds. Even quiet has a sound.",hold:27},
        {cue:"Find 2 things you can SMELL.",sub:"Or 2 smells you like.",say:"Find two things you can smell. And if you can't smell anything right now, just think of two smells you love.",hold:23},
        {cue:"Think of 1 taste you remember.",sub:"Or one you can imagine right now.",say:"And think of one taste you remember, or one you can imagine right now, like your favorite food.",hold:20},
        {cue:"Notice where you are.",sub:"Right here. Right now.",say:"Now notice: your whole brain is right here, right now, in this room. Not in yesterday. Not in tomorrow.",hold:23},
        {cue:"One slow breath.",sub:"You brought yourself back.",say:"Take one slow breath. You just brought yourself all the way back. That's a real skill.",hold:20}
      ],
      close:"That's five, four, three, two, one. Your senses are always with you, so this tool is always with you too." },
{ id:"gratitude3", kind:"sel", demo:"desk", name:"Gratitude Three", tag:"SEL · Self-Management · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Find three good things hiding in your day. Training your brain to spot the good stuff.",
      intro:"Hey, I'm Hanuman. Our brains are really good at spotting problems. But we can train them to spot good things too, like a treasure hunt. Let's find three treasures hiding in your day.",
      lines:[
        {cue:"Sit comfy. One slow breath.",sub:"",say:"Sit comfy and take one slow breath.",hold:16},
        {cue:"Treasure 1: something SMALL that was good today.",sub:"A snack. A joke. Sunshine. A good seat.",say:"Treasure number one: think of something small that was good today. Maybe a snack you liked. A joke that made you laugh. Sunshine on your way to school.",hold:25},
        {cue:"Hold it. Let it make you smile a little.",sub:"",say:"Got it? Hold it in your mind for a second, and let it make you smile a little.",hold:18},
        {cue:"Treasure 2: a PERSON you're glad is in your life.",sub:"See their face.",say:"Treasure number two: think of a person you're glad is in your life. A friend, someone at home, a teacher. See their face.",hold:23},
        {cue:"Send them a quiet thank you.",sub:"They don't even have to know.",say:"Send them a quiet thank you in your head. They don't even have to know. It still counts.",hold:20},
        {cue:"Treasure 3: something about YOU.",sub:"Something you can do. Something you tried.",say:"Treasure number three, and this one's the hardest: something good about you. Something you can do. Something kind you did. Something you tried, even if it was hard.",hold:27},
        {cue:"That one counts double.",sub:"Being glad about yourself is a superpower.",say:"That one counts double. Being glad about yourself is a real superpower, and most people forget to practice it.",hold:21},
        {cue:"Three treasures. One breath.",sub:"They were there the whole time.",say:"Three treasures, and they were there the whole time. Take one more slow breath.",hold:20}
      ],
      close:"That's Gratitude Three. The more you hunt for good things, the better your brain gets at finding them." },
{ id:"cozyplace", kind:"sel", demo:"desk", name:"My Cozy Place", tag:"SEL · Self-Management · 2 min", audience:"PreK3-2nd", src:"HudsonSeed",
      blurb:"For the littlest ones: build an imaginary cozy place you can visit any time feelings get big.",
      intro:"Hi friends, I'm Hanuman. Today we're going to build something amazing, and it's invisible. It's your very own cozy place, inside your imagination. Once you build it, you can visit any time you want. Let's go.",
      lines:[
        {cue:"Close your eyes. Snuggle into your seat.",sub:"Like a bird in a nest.",say:"Close your eyes and snuggle into your seat, like a little bird in a nest.",hold:10},
        {cue:"Imagine the coziest place ever.",sub:"Real or made-up. Yours.",say:"Now imagine the coziest place ever. It can be real, like your bed, or totally made-up, like a cloud castle. It's yours.",hold:13},
        {cue:"What do you SEE there?",sub:"Colors. Soft things. Favorite things.",say:"Look around your cozy place. What do you see? What colors? What soft things? Maybe your favorite things are there.",hold:12},
        {cue:"What do you HEAR?",sub:"Quiet? Waves? A purring cat?",say:"What do you hear in your cozy place? Maybe it's quiet. Maybe there are waves, or rain on a roof, or a purring cat.",hold:12},
        {cue:"Who is with you?",sub:"A person. A pet. A stuffie. Or just you.",say:"Who is with you? Maybe someone you love, or a pet, or your favorite stuffie. Or maybe it's just you, safe and snug.",hold:12},
        {cue:"Take three cozy breaths there.",sub:"In... and out. Three times.",say:"Now take three slow, cozy breaths in your special place. In... and out. In... and out. In... and out.",hold:14},
        {cue:"Wave goodbye. You can come back!",sub:"Any time feelings get big.",say:"Wave goodbye to your cozy place for now. But remember: it's yours forever. Any time your feelings get too big, close your eyes and come back.",hold:12},
        {cue:"Eyes open. Cozy comes with you.",sub:"",say:"Open your eyes. And guess what? A little bit of that cozy feeling came back with you.",hold:9}
      ],
      close:"That's My Cozy Place. You built it, you own it, and no one can ever take it away. Visit often." },
{ id:"wallpush", kind:"sel", demo:"desk", name:"Heavy Work Reset", tag:"SEL · Self-Management · 2 min", audience:"PreK3-3rd", src:"HudsonSeed",
      blurb:"Press your own hands together, hard. Strong muscles help calm a busy brain, no wall or moving furniture needed.",
      intro:"Hi, I'm Hanuman. Sometimes our bodies have extra wiggly energy, and the best way out is through strong, steady pushing. Stay right in your seat for this one, we don't need a wall.",
      lines:[
        {cue:"Sit tall. Press your palms together hard.",sub:"Right in front of your chest.",say:"Sit tall, and press your two palms together hard, right in front of your chest.",hold:9},
        {cue:"Push your hands into each other.",sub:"Push... push... push!",say:"Push your hands into each other as hard as you can. Push, push, push!",hold:10},
        {cue:"Breathe out while you push.",sub:"Strong and steady.",say:"Breathe out slow while you push. Strong and steady, not fast.",hold:9},
        {cue:"Now stop. Shake your hands loose.",sub:"Let them go floppy.",say:"Now stop pushing, and shake your hands out loose. Let them go floppy like noodles.",hold:9},
        {cue:"Hook your hands under your chair seat.",sub:"Pull straight up, hard.",say:"Now hook your hands under the edge of your chair seat, and pull straight up, hard, like you're trying to lift the chair.",hold:10},
        {cue:"Breathe out slow the whole time.",sub:"",say:"Breathe out slow the whole time you're pulling.",hold:8},
        {cue:"Stop. Shake it out again.",sub:"",say:"Stop, and shake your hands out again.",hold:8},
        {cue:"Notice your muscles.",sub:"Tired is different from wiggly.",say:"Notice how your arms feel now. A little tired is different from wiggly. Tired muscles are calm muscles.",hold:11},
        {cue:"Rest your hands in your lap when you're ready.",sub:"Your body did the work.",say:"Rest your hands in your lap whenever you're ready. Your body just did some real work, and your brain gets to feel calmer because of it.",hold:11}
      ],
      close:"That's the Heavy Work Reset. Anytime your body feels too wiggly, strong pushing helps it find calm again, no wall required." },
{ id:"problem4", kind:"sel", demo:"desk", name:"The Problem-Solving Four", tag:"SEL · Relationship Skills · 2 min", audience:"2nd-6th", src:"HudsonSeed",
      blurb:"Four steps for when a problem happens with a friend: Pause, Name it, Think of choices, Try one.",
      intro:"Hi, I'm Hanuman. Problems with friends happen to everybody, even grown-ups. Today I'll teach you four steps that help almost every time. Let's practice with a problem lots of kids know: someone took your turn.",
      lines:[
        {cue:"Step 1: PAUSE.",sub:"Hands still. One breath before you act.",say:"Step one is Pause. When something feels unfair, your body wants to react right away. Instead, freeze for one second and take one breath before you do anything.",hold:12},
        {cue:"Try it. Big breath in... and out.",sub:"That pause is your superpower.",say:"Let's try it. Big breath in... and out. That tiny pause is actually your superpower.",hold:10},
        {cue:"Step 2: NAME the problem.",sub:"Say what happened, not who's bad.",say:"Step two is Name the problem. Say what happened, out loud or in your head. Not who's good or bad, just what happened. Like: it was my turn, and it got skipped.",hold:13},
        {cue:"Say it like this: \"I feel ___ because ___.\"",sub:"I feel frustrated because my turn got skipped.",say:"You can even say it out loud to the other person: I feel frustrated, because my turn got skipped.",hold:11},
        {cue:"Step 3: THINK of choices.",sub:"There is always more than one.",say:"Step three is Think of choices. There's always more than one way to handle it. You could ask for your turn. You could tell an adult. You could take a breath and let it go, just this once.",hold:14},
        {cue:"Pick a choice that helps, not one that hurts.",sub:"",say:"Pick the choice that actually helps the problem, not the one that just feels good for a second.",hold:9},
        {cue:"Step 4: TRY one.",sub:"\"Can I have my turn now, please?\"",say:"Step four is Try one. Use your calm, clear voice. Something like: can I have my turn now, please?",hold:11},
        {cue:"If it doesn't work, that's okay.",sub:"A trusted adult can help too.",say:"If it doesn't work, that's okay. You can always ask a trusted grown-up to help too. Asking for help is smart, not weak.",hold:11},
        {cue:"Pause. Name it. Think. Try.",sub:"Four steps, any time, any problem.",say:"Pause. Name it. Think of choices. Try one. Four steps you can use with almost any problem, any day.",hold:11}
      ],
      close:"That's the Problem-Solving Four. You don't need a grown-up to fix every small problem, but always tell a trusted adult if you ever feel unsafe." },
{ id:"bodydetective", kind:"sel", demo:"desk", name:"Body Detective", tag:"SEL · Self-Awareness · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Scan forehead, shoulders, belly, hands for the physical clues feelings leave behind.",
      intro:"Hi, I'm Hanuman. Feelings love to hide inside our bodies before we even notice them in our minds. Let's go on a body detective hunt and find the clues.",
      lines:[
        {cue:"Sit tall. Close your eyes if that feels okay.",sub:"Or just look down softly.",say:"Sit tall, and close your eyes if that feels okay, or just look down softly at your lap.",hold:26},
        {cue:"Check your forehead. Tight or relaxed?",sub:"",say:"Check your forehead. Is it tight and scrunched, or relaxed and smooth?",hold:29},
        {cue:"Check your shoulders. Up by your ears?",sub:"Or hanging loose?",say:"Check your shoulders. Are they up by your ears, or hanging loose and easy?",hold:29},
        {cue:"Check your belly. Tight like a fist?",sub:"Or soft like a pillow?",say:"Check your belly. Does it feel tight like a fist, or soft like a pillow?",hold:29},

        {cue:"Now match the clues to a feeling name.",sub:"Any name is okay.",say:"Now put the clues together. What feeling might that be? Any name you find is okay.",hold:32}

{ id:"kindwords", kind:"sel", demo:"desk", name:"Kind Words to Myself", tag:"SEL · Self-Management · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Replace harsh self-talk with the voice you'd use for a best friend.",
      intro:"Hi, I'm Hanuman. Sometimes the voice inside our own head is way meaner to us than we'd ever be to a friend. Let's practice switching that voice to a kinder one.",
      lines:[
        {cue:"Think of a mistake you made recently.",sub:"Small is fine.",say:"Think of a small mistake you made recently. It can be tiny.",hold:28},

        {cue:"Now imagine your best friend made that exact mistake.",sub:"What would you say to them?",say:"Now imagine your best friend made that exact same mistake. What would you say to them?",hold:31},
        {cue:"Probably something kinder, right?",sub:"Everybody messes up sometimes.",say:"Probably something kinder, right? Everybody messes up sometimes, including you.",hold:28},
