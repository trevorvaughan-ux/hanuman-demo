{ id:"volcanoplan", kind:"sel", demo:"desk", name:"The Volcano Plan", tag:"SEL · Self-Management · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"A four-step anger plan built while calm: notice the rumble, make space, cool with out-breaths, use words.",
      intro:"Hi, I'm Hanuman. Anger is like a volcano. It rumbles before it erupts, and if we notice the rumble early, we get to choose what happens next. Let's build your plan now, while you're calm.",
      lines:[
        {cue:"Step 1: Notice the rumble.",sub:"Hot face? Fast heart? Tight fists?",say:"Step one is notice the rumble. That's your hot face, your fast heart, your tight fists, before the eruption.",hold:32},
        {cue:"Step 2: Make space.",sub:"Step back. Ask for a minute.",say:"Step two is make space. Step back from the problem, or ask for a minute if you need one.",hold:29},
        {cue:"Step 3: Cool it with out-breaths.",sub:"Long breath out, like a dragon.",say:"Step three is cool it down with out-breaths. Long breaths out, like a slow dragon.",hold:29},
        {cue:"Step 4: Use your words.",sub:"When you're ready, not before.",say:"Step four is use your words, once you're actually ready, not before.",hold:26},
        {cue:"Rumble. Space. Cool. Words.",sub:"Say it with me.",say:"Rumble, space, cool, words. Say it with me: rumble, space, cool, words.",hold:29},
        {cue:"You get to choose before you erupt.",sub:"That's real power.",say:"You get to choose before you erupt. That's real power, and it's yours.",hold:26}
      ],
      close:"That's the Volcano Plan. Every volcano rumbles first. Now you know what to do in that moment." },
{ id:"worrybox", kind:"sel", demo:"desk", name:"The Worry Box", tag:"SEL · Self-Management · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Visualize setting a worry down without pretending it's gone.",
      intro:"Hi, I'm Hanuman. Worries are heavy to carry around all day. Let's build an imaginary box where you can set one down for a while.",
      lines:[
        {cue:"Think of one worry that's been following you.",sub:"Small or big, both count.",say:"Think of one worry that's been following you today. Small or big, it counts.",hold:27},
        {cue:"Imagine a sturdy box with a lid.",sub:"Any color you like.",say:"Now imagine a sturdy box with a strong lid, any color you like.",hold:27},
        {cue:"Picture yourself placing the worry inside.",sub:"It doesn't disappear. It just rests.",say:"Picture yourself placing that worry gently inside. It doesn't disappear, it just gets to rest.",hold:30},
        {cue:"Close the lid. Take one slow breath.",sub:"",say:"Close the lid, and take one slow breath.",hold:24},
        {cue:"You can open the box later with a grown-up.",sub:"Big or repeating worries deserve a helper.",say:"Remember, if a worry is big or it keeps coming back, that one's worth opening the box with a trusted grown-up.",hold:33},
        {cue:"For now, your hands are free.",sub:"You set it down. That took courage.",say:"For now, your hands are free. You set it down, and that took real courage.",hold:27}
      ],
      close:"That's the Worry Box. Some worries need sharing with a grown-up, and that's always okay to do." },
{ id:"lettinggo", kind:"sel", demo:"desk", name:"The Letting-Go Leaf", tag:"SEL · Self-Management · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Watch a leaf carry a hard moment down a stream. Stops the replay loop after a bad moment.",
      intro:"Hi, I'm Hanuman. Sometimes a hard moment plays over and over in our minds, like a video stuck on repeat. Let's give it somewhere to go.",
      lines:[
        {cue:"Think of a small, frustrating moment from today.",sub:"Like dropping something or losing a game.",say:"Think of a small, frustrating moment from today, like dropping your pencil or losing a game. Just one, let the rest wait.",hold:28},
        {cue:"Imagine a slow, gentle stream.",sub:"Picture the water moving.",say:"Imagine a slow, gentle stream of water moving by.",hold:25},
        {cue:"Picture a leaf floating on it.",sub:"Place your hard moment onto the leaf.",say:"Picture a leaf floating on the water. Place your hard moment gently onto that leaf.",hold:31},
        {cue:"Watch the stream carry it away.",sub:"You don't have to chase it.",say:"Watch the stream carry the leaf away. You don't have to chase after it.",hold:28},
        {cue:"If your mind replays it, that's okay.",sub:"Just place it on a new leaf.",say:"If your mind replays it again later, that's okay. Just place it on a brand new leaf.",hold:31},
        {cue:"One slow breath. Let the water do its work.",sub:"",say:"One more slow breath. Let the water do its work.",hold:25}
      ],
      close:"That's the Letting-Go Leaf. Streams keep moving, and so can you." },
{ id:"intheirshoes", kind:"sel", demo:"desk", name:"In Their Shoes", tag:"SEL · Social Awareness · 3 min", audience:"2nd-6th", src:"HudsonSeed",
      blurb:"Guided perspective-taking: picture a real person, imagine one hard thing and one hope in their day, send a kind wish.",
      intro:"Hi, I'm Hanuman. Everyone we meet is carrying a whole day we can't see. Let's practice stepping into someone else's shoes for a minute.",
      lines:[
        {cue:"Think of someone in your life.",sub:"A classmate, a sibling, anyone.",say:"Think of someone in your life, a classmate, a sibling, anyone at all.",hold:25},
        {cue:"Imagine one hard thing that might be part of their day.",sub:"We don't always know for sure, and that's okay.",say:"Imagine one hard thing that might be part of their day. We don't always know for sure, and that's okay.",hold:35},
        {cue:"Now imagine one hope they might have.",sub:"Something they're looking forward to.",say:"Now imagine one hope they might be holding onto, something they're looking forward to.",hold:31},
        {cue:"Picture their face for a second.",sub:"",say:"Picture their face for just a second.",hold:22},
        {cue:"Send them a quiet kind wish.",sub:"They don't have to know.",say:"Send them a quiet kind wish in your head. They don't even have to know.",hold:28},
        {cue:"Everyone is carrying something.",sub:"Kindness costs nothing to give.",say:"Everyone you meet is carrying something. Kindness costs nothing to give.",hold:28}
      ],
      close:"That's In Their Shoes. The more we imagine other people's days, the kinder we get." },
{ id:"kindnessdetective", kind:"sel", demo:"desk", name:"Kindness Detective", tag:"SEL · Social Awareness · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Hunt for kindness received, witnessed, and given. Trains attention toward prosocial behavior.",
      intro:"Hi, I'm Hanuman. Kindness happens around us all day, but our brains don't always notice it. Let's go on a kindness hunt through today.",
      lines:[
        {cue:"Case 1: Kindness you RECEIVED today.",sub:"Someone did something nice for you.",say:"Case one: kindness you received today. Did anyone do something nice for you?",hold:35},
        {cue:"Case 2: Kindness you WITNESSED.",sub:"Something you saw happen to someone else.",say:"Case two: kindness you witnessed. Did you see something kind happen to somebody else?",hold:35},
        {cue:"Case 3: Kindness you GAVE.",sub:"Even something tiny counts.",say:"Case three: kindness you gave. Even something tiny counts, like sharing or a smile.",hold:35},
        {cue:"Three cases solved.",sub:"Kindness was hiding in plain sight.",say:"Three cases solved. Kindness was hiding in plain sight the whole time.",hold:31},
        {cue:"The more you look, the more you find.",sub:"Your brain is a kindness detector now.",say:"The more you look for kindness, the more you find it. Your brain just became a kindness detector.",hold:35}
      ],
      close:"That's Kindness Detective. Case closed, and kindness wins." },
{ id:"listeninggame", kind:"sel", demo:"desk", name:"The Listening Game", tag:"SEL · Relationship Skills · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Whole-body listening: eyes, ears, quiet mouth, curious heart. Foundational communication skill.",
      intro:"Hi, I'm Hanuman. Real listening uses your whole body, not just your ears. Let's practice whole-body listening together.",
      lines:[
        {cue:"Eyes: look gently at who's talking.",sub:"Not a stare, just friendly.",say:"First, your eyes. Look gently at whoever is talking, not a stare, just friendly.",hold:33},
        {cue:"Ears: point them at the words.",sub:"Let the sound in.",say:"Next, your ears. Point them right at the words and let the sound in.",hold:30},
        {cue:"Mouth: stay quiet until it's your turn.",sub:"Waiting is part of listening.",say:"Your mouth stays quiet until it's your turn. Waiting is part of listening too.",hold:33},
        {cue:"Heart: care about what they're saying.",sub:"Really wonder about it, not planning your reply.",say:"And your heart cares about what they're saying. Really wonder about their words, instead of planning what you'll say next.",hold:37},
        {cue:"Eyes, ears, quiet mouth, curious heart.",sub:"That's whole-body listening.",say:"Eyes, ears, quiet mouth, curious heart. That's whole-body listening, and it's a gift you can give anyone.",hold:37}
      ],
      close:"That's the Listening Game. The best friends are usually the best listeners." },
{ id:"repairkit", kind:"sel", demo:"desk", name:"The Repair Kit", tag:"SEL · Relationship Skills · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Conflict repair in four tools: honest look, real sorry that names the thing, the listen, the do-different.",
      intro:"Hi, I'm Hanuman. When we hurt someone, even by accident, we can fix it. Here's your repair kit, four tools that work almost every time.",
      lines:[
        {cue:"Tool 1: The Honest Look.",sub:"See what actually happened, no excuses yet.",say:"Tool one is the honest look. See what actually happened, without excuses yet.",hold:33},
        {cue:"Tool 2: The Real Sorry.",sub:"Name the thing. \"I'm sorry I ___.\"",say:"Tool two is the real sorry. Name the actual thing: I'm sorry I did this specific thing.",hold:37},
        {cue:"Tool 3: The Listen.",sub:"Let them tell you how it felt.",say:"Tool three is the listen. Let the other person tell you how it felt, without jumping in.",hold:33},
        {cue:"Tool 4: The Do-Different.",sub:"What will you try next time?",say:"Tool four is the do-different. What will you try differently next time?",hold:33},
        {cue:"Look. Sorry. Listen. Do-different.",sub:"Four tools, any broken moment.",say:"Look, sorry, listen, do-different. Four tools that can fix almost any broken moment.",hold:33}
      ],
      close:"That's the Repair Kit. Fixing things is a real skill, and you just practiced it." },
{ id:"braveenough", kind:"sel", demo:"desk", name:"Brave Enough to Ask", tag:"SEL · Relationship Skills · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Help-seeking as strength: identify the hard thing, pick a helper, practice the ask.",
      intro:"Hi, I'm Hanuman. Asking for help feels hard sometimes, but it's actually one of the bravest things you can do. Let's practice.",
      lines:[
        {cue:"Think of something hard you're dealing with.",sub:"Big or small.",say:"Think of one thing that's hard for you right now, big or small.",hold:30},
        {cue:"Pick a helper.",sub:"A teacher, a friend, a family member.",say:"Pick a helper, a teacher, a friend, someone in your family.",hold:30},
        {cue:"Practice the ask in your head.",sub:"\"Can you help me with ___?\"",say:"Practice the ask in your head: can you help me with this?",hold:33},
        {cue:"Notice: asking doesn't make you weak.",sub:"It means you know your own strength.",say:"Notice something: asking for help doesn't make you weak. It means you know your own strength enough to use it.",hold:41},
        {cue:"The bravest kids ask.",sub:"Not the ones who never need anything.",say:"The bravest kids are the ones who ask, not the ones who pretend they never need anything.",hold:37}
      ],
      close:"That's Brave Enough to Ask. Go find your helper. That's real courage." },
{ id:"bravevoice", kind:"sel", demo:"desk", name:"My Brave Voice", tag:"SEL · Relationship Skills · 3 min", audience:"2nd-6th", src:"HudsonSeed",
      blurb:"Assertiveness that's calm, clear, and kind: please stop, that's not okay, come sit with us, plus the trusted-adult backup rule.",
      intro:"Hi, I'm Hanuman. Your brave voice isn't loud or mean, it's calm and clear. Let's practice a few brave-voice lines.",
      lines:[
        {cue:"Line 1: \"Please stop.\"",sub:"Said calm, not yelled.",say:"Line one: please stop, said calm and clear, not yelled.",hold:31},
        {cue:"Line 2: \"That's not okay.\"",sub:"Naming it out loud.",say:"Line two: that's not okay, naming it out loud, plainly.",hold:31},
        {cue:"Line 3: \"Come sit with us.\"",sub:"Inviting someone in, not just defending yourself.",say:"Line three: come sit with us, inviting someone in, not just defending yourself.",hold:35},
        {cue:"Practice one out loud right now.",sub:"Your voice, your pace.",say:"Practice one of these out loud right now, your voice, your own pace.",hold:35},
        {cue:"If it doesn't work, tell a trusted adult.",sub:"That's not giving up. That's smart.",say:"And if your brave voice doesn't fix it, tell a trusted adult. That's not giving up, that's smart.",hold:39}
      ],
      close:"That's My Brave Voice. Calm, clear, and kind is stronger than loud." },
{ id:"theripple", kind:"sel", demo:"desk", name:"The Ripple", tag:"SEL · Responsible Decision-Making · 3 min", audience:"2nd-6th", src:"HudsonSeed",
      blurb:"Drop a choice in the pond and watch three ripples: how you feel after, how it touches people nearby, and how it looks later.",
      intro:"Hi, I'm Hanuman. Every choice is like a stone dropped in a pond. It makes ripples that go further than we first think. Let's watch one.",
      lines:[
        {cue:"Think of a choice you're facing, or made recently.",sub:"Any size choice.",say:"Think of a choice you're facing, or one you made recently. Any size works.",hold:34},
        {cue:"Ripple 1: How will you feel right after?",sub:"",say:"Ripple one: how will you feel right after you make that choice?",hold:34},
        {cue:"Ripple 2: Who else does it touch?",sub:"Even a little.",say:"Ripple two: who else does this choice touch, even just a little?",hold:34},
        {cue:"Ripple 3: How will it look tomorrow?",sub:"Looking back on it.",say:"Ripple three: how will it look when you think back on it tomorrow?",hold:34},
        {cue:"Three ripples, one choice.",sub:"Now you can see further than the splash.",say:"Three ripples from one choice. Now you can see further than just the splash.",hold:34}
      ],
      close:"That's the Ripple. Every choice moves further than we think. Choose with that in mind." },
{ id:"energygrid", kind:"sel", demo:"desk", name:"The Energy Grid", tag:"SEL · Self-Awareness · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Find your spot on the energy and feeling grid. A quick, honest check-in.",
      intro:"Hi, I'm Hanuman. Let's do a quick check-in. Not fixing anything, just noticing where you are right now.",
      lines:[
        {cue:"Think about your ENERGY.",sub:"High and buzzy, or low and slow?",say:"First, think about your energy right now. Is it high and buzzy, or low and slow?",hold:36},
        {cue:"Now think about your FEELING.",sub:"Pleasant, or unpleasant?",say:"Now think about your feeling. Is it more pleasant, or more unpleasant right now?",hold:33},
        {cue:"Put the two together.",sub:"High-pleasant? Low-unpleasant? Any mix.",say:"Put the two together. High energy and pleasant? Low energy and unpleasant? Any mix is a real answer.",hold:40},
        {cue:"There's no wrong spot on this grid.",sub:"Just information, not a problem.",say:"There's no wrong spot on this grid. It's just information, not a problem to fix.",hold:33},
        {cue:"Noticing is the whole skill.",sub:"You just did it.",say:"Noticing where you are is the whole skill, and you just did it.",hold:29}
      ],
      close:"That's the Energy Grid. A quick honest check-in, any time you need one." },
{ id:"meetyourbrain", kind:"sel", demo:"desk", name:"Meet Your Brain", tag:"SEL · Self-Awareness · 3 min", audience:"1st-6th", src:"HudsonSeed",
      blurb:"The Guard Dog and the Wise Owl: a simple map of why we flip our lids.",
      intro:"Hi, I'm Hanuman. Your brain has two important parts we're going to meet today: the Guard Dog and the Wise Owl.",
      lines:[
        {cue:"The Guard Dog reacts fast.",sub:"It barks at anything that feels like danger.",say:"The Guard Dog part of your brain reacts fast. It barks at anything that feels like danger, even when it's not really dangerous.",hold:37},
        {cue:"The Wise Owl thinks slow.",sub:"It helps you make good choices.",say:"The Wise Owl part thinks slow and calm. It helps you make good choices, but it needs a moment to wake up.",hold:37},
        {cue:"When you flip your lid, the Guard Dog took over.",sub:"That's not bad. It's just biology.",say:"When you flip your lid and react big, that's the Guard Dog taking over. That's not bad, it's just how brains work.",hold:37},
        {cue:"A slow breath helps wake the Owl back up.",sub:"",say:"One slow breath helps wake the Wise Owl back up.",hold:27},
        {cue:"Next time you're upset, ask: dog or owl?",sub:"",say:"Next time you feel upset, you can ask yourself: is my Guard Dog barking, or is my Wise Owl awake?",hold:33}
      ],
      close:"That's Meet Your Brain. Now you know both parts, and neither one is the enemy." },
{ id:"stopandgo", kind:"sel", demo:"desk", name:"Stop and Go Brain Builder", tag:"SEL · Self-Management · 3 min", audience:"PreK3-2nd", src:"HudsonSeed",
      blurb:"A Simon-Says style game that trains your stop switch.",
      intro:"Hi, I'm Hanuman. Let's play a game that secretly trains a superpower: your stop switch. Watch closely and only move on the real signal.",
      lines:[
        {cue:"When I say GO, clap your hands.",sub:"Ready? Go!",say:"When I say go, clap your hands. Ready? Go!",hold:31},
        {cue:"When I say STOP, freeze completely.",sub:"Stop!",say:"When I say stop, freeze completely, like a statue. Stop!",hold:31},
        {cue:"Trick one: I'll say go quietly. Still clap!",sub:"Go.",say:"Here's a trick: I'll say go really quietly. Still clap! Go.",hold:31},
        {cue:"Trick two: I'll almost say stop, but don't move yet.",sub:"Wait for the real word.",say:"Trick two: I'll almost say stop, but wait for the real word before you freeze.",hold:36},
        {cue:"That freeze muscle is a real brain skill.",sub:"You just trained it.",say:"That freeze muscle you just used is a real brain skill, and you just trained it.",hold:40}
      ],
      close:"That's the Stop and Go Brain Builder. The same stop switch helps you pause before big reactions too." },
{ id:"bystander", kind:"sel", demo:"desk", name:"Bullying Bystander Power Moves", tag:"SEL · Social Awareness · 3 min", audience:"2nd-6th", src:"HudsonSeed",
      blurb:"Stop, Walk, Tell, and the Help Circle: real moves for when you see something unkind happen.",
      intro:"Hi, I'm Hanuman. If you ever see something unkind happening to someone else, you have more power than you think. Here are your moves.",
      lines:[
        {cue:"Move 1: STOP.",sub:"Say it calm: \"Stop that.\"",say:"Move one is stop. Say it calm and clear: stop that.",hold:31},
        {cue:"Move 2: WALK.",sub:"Walk the person who got hurt away with you.",say:"Move two is walk. Walk the person who got hurt away with you, to somewhere safer.",hold:35},
        {cue:"Move 3: TELL.",sub:"Tell a trusted adult what happened.",say:"Move three is tell. Tell a trusted adult exactly what happened.",hold:31},
        {cue:"Move 4: The Help Circle.",sub:"Include the person afterward. Sit with them.",say:"Move four is the help circle. Include that person afterward, sit with them, make sure they're not alone.",hold:39},
        {cue:"You don't have to be the boss of the situation.",sub:"You just have to be brave for one moment.",say:"You don't have to control the whole situation. You just have to be brave for one small moment.",hold:35}
      ],
      close:"That's Stop, Walk, Tell, and the Help Circle. Bystanders who act are how bullying actually stops." },
{ id:"bigfeelingdetective", kind:"sel", demo:"desk", name:"Big Feeling Detective", tag:"SEL · Self-Awareness · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"A body scan plus a 1-to-10 feeling meter, perfect for chaotic transitions like after recess or lunch.",
      intro:"Hi, I'm Hanuman. Right after big transitions, like recess or lunch, feelings can be extra loud. Let's check the size of yours.",
      lines:[
        {cue:"Quick body scan. Any tight spots?",sub:"Shoulders, belly, hands?",say:"Quick body scan. Any tight spots? Check your shoulders, your belly, your hands.",hold:33},
        {cue:"Is your feeling small, medium, or big?",sub:"Small like a pebble, medium like a ball, big like a mountain.",say:"Is your feeling small like a pebble, medium like a ball, or big like a mountain? Pick the one that fits.",hold:37},
        {cue:"Whatever number you picked is correct.",sub:"There's no wrong answer here.",say:"Whatever number you picked is the correct one. There's no wrong answer here.",hold:33},
        {cue:"One slow breath, and check again.",sub:"Did the size change at all?",say:"Take one slow breath, and check the size again. Did it get any smaller?",hold:33},
        {cue:"You just noticed and measured a feeling.",sub:"That's real self-awareness.",say:"You just noticed a feeling and measured it. That's real self-awareness in under a minute.",hold:33}
      ],
      close:"That's Big Feeling Detective. A fast check, any time the room feels loud." },
{ id:"digitaldrain", kind:"sel", demo:"desk", name:"Digital Drain Reflection", tag:"SEL · Self-Management · 3 min", audience:"3rd-6th", src:"HudsonSeed",
      blurb:"Reflect on how screens made you feel, then pick one offline recharge.",
      intro:"Hi, I'm Hanuman. Screens are fun, but sometimes they leave us feeling drained without us noticing. Let's check in.",
      lines:[
        {cue:"Think about your last bit of screen time.",sub:"A show, a game, scrolling.",say:"Think about your last bit of screen time, a show, a game, scrolling.",hold:30},
        {cue:"How did it make you FEEL while watching?",sub:"Excited? Bored? Wound up?",say:"How did it make you feel while it was happening? Excited, bored, wound up?",hold:34},
        {cue:"How does your BODY feel right now?",sub:"Tired eyes? Restless? Foggy?",say:"How does your body feel right now, after? Tired eyes, restless legs, a foggy head?",hold:38},
        {cue:"Pick one offline recharge.",sub:"Stretch, water, look outside, talk to someone.",say:"Pick one offline recharge: a stretch, a sip of water, looking outside, or talking to someone near you.",hold:38},
        {cue:"Screens aren't bad. Balance is the skill.",sub:"",say:"Screens aren't bad, balance is the actual skill we're building.",hold:30}
      ],
      close:"That's Digital Drain Reflection. Noticing the drain is step one toward balance." },
{ id:"worryvsreal", kind:"sel", demo:"desk", name:"Worry vs. Real", tag:"SEL · Self-Management · 3 min", audience:"2nd-6th", src:"HudsonSeed",
      blurb:"Sort a worry into what's a fear and what's an actual fact you can act on.",
      intro:"Hi, I'm Hanuman. Worries love to mix up what's really happening with what our brain is scared MIGHT happen. Let's sort one out.",
      lines:[
        {cue:"Think of a worry you have right now.",sub:"Tests, friends, home, anything.",say:"Think of a worry you have right now, about a test, a friend, home, anything at all.",hold:32},
        {cue:"Column 1: What's the WORRY saying?",sub:"The scary story your brain is telling.",say:"Column one: what is the worry actually saying? That's the scary story your brain is telling you.",hold:35},
        {cue:"Column 2: What's actually REAL right now?",sub:"Just the facts, this exact moment.",say:"Column two: what's actually real, right now, in this exact moment? Just the facts.",hold:35},
        {cue:"Notice: most worries live in the future.",sub:"Real things live right here.",say:"Notice something: most worries live in the future. Real things live right here, right now.",hold:35},
        {cue:"You can't control the future.",sub:"But you can act on what's real now.",say:"You can't control the future, but you can always act on what's real right now.",hold:32}
      ],
      close:"That's Worry vs. Real. Sorting them out takes the worry's power away." },
{ id:"strengthsspotlight", kind:"sel", demo:"desk", name:"Strengths Spotlight", tag:"SEL · Self-Awareness · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Shine a light on one thing you're genuinely good at.",
      intro:"Hi, I'm Hanuman. Let's put a spotlight on something you're actually good at. Everybody has at least one.",
      lines:[
        {cue:"Think of something you're good at.",sub:"Any size. Drawing, kindness, running, jokes.",say:"Think of something you're good at. It can be any size at all, drawing, being kind, running fast, telling jokes.",hold:40},
        {cue:"How did you get good at it?",sub:"Practice? Trying a lot? Just natural?",say:"How did you get good at it? Practice, trying a lot, or did it come naturally?",hold:36},
        {cue:"Picture yourself doing it well.",sub:"Feel that for a second.",say:"Picture yourself doing that thing well. Just feel that for a second.",hold:32},
        {cue:"That strength is really yours.",sub:"Nobody can take it away.",say:"That strength belongs to you. Nobody can take it away.",hold:32},
        {cue:"Say it out loud: \"I am good at ___.\"",sub:"",say:"Say it out loud if you can: I am good at this.",hold:32}
      ],
      close:"That's Strengths Spotlight. You've got more strengths than you probably give yourself credit for." },
{ id:"emotionweather", kind:"sel", demo:"desk", name:"Emotion Weather Report", tag:"SEL · Self-Awareness · 3 min", audience:"3rd-6th", src:"HudsonSeed",
      blurb:"Give your mixed-up feelings a real weather report, not just one word.",
      intro:"Hi, I'm Hanuman. Sometimes feelings aren't just one thing, they're more like weather with a bunch of stuff happening at once. Let's report yours.",
      lines:[
        {cue:"Is there any sunshine in there?",sub:"A part of you that's okay or happy.",say:"Is there any sunshine in your report, a part of you that's okay, or even happy?",hold:35},
        {cue:"Any clouds or rain?",sub:"A part that's sad, worried, or heavy.",say:"Any clouds or rain? A part that's sad, worried, or heavy?",hold:31},
        {cue:"Any wind or storms?",sub:"A part that's frustrated or annoyed.",say:"Any wind or storms in there? A part that's frustrated or annoyed?",hold:35},
        {cue:"It's okay to have more than one kind of weather.",sub:"Real weather is rarely just one thing.",say:"It's totally okay to have more than one kind of weather at once. Real weather is rarely just one thing.",hold:39},
        {cue:"Give your whole report, out loud or in your head.",sub:"",say:"Go ahead and give your whole weather report, out loud or in your head.",hold:31}
      ],
      close:"That's the Emotion Weather Report. Mixed feelings are normal feelings." },
{ id:"valuescompass", kind:"sel", demo:"desk", name:"My Values Compass", tag:"SEL · Self-Awareness · 3 min", audience:"3rd-6th", src:"HudsonSeed",
      blurb:"Point yourself toward what actually matters to you.",
      intro:"Hi, I'm Hanuman. A compass points you somewhere true. Let's find out what points your compass, what actually matters to you.",
      lines:[
        {cue:"Think of a time you felt really proud.",sub:"What were you doing?",say:"Think of a time you felt really proud of yourself. What were you doing in that moment?",hold:33},
        {cue:"What was important about that moment?",sub:"Helping? Trying hard? Being honest?",say:"What made that moment matter? Was it helping someone, trying hard, or being honest?",hold:36},
        {cue:"That's a clue to one of your values.",sub:"A value is just something you care about.",say:"That's a real clue to one of your values. A value is just something you truly care about.",hold:36},
        {cue:"Your compass can point different ways on different days.",sub:"That's normal.",say:"Your compass might point different directions on different days, and that's completely normal.",hold:33},
        {cue:"Knowing your values helps you make choices.",sub:"You just found one.",say:"Knowing your values helps you make choices you feel good about, and you just found one of yours.",hold:33}
      ],
      close:"That's My Values Compass. It's worth checking in on now and then." },
{ id:"confidencebuilder", kind:"sel", demo:"desk", name:"Confidence Builder", tag:"SEL · Self-Awareness · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Build a short list of things you CAN do, right now.",
      intro:"Hi, I'm Hanuman. Confidence isn't about being good at everything. It's knowing your own \"I can\" list. Let's build yours.",
      lines:[
        {cue:"Think of one thing you can do today.",sub:"Tie your shoes, be a good friend, anything real.",say:"Think of one real thing you can do today, tie your shoes, be a good friend, anything true.",hold:38},
        {cue:"Think of a second thing.",sub:"Doesn't have to be big.",say:"Think of a second thing. It doesn't have to be big at all.",hold:34},
        {cue:"Think of a third.",sub:"",say:"And a third.",hold:21},
        {cue:"Say them together: \"I can ___, I can ___, I can ___.\"",sub:"",say:"Say all three together: I can do this, I can do this, and I can do this.",hold:38},
        {cue:"That's your list, and it's already real.",sub:"Confidence grows every time you look at it.",say:"That list is already real, and confidence grows every single time you look at it.",hold:38}
      ],
      close:"That's the Confidence Builder. Your I-can list is longer than you think." },
{ id:"growthmindsetyet", kind:"sel", demo:"desk", name:"Growth Mindset: The Word YET", tag:"SEL · Self-Management · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Turn \"I can't\" into \"I can't yet\", the most powerful word in learning.",
      intro:"Hi, I'm Hanuman. There's a tiny word that changes everything: yet. Let's practice using it.",
      lines:[
        {cue:"Think of something that's hard for you right now.",sub:"Learning it, not being perfect at it.",say:"Think of something that's hard for you right now, something you're still learning.",hold:35},
        {cue:"Say: \"I can't do this.\"",sub:"Notice how that feels.",say:"Say in your head: I can't do this. Notice how that feels.",hold:31},
        {cue:"Now add one word: \"I can't do this YET.\"",sub:"Notice the difference.",say:"Now add one small word: I can't do this yet. Notice the difference in how that feels.",hold:39},
        {cue:"Yet means your brain is still building the pathway.",sub:"It's not finished, that's all.",say:"Yet means your brain is still building that pathway. It's not finished, that's all.",hold:35},
        {cue:"Every skill you have now started as a \"not yet.\"",sub:"",say:"Every single skill you already have started out as a not yet.",hold:31}
      ],
      close:"That's the word Yet. Keep it in your back pocket for hard moments." },
{ id:"disappointmentreset", kind:"sel", demo:"desk", name:"Disappointment Reset", tag:"SEL · Self-Management · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"For when you lose a game, don't get picked, or things don't go your way.",
      intro:"Hi, I'm Hanuman. Disappointment is one of the hardest feelings, and everybody gets it. Let's reset after one.",
      lines:[
        {cue:"Name it: \"I'm disappointed.\"",sub:"That's a real, okay feeling to have.",say:"Name it out loud or in your head: I'm disappointed. That's a real, allowed feeling.",hold:36},
        {cue:"It's okay if it stings for a minute.",sub:"You don't have to pretend it's fine.",say:"It's okay if it stings for a minute. You don't have to pretend it's fine right away.",hold:36},
        {cue:"One slow breath.",sub:"",say:"Take one slow breath.",hold:24},
        {cue:"Ask: what's one thing I can still do?",sub:"Try again, cheer someone else, play something new.",say:"Ask yourself: what's one thing I can still do? Try again, cheer for someone else, or find something new to try.",hold:40},
        {cue:"Disappointment fades. You get to choose what's next.",sub:"",say:"Disappointment always fades. You get to choose what happens next.",hold:32}
      ],
      close:"That's the Disappointment Reset. Losing is part of playing, every single time." },
{ id:"testdaycalm", kind:"sel", demo:"desk", name:"Test Day Calm-Down", tag:"SEL · Self-Management · 3 min", audience:"2nd-6th", src:"HudsonSeed",
      blurb:"A quick reset for test-day nerves, before the pencils come out.",
      intro:"Hi, I'm Hanuman. Test-day nerves are super common, they just mean you care. Let's calm your body before the pencils come out.",
      lines:[
        {cue:"Notice where the nerves live in your body.",sub:"Belly? Hands? Chest?",say:"Notice where the nerves are living in your body right now, your belly, your hands, your chest?",hold:38},
        {cue:"Remind yourself: nerves mean you care, not that you'll fail.",sub:"",say:"Remind yourself that nerves just mean you care. They don't predict how you'll do.",hold:34},
        {cue:"Three slow breaths, in through your nose.",sub:"",say:"Take three slow breaths, in through your nose, nice and easy.",hold:30},
        {cue:"Remember one thing you DO know.",sub:"Just one fact or skill.",say:"Remember one thing you do know, just one fact or one skill you're sure of.",hold:34},
        {cue:"You've prepared. Now just do your best, one question at a time.",sub:"",say:"You've prepared for this. Now just do your best, one question at a time.",hold:34}
      ],
      close:"That's the Test Day Calm-Down. Your best is always enough." },
{ id:"facialfeelings", kind:"sel", demo:"desk", name:"Facial Feelings Detective", tag:"SEL · Social Awareness · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Practice reading feelings on other people's faces and bodies.",
      intro:"Hi, I'm Hanuman. Faces and bodies tell us how people are feeling, if we know how to look. Let's practice reading them.",
      lines:[
        {cue:"Think of someone you saw today.",sub:"A friend, family, a teacher.",say:"Think of someone you saw today, a friend, someone in your family, a teacher.",hold:30},
        {cue:"What was their face doing?",sub:"Eyebrows, mouth, eyes.",say:"What was their face doing? Their eyebrows, their mouth, their eyes?",hold:30},
        {cue:"What was their body doing?",sub:"Shoulders up? Arms crossed? Relaxed?",say:"What was their body doing? Shoulders up high, arms crossed, or relaxed and open?",hold:38},
        {cue:"Guess what feeling those clues might mean.",sub:"We can't always be sure, and that's okay.",say:"Guess what feeling those clues might mean. We can't always be one hundred percent sure, and that's okay.",hold:38},
        {cue:"Reading others helps us respond with kindness.",sub:"",say:"Reading other people's clues helps us know how to respond with kindness.",hold:34}
      ],
      close:"That's Facial Feelings Detective. The more you practice, the better you get." },
{ id:"communityhelper", kind:"sel", demo:"desk", name:"Community Helper Gratitude", tag:"SEL · Social Awareness · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Notice and appreciate the people who help make your day work.",
      intro:"Hi, I'm Hanuman. So many people help make your day happen without you even noticing. Let's give them some credit.",
      lines:[
        {cue:"Think of someone who helped you today.",sub:"A bus driver, teacher, cafeteria worker, family member.",say:"Think of someone who helped you today, a bus driver, a teacher, someone in the cafeteria, someone at home.",hold:39},
        {cue:"What exactly did they do?",sub:"",say:"What exactly did they do to help you?",hold:27},
        {cue:"Imagine your day without that help.",sub:"Notice how much easier it made things.",say:"Imagine your day without that help. Notice how much easier that person made things.",hold:35},
        {cue:"Send them a quiet thank you.",sub:"Or tell them for real, next time you see them.",say:"Send them a quiet thank you in your head, or tell them for real next time you see them.",hold:35},
        {cue:"Communities run on people helping people.",sub:"You're one of those people too.",say:"Communities run on people helping people, and you're one of those helpers too.",hold:35}
      ],
      close:"That's Community Helper Gratitude. Notice them, and maybe say thanks out loud today." },
{ id:"differentnotless", kind:"sel", demo:"desk", name:"Different, Not Less", tag:"SEL · Social Awareness · 3 min", audience:"2nd-6th", src:"HudsonSeed",
      blurb:"Everyone learns, feels, and moves differently, and that's a strength, not a problem.",
      intro:"Hi, I'm Hanuman. Every single person in your class learns, feels, and moves in their own way. Let's celebrate that instead of judging it.",
      lines:[
        {cue:"Think of a way you do things differently than a friend.",sub:"Learning, talking, moving, anything.",say:"Think of one way you do things differently than a friend, how you learn, talk, or move.",hold:36},
        {cue:"Is different actually wrong?",sub:"Or just... different?",say:"Is that difference actually wrong? Or is it just different?",hold:32},
        {cue:"Think of someone whose way of doing things is different from yours.",sub:"",say:"Now think of someone whose way of doing things is different from yours.",hold:32},
        {cue:"Different, not less.",sub:"Say it with me.",say:"Different, not less. Say that with me: different, not less.",hold:32},
        {cue:"A classroom full of different people is a strong classroom.",sub:"",say:"A classroom full of different kinds of people is actually a strong classroom.",hold:36}
      ],
      close:"That's Different, Not Less. Every kind of different belongs here." },
{ id:"turntaking", kind:"sel", demo:"desk", name:"Turn-Taking Trainer", tag:"SEL · Relationship Skills · 3 min", audience:"PreK3-2nd", src:"HudsonSeed",
      blurb:"Practice waiting for your turn and sharing, the friendly way.",
      intro:"Hi friends, I'm Hanuman. Taking turns can feel hard when you really want something now. Let's practice.",
      lines:[
        {cue:"Think of a time you had to wait for a turn.",sub:"A toy, a game, a swing.",say:"Think of a time you had to wait for your turn, maybe for a toy, a game, or the swing.",hold:35},
        {cue:"How did your body feel while waiting?",sub:"Wiggly? Impatient? That's normal.",say:"How did your body feel while you waited? Wiggly or impatient? That's totally normal.",hold:35},
        {cue:"Try this line: \"Can I have a turn after you?\"",sub:"",say:"Try this line out loud: can I have a turn after you?",hold:31},
        {cue:"When it's not your turn, you can still have fun watching or waiting nearby.",sub:"",say:"When it's not your turn yet, you can still have fun watching or playing something else close by.",hold:39},
        {cue:"Turns always come around.",sub:"Everybody gets a turn eventually.",say:"Turns always come around. Everybody gets one eventually.",hold:31}
      ],
      close:"That's the Turn-Taking Trainer. Waiting gets easier every time you practice." },
{ id:"teamplayer", kind:"sel", demo:"desk", name:"Team Player Toolkit", tag:"SEL · Relationship Skills · 3 min", audience:"2nd-6th", src:"HudsonSeed",
      blurb:"Tools for when group work gets frustrating: someone's not helping, or ideas clash.",
      intro:"Hi, I'm Hanuman. Working in a group is a real skill, and it's okay that it's sometimes frustrating. Here are some tools.",
      lines:[
        {cue:"Tool 1: Say what you need calmly.",sub:"\"Can you help with this part?\"",say:"Tool one: say what you need calmly, like can you help with this part?",hold:32},
        {cue:"Tool 2: Listen to other ideas before deciding.",sub:"Even ones different from yours.",say:"Tool two: listen to other people's ideas before deciding, even the ones different from yours.",hold:36},
        {cue:"Tool 3: If it's stuck, ask a teacher for help.",sub:"That's not failing, that's teamwork.",say:"Tool three: if the group is stuck, ask a teacher for help. That's not failing, that's real teamwork.",hold:40},
        {cue:"Tool 4: Notice what's going RIGHT, not just wrong.",sub:"",say:"Tool four: notice what's actually going right in the group, not just what's frustrating.",hold:36},
        {cue:"Teams are hard sometimes and still worth it.",sub:"",say:"Teams are hard sometimes, and they're still worth it.",hold:28}
      ],
      close:"That's the Team Player Toolkit. Great teammates are made, not born." },
{ id:"sayingsorry", kind:"sel", demo:"desk", name:"Saying Sorry and Meaning It", tag:"SEL · Relationship Skills · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"The difference between a fast sorry and a real one.",
      intro:"Hi, I'm Hanuman. There's a difference between saying sorry to end an argument fast and saying sorry because you mean it. Let's practice the real one.",
      lines:[
        {cue:"Think of what actually happened.",sub:"Not the excuse, the real thing.",say:"Think about what actually happened, not the excuse, the real thing.",hold:32},
        {cue:"Name it specifically in your sorry.",sub:"\"I'm sorry I took your turn,\" not just \"sorry.\"",say:"Name it specifically. I'm sorry I took your turn, is a lot stronger than just sorry.",hold:36},
        {cue:"Look at the person, if that feels okay.",sub:"Sorry lands better face to face.",say:"Look at the person if that feels okay for you. A real sorry lands better face to face.",hold:36},
        {cue:"Ask if there's anything you can do to help fix it.",sub:"",say:"Ask if there's anything you can do to help make it right.",hold:32},
        {cue:"A real sorry isn't about ending the conversation fast.",sub:"It's about actually caring.",say:"A real sorry isn't about ending the conversation fast. It's about actually caring.",hold:36}
      ],
      close:"That's Saying Sorry and Meaning It. It's harder, and it's worth it." },
{ id:"includesomeonenew", kind:"sel", demo:"desk", name:"Include Someone New", tag:"SEL · Relationship Skills · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"Notice someone sitting alone or left out, and take one small step to include them.",
      intro:"Hi, I'm Hanuman. Being left out is one of the loneliest feelings there is. Let's practice noticing and including.",
      lines:[
        {cue:"Think of a time you felt left out.",sub:"Remember how that felt.",say:"Think of a time you felt left out. Remember how that felt in your body.",hold:35},
        {cue:"Now think: is there someone who might feel that way today?",sub:"At lunch, recess, or in class.",say:"Now think, is there someone who might be feeling that way today, at lunch, at recess, or in class?",hold:39},
        {cue:"One small step: an invitation.",sub:"\"Want to sit with us?\" or \"Want to join?\"",say:"One small step is all it takes, an invitation like want to sit with us, or want to join?",hold:35},
        {cue:"It might feel a little scary to ask.",sub:"Brave things usually do.",say:"It might feel a little scary to be the one who asks. Brave things usually do.",hold:35},
        {cue:"Including someone can change their whole day.",sub:"",say:"Including someone can genuinely change their whole day.",hold:27}
      ],
      close:"That's Include Someone New. It costs you nothing and means everything to them." },
{ id:"ruleshavereasons", kind:"sel", demo:"desk", name:"Rules Have Reasons", tag:"SEL · Responsible Decision-Making · 3 min", audience:"1st-6th", src:"HudsonSeed",
      blurb:"Understand WHY a rule exists, not just that it exists.",
      intro:"Hi, I'm Hanuman. Rules can feel annoying until you understand why they're there. Let's dig into one.",
      lines:[
        {cue:"Think of a rule you don't love.",sub:"Any rule, home or school.",say:"Think of a rule you don't love that much, at home or at school.",hold:32},
        {cue:"Guess why that rule might exist.",sub:"Safety? Fairness? Kindness?",say:"Guess why that rule might actually exist. Is it about safety, fairness, or kindness?",hold:36},
        {cue:"Imagine if that rule didn't exist at all.",sub:"What might go wrong?",say:"Imagine if that rule didn't exist at all. What might go wrong without it?",hold:36},
        {cue:"Rules aren't there to ruin your fun.",sub:"They're usually there to protect something.",say:"Most rules aren't there to ruin your fun. They're there to protect something or someone.",hold:36},
        {cue:"Understanding a rule makes it easier to follow.",sub:"",say:"Understanding why a rule exists makes it a whole lot easier to follow.",hold:32}
      ],
      close:"That's Rules Have Reasons. Curious beats grumpy, every time." },
{ id:"fairnesscheck", kind:"sel", demo:"desk", name:"The Fairness Check", tag:"SEL · Responsible Decision-Making · 3 min", audience:"2nd-6th", src:"HudsonSeed",
      blurb:"A quick gut-check before a choice: is this fair to everyone involved?",
      intro:"Hi, I'm Hanuman. Before a tricky choice, there's one quick question that helps a lot. Let's practice it.",
      lines:[
        {cue:"Think of a choice in front of you.",sub:"",say:"Think of a choice that's in front of you right now.",hold:30},
        {cue:"Ask: is this fair to ME?",sub:"",say:"Ask yourself: is this fair to me?",hold:30},
        {cue:"Ask: is this fair to EVERYONE else involved?",sub:"",say:"Now ask: is this fair to everyone else involved too?",hold:34},
        {cue:"If the answer is no to either one, that's useful information.",sub:"",say:"If the answer is no to either question, that's useful information, not a failure.",hold:38},
        {cue:"Fair doesn't always mean equal, but it means everyone matters.",sub:"",say:"Fair doesn't always mean exactly equal, but it does mean everyone's feelings matter.",hold:38}
      ],
      close:"That's the Fairness Check. One quick question, a lot clearer choice." },
{ id:"goalladder", kind:"sel", demo:"desk", name:"Goal Setting Ladder", tag:"SEL · Responsible Decision-Making · 3 min", audience:"2nd-6th", src:"HudsonSeed",
      blurb:"Break one big goal into small, climbable steps.",
      intro:"Hi, I'm Hanuman. Big goals feel far away, but a ladder gets you there one rung at a time. Let's build yours.",
      lines:[
        {cue:"Think of one goal you want to reach.",sub:"Big or small, yours.",say:"Think of one goal you want to reach. It can be big or small, as long as it's really yours.",hold:37},
        {cue:"What's the very FIRST small step?",sub:"Something you could do today or tomorrow.",say:"What's the very first small step? Something you could actually do today or tomorrow.",hold:37},
        {cue:"What's a step after that?",sub:"",say:"What might be a step after that one?",hold:29},
        {cue:"What does the TOP of the ladder look like?",sub:"Reaching your goal.",say:"What does the very top of the ladder look like, you reaching your goal?",hold:33},
        {cue:"Ladders are climbed one rung at a time.",sub:"You just built yours.",say:"Ladders are climbed one single rung at a time, and you just built yours.",hold:33}
      ],
      close:"That's the Goal Setting Ladder. Every big goal starts with one small step." },
{ id:"planbswitch", kind:"sel", demo:"desk", name:"The Plan B Switch", tag:"SEL · Self-Management · 3 min", audience:"1st-6th", src:"HudsonSeed",
      blurb:"For when plans change and it feels like the whole day fell apart. Practice pivoting to Plan B without a meltdown.",
      intro:"Hi, I'm Hanuman. Sometimes a plan changes right when you were counting on it, indoor recess instead of outside, a sub instead of your teacher. Let's practice switching to Plan B.",
      lines:[
        {cue:"Think of a time a plan suddenly changed on you.",sub:"Something you were counting on.",say:"Think of a time a plan suddenly changed on you, something you were really counting on.",hold:30},
        {cue:"Notice the stuck feeling.",sub:"That's your brain wanting Plan A back.",say:"Notice that stuck, frustrated feeling. That's just your brain wanting Plan A back. It's a real feeling, not a bad one.",hold:33},
        {cue:"One slow breath before you decide anything.",sub:"",say:"Take one slow breath before you decide anything.",hold:23},
        {cue:"Ask: what's still okay about right now?",sub:"There's always something.",say:"Ask yourself: what's still okay about right now, even with the change? There's almost always something.",hold:30},
        {cue:"Plan B isn't a failure.",sub:"It's just a different path to an okay day.",say:"Plan B isn't a failure, it's just a different path to an okay day.",hold:27},
        {cue:"Practice saying it: \"Okay, new plan. I can do this.\"",sub:"",say:"Practice saying it out loud: okay, new plan, I can do this.",hold:27}
      ],
      close:"That's the Plan B Switch. Flexible brains bend without breaking, and you just practiced bending yours." },
{ id:"taskstarter", kind:"sel", demo:"desk", name:"The Task Starter", tag:"SEL · Self-Management · 3 min", audience:"1st-6th", src:"HudsonSeed",
      blurb:"Breaks an overwhelming task into one tiny, friction-free first step.",
      intro:"Hi, I'm Hanuman. Sometimes a task feels so big that starting it feels impossible, even a messy desk or a homework page. Let's shrink it down to one tiny step.",
      lines:[
        {cue:"Think of something you've been putting off.",sub:"Cleaning up, homework, a chore.",say:"Think of something you've been putting off, cleaning up, homework, a chore.",hold:26},
        {cue:"Don't picture the whole thing finished.",sub:"That's the part that feels huge.",say:"Don't picture the whole thing finished. That's the part that feels huge and stops you before you start.",hold:29},
        {cue:"Picture just the very first tiny move.",sub:"One paper. One shoe. One sentence.",say:"Picture just the very first tiny move, one paper picked up, one shoe put away, one sentence written.",hold:33},
        {cue:"That tiny move is the whole job right now.",sub:"Nothing else counts yet.",say:"That tiny move is the whole job right now. Nothing else counts yet.",hold:26},
        {cue:"Do just that one tiny thing.",sub:"See how it feels.",say:"Go ahead and do just that one tiny thing. Notice how it feels once it's done.",hold:29},
        {cue:"Starting is the hardest part, and you just did it.",sub:"",say:"Starting is almost always the hardest part, and you just did it.",hold:26}
      ],
      close:"That's the Task Starter. One tiny move is all it takes to break the freeze." },
{ id:"morningbridge", kind:"sel", demo:"desk", name:"The Morning Bridge", tag:"SEL · Self-Awareness · 3 min", audience:"PreK3-2nd", src:"HudsonSeed",
      blurb:"For the hard goodbye at drop-off. Builds a mental bridge between home and school so kids feel held in both places. Best as a 1-on-1 or small-group check-in for a specific struggling child, not a whole-class whiteboard activity, since projecting separation anxiety content to a full room can stir up feelings in kids who were otherwise fine.",
      intro:"Hi friends, I'm Hanuman. Saying goodbye in the morning can feel really hard, even when you know you'll see your grown-up again. Let's build a bridge to help.",
      lines:[
        {cue:"Think of your grown-up's face right now.",sub:"Picture it clearly.",say:"Think of your grown-up's face right now. Picture it clearly in your mind.",hold:25},
        {cue:"Imagine a bridge connecting you to them.",sub:"Even though you're apart, the bridge stays.",say:"Imagine a bridge connecting you to them. Even when you're apart, that bridge stays right there.",hold:28},
        {cue:"Your grown-up is thinking about you too.",sub:"Grown-ups carry their kids in their hearts all day.",say:"Your grown-up is thinking about you too, even at school. Grown-ups carry their kids in their hearts all day long.",hold:31},
        {cue:"Put your hand on your heart.",sub:"That's your side of the bridge.",say:"Put your hand on your heart. That's your side of the bridge, right there with you.",hold:28},
        {cue:"Pickup time is coming, even if it feels far.",sub:"The bridge doesn't go away while you wait.",say:"Pickup time is coming, even if it feels far away right now. The bridge doesn't go anywhere while you wait.",hold:28},
        {cue:"You can do hard goodbyes. Lots of kids do.",sub:"",say:"You can do hard goodbyes. So many kids do this exact same brave thing every single morning.",hold:28}
      ],
      close:"That's the Morning Bridge. The bridge is always there, even when you can't see it." },
{ id:"recessreset", kind:"sel", demo:"desk", name:"Recess-to-Desk Reset", tag:"SEL · Self-Management · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"A fast down-shift from high recess energy to focused classroom energy.",
      intro:"Hi, I'm Hanuman. Your body just had big, fast, loud energy at recess. Now it's time to bring it down for class. Let's shift gears together.",
      lines:[
        {cue:"Notice your fast heart and quick breath.",sub:"That's leftover recess energy.",say:"Notice your fast heart and your quick breath. That's just leftover recess energy, still moving through your body.",hold:33},
        {cue:"Three big breaths out, slow and long.",sub:"",say:"Take three big breaths out, slow and long, like you're blowing out birthday candles gently.",hold:30},
        {cue:"Shake your hands out for a second.",sub:"Let the wiggles go through your fingers.",say:"Shake your hands out for just a second. Let the wiggles go right out through your fingers.",hold:27},
        {cue:"Feel your feet on the floor.",sub:"Heavy and still.",say:"Now feel your feet on the floor, heavy and still.",hold:23},
        {cue:"Your body is shifting from fast to focused.",sub:"Both speeds are useful, just at different times.",say:"Your body is shifting gears, from fast to focused. Both speeds are useful, just at different times.",hold:30},
        {cue:"Ready for desk mode.",sub:"You just downshifted on purpose.",say:"You're ready for desk mode now. You just downshifted your whole body on purpose.",hold:27}
      ],
      close:"That's the Recess-to-Desk Reset. A fast body can learn to slow down on command." },
{ id:"sensoryoverload", kind:"sel", demo:"desk", name:"The Sensory Overload Reset", tag:"SEL · Self-Management · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"A low-stimulation, purely physical reset for when the room feels too loud, too bright, or too much.",
      intro:"Hi, I'm Hanuman. Sometimes a room feels like too much, too loud, too bright, too crowded. This one isn't about thinking, it's just about your body. Let's turn the volume down together.",
      lines:[
        {cue:"If you can, close your eyes or look down.",sub:"Less to look at right now.",say:"If you can, close your eyes, or just look down at your lap. That's less to look at right now.",hold:31},
        {cue:"Press your palms together, firm.",sub:"Hold that pressure.",say:"Press your palms together, firm, and hold that steady pressure.",hold:27},
        {cue:"Breathe in slow through your nose.",sub:"Just the breath. Nothing else.",say:"Breathe in slow through your nose. Just the breath, nothing else to focus on.",hold:27},
        {cue:"Breathe out even slower.",sub:"",say:"Breathe out even slower than you breathed in.",hold:20},
        {cue:"Notice only the feeling of your hands pressing.",sub:"Let that be the only thing.",say:"Notice only the feeling of your hands pressing together. Let that be the one thing you pay attention to.",hold:34},
        {cue:"Stay here as long as you need.",sub:"There's no rush back.",say:"Stay here as long as you need to. There's no rush to go back until your body feels ready.",hold:31}
      ],
      close:"That's the Sensory Overload Reset. When it's too much, less input is the whole answer." },
{ id:"strategymatch", kind:"sel", demo:"desk", name:"The Strategy Matchmaker", tag:"SEL · Self-Management · 3 min", audience:"1st-6th", src:"HudsonSeed",
      blurb:"Checks your energy and feeling, then matches you to the right kind of coping strategy for that exact state.",
      intro:"Hi, I'm Hanuman. Different feelings need different tools, a wiggly feeling and a tired feeling don't get fixed the same way. Let's find your match.",
      lines:[
        {cue:"First, check your energy.",sub:"High and buzzing, or low and heavy?",say:"First, check your energy. Is it high and buzzing, or low and heavy?",hold:26},
        {cue:"If your energy is HIGH, you need a MOVING strategy.",sub:"Push against a wall, shake it out, big breaths out.",say:"If your energy is high, you need a moving strategy, like pushing against a wall, shaking it out, or big breaths out.",hold:29},
        {cue:"If your energy is LOW, you need a WAKING-UP strategy.",sub:"Stretch tall, cold water, stand up and move a little.",say:"If your energy is low, you need a waking-up strategy, like stretching tall, a sip of cold water, or standing up and moving a little.",hold:29},
        {cue:"If your energy is JUST RIGHT but the feeling is big, try a THINKING strategy.",sub:"Name it, talk it out, worry vs. real.",say:"If your energy feels okay but the feeling itself is big, try a thinking strategy, naming it, talking it out, or sorting worry from real.",hold:29},
        {cue:"The trick is matching the tool to the moment.",sub:"Not every tool works for every feeling.",say:"The real trick is matching the tool to the moment. Not every tool works for every feeling, and that's okay.",hold:26},
        {cue:"Next time you're stuck, ask: high, low, or big feeling?",sub:"Then pick your match.",say:"Next time you're stuck, ask yourself: is my energy high, low, or is it just a big feeling? Then pick your match.",hold:29}
      ],
      close:"That's the Strategy Matchmaker. The right tool for the right moment makes everything easier." },
{ id:"istatement", kind:"sel", demo:"desk", name:"The I-Statement Builder", tag:"SEL · Relationship Skills · 3 min", audience:"2nd-6th", src:"HudsonSeed",
      blurb:"Build a real conflict sentence using the I-feel, when, because, I-need formula.",
      intro:"Hi, I'm Hanuman. There's a sentence formula that turns a blow-up into a real conversation. Let's build one together.",
      lines:[
        {cue:"Start with: \"I feel ___.\"",sub:"Name the actual feeling.",say:"Start with I feel, and then name the actual feeling, mad, hurt, left out, whatever it really is.",hold:28},
        {cue:"Add: \"...when ___.\"",sub:"Say what happened, not what they meant.",say:"Add when, and say what actually happened, not what you think they meant by it.",hold:28},
        {cue:"Add: \"...because ___.\"",sub:"Explain why it landed on you that way.",say:"Add because, and explain why it landed on you that way.",hold:25},
        {cue:"Finish with: \"I need ___.\"",sub:"Say what would actually help.",say:"Finish with I need, and say what would actually help right now.",hold:25},
        {cue:"Put it together: \"I feel hurt when you walked away, because I was still talking, and I need you to let me finish.\"",sub:"",say:"Put it all together. For example: I feel hurt when you walked away, because I was still talking, and I need you to let me finish.",hold:38},
        {cue:"Try building your own sentence now.",sub:"Out loud or in your head.",say:"Try building your own sentence right now, out loud or in your head.",hold:25}
      ],
      close:"That's the I-Statement Builder. One sentence formula, and almost any conflict gets easier to say out loud." },
{ id:"bigchangemap", kind:"sel", demo:"desk", name:"The Big Change Map", tag:"SEL · Self-Awareness · 3 min", audience:"1st-6th", src:"HudsonSeed",
      blurb:"For moving, new schools, or any big life change at home. Maps what's changing against what's staying the same.",
      intro:"Hi, I'm Hanuman. Big changes, like moving to a new house, starting a new school, or when things at home shift, can make everything feel shaky. Let's map it out.",
      lines:[
        {cue:"Think of a big change happening in your life.",sub:"Any size, it's real if it feels big to you.",say:"Think of a big change happening in your life right now. Any size counts, it's real if it feels big to you.",hold:30},
        {cue:"Column 1: What is actually CHANGING?",sub:"Be specific.",say:"In column one, list what is actually changing. Be specific, a house, a school, a schedule.",hold:27},
        {cue:"Column 2: What is STAYING THE SAME?",sub:"People who love you, things you're good at, your own name.",say:"In column two, list what is staying exactly the same. The people who love you, the things you're good at, your own name.",hold:30},
        {cue:"Notice: column two is usually longer than it feels.",sub:"",say:"Notice something, column two is usually a lot longer than it feels like in the moment.",hold:27},
        {cue:"Changes are real, and so is everything that didn't change.",sub:"Both things are true at once.",say:"Changes are real, and everything that didn't change is just as real. Both things are true at the same time.",hold:30},
        {cue:"You can come back to this map anytime things feel shaky.",sub:"",say:"You can come back to this map anytime things feel shaky again.",hold:24}
      ],
      close:"That's the Big Change Map. Change is easier to hold when you can see the whole picture." },
{ id:"invisiblestring", kind:"sel", demo:"desk", name:"The Invisible String", tag:"SEL · Self-Awareness · 3 min", audience:"PreK3-6th", src:"HudsonSeed",
      blurb:"A gentle visualization for missing someone, grief, or separation. Not physical closeness, but connection that doesn't break.",
      intro:"Hi, I'm Hanuman. Sometimes we miss someone, someone far away, someone who moved, or someone we just haven't seen in a while. There's a string that connects us to the people we love, and it doesn't break, even then.",
      lines:[
        {cue:"Think of someone you miss.",sub:"Anyone at all.",say:"Think of someone you miss. It can be anyone at all.",hold:22},
        {cue:"Imagine an invisible string from your heart to theirs.",sub:"It stretches as far as it needs to.",say:"Imagine an invisible string running from your heart to theirs. It can stretch as far as it needs to, any distance.",hold:31},
        {cue:"The string doesn't break when someone is far away.",sub:"Love doesn't need to be close by to be real.",say:"That string doesn't break just because someone is far away. Love doesn't need to be close by to still be real.",hold:31},
        {cue:"Even when you can't see someone for a long time,",sub:"the string still connects to your memories of them.",say:"Even when you can't see someone for a long time, the string still connects you to your memories of them. Memories are a real kind of closeness too.",hold:35},
        {cue:"Put your hand on your heart and feel the string there.",sub:"",say:"Put your hand on your heart, and feel that string still there.",hold:25},

  // ---- step-aware engine: a single breath = a 1-step run; a sequence = many steps ----
  var STEPS=[], stepStarts=[], stepIdx=-1, CURRENT=null;
  function buildSteps(item){
    STEPS=[]; stepStarts=[];
    if(item.steps){ var acc=0;
      item.steps.forEach(function(s){var b=breathById(s.breathId); if(b){STEPS.push({breath:b,dur:s.seconds});stepStarts.push(acc);acc+=s.seconds;}});
    } else { STEPS=[{breath:item,dur:item.duration}]; stepStarts=[0]; }
    return STEPS.reduce(function(a,s){return a+s.dur;},0);
  }
  function stepAt(t){var i=0;for(;i<STEPS.length;i++){if(t<stepStarts[i]+STEPS[i].dur)return i;}return STEPS.length-1;}

  function loop(now){
    var t=(now-startT)/1000, remain=Math.max(0,Math.ceil(TOTAL-t));
    timerEl.textContent="0"+Math.floor(remain/60)+":"+String(remain%60).padStart(2,"0");
    if(t>=TOTAL)return finish();
    var si=stepAt(t);
    if(si!==stepIdx){ stepIdx=si; ci=0; lastPhase=""; if(si>0){var br=BRIDGES[STEPS[si].breath.id]; if(br)say(br);} }
    var FLOW=STEPS[si].breath, localT=t-stepStarts[si];
    var ph=phaseAt(localT,FLOW.pattern); setBall(ph.p);
    if(ph.name!==lastPhase){
      lastPhase=ph.name;
      if(ph.name==="in"){var a=pair(FLOW.inhale);if(a){cue.textContent=a[0];sub.textContent=a[1];say(a[0]+" "+a[1]);}}
      else if(ph.name==="out"){var b=pair(FLOW.exhale);if(b){cue.textContent=b[0];sub.textContent=b[1];say(b[0]+" "+b[1]);}ci++;}
      else if(ph.name==="hold"&&FLOW.holdCue){cue.textContent=FLOW.holdCue[0];sub.textContent=FLOW.holdCue[1]||"";if(FLOW.holdCue[0])say(FLOW.holdCue[0]);}
      else if(ph.name==="rest"&&FLOW.restCue){cue.textContent=FLOW.restCue[0];sub.textContent=FLOW.restCue[1]||"";if(FLOW.restCue[0])say(FLOW.restCue[0]);}
    }
    raf=requestAnimationFrame(loop);
  }
  function finish(){running=false;cancelAnimationFrame(raf);setBall(0);timerEl.textContent="00:00";
    hsLog("complete",CURRENT,(Date.now()-hsT0)/1000);
    cue.textContent="Beautiful. The room is calm and ready.";
    sub.textContent="Say it with me: I am happy. I am safe. I am brave. I am strong. I am love.";
    say("Beautiful. The room is calm and ready. Say it with me if you'd like. I am happy. I am safe. I am brave. I am strong. I am love.");
    againBtn.classList.remove("hide");}

  // ---- desk demo engine: swap scene to Hanuman-at-desk, drive poses per line ----
  var deskWrap=document.getElementById("deskWrap"), monkeyWrap=document.getElementById("monkeyWrap"), ballWrap=document.getElementById("ballWrap");
  function setDeskPose(p){var s=document.getElementById("deskSvg");if(s)s.setAttribute("data-pose",p);}
  function deskOn(on){deskWrap.style.display=on?"flex":"none";monkeyWrap.style.display=on?"none":"";ballWrap.style.display=on?"none":"";if(on)setDeskPose("neutral");}

  // ---- meditation engine: warm glow + ring ripples, line-by-line narration ----
  var medActive=false, medTimeouts=[], medTick=null, medRipple=null, medRemain=0, CURRENTMED=null;
  function fmt(s){return "0"+Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}
  function spawnRipple(){var w=document.getElementById("ballWrap");var r=document.createElement("div");r.className="ripple";w.appendChild(r);setTimeout(function(){if(r.parentNode)r.parentNode.removeChild(r);},4100);}
  function startGlow(){ball.style.transform="";ball.style.background="";ball.style.boxShadow="";ball.classList.add("glow");spawnRipple();medRipple=setInterval(spawnRipple,2200);}
  function stopGlow(){if(medRipple){clearInterval(medRipple);medRipple=null;}ball.classList.remove("glow");var w=document.getElementById("ballWrap");var rs=w.querySelectorAll(".ripple");for(var i=0;i<rs.length;i++)rs[i].remove();}
  function clearMedTimers(){for(var i=0;i<medTimeouts.length;i++)clearTimeout(medTimeouts[i]);medTimeouts=[];if(medTick){clearInterval(medTick);medTick=null;}}
  function stopMed(){medActive=false;clearMedTimers();stopGlow();}
  function playLine(item,i){
    if(!medActive)return;
    var L=item.lines[i];
    cue.textContent=L.cue; sub.textContent=L.sub||""; say(L.say);
    if(L.pose)setDeskPose(L.pose);
    var next=(i+1<item.lines.length)?function(){playLine(item,i+1);}:function(){finishMed(item);};
    medTimeouts.push(setTimeout(next, L.hold*1000));
  }
  function finishMed(item){
    medActive=false; clearMedTimers(); if(medRipple){clearInterval(medRipple);medRipple=null;}
    hsLog("complete",item,(Date.now()-hsT0)/1000);
    if(item.demo==="desk")setDeskPose("steady");
    timerEl.textContent="00:00";
    cue.textContent="Beautiful work."; sub.textContent="The room is calm and ready.";
    say(item.close||"Beautiful work.");
    againBtn.classList.remove("hide");
  }
  function runMeditation(item){
    running=false; cancelAnimationFrame(raf); stopMed();
    CURRENT=item; CURRENTMED=item; medActive=true; audioUnlocked=true; if(!chosenVoice)pickVoice();
    hsT0=Date.now(); hsLog("start",item);
    menu.style.display="none"; player.style.display="flex"; againBtn.classList.add("hide");
    cue.textContent=""; sub.textContent="";
    if(item.demo==="desk"){deskOn(true);} else {deskOn(false); startGlow();}
    var delay=Math.min(8000,Math.max(3500,item.intro.length*55));
    medRemain=item.lines.reduce(function(a,l){return a+l.hold;},0)+Math.round(delay/1000);
    timerEl.textContent=fmt(medRemain);
    say(item.intro);
    medTick=setInterval(function(){medRemain=Math.max(0,medRemain-1);timerEl.textContent=fmt(medRemain);},1000);
    medTimeouts.push(setTimeout(function(){ if(medActive) playLine(item,0); }, delay));
  }

  var hanumanModal=document.getElementById("hanumanModal"), hanumanVideo=document.getElementById("hanumanVideo");
function playHanuman(src){ hanumanVideo.src=src; hanumanModal.className="show"; hanumanVideo.currentTime=0; hanumanVideo.play(); }
function closeHanumanModal(){ hanumanVideo.pause(); hanumanModal.className=""; hanumanVideo.removeAttribute("src"); hanumanVideo.load(); }
if(hanumanModal){ hanumanModal.addEventListener("click",function(ev){ if(ev.target===hanumanModal) closeHanumanModal(); }); var __cb=hanumanModal.querySelector(".closeModal"); if(__cb) __cb.onclick=closeHanumanModal; }
document.addEventListener("keydown",function(ev){ if(ev.key==="Escape") closeHanumanModal(); });
  function addCard(f){
    var c=document.createElement("div");c.className="card"+(f.kind==="meditation"?" med":"")+(f.kind==="chair"?" chair":"")+(f.kind==="sel"?" sel":"")+(f.kind==="class"?" cls":"");
    c.innerHTML="<span class='tag'>"+f.tag+"</span><h3>"+f.name+"</h3><p>"+f.blurb+"</p><div class='src'>"+f.audience+" · "+f.src+"</div>"+(f.video?"<button class='watchBtn' type='button'>▶ Watch Hanuman</button>":"")+"";
    c.onclick=function(){ if(f.lines) runMeditation(f); else run(f); };
    
    if(f.video){ var wb=c.querySelector(".watchBtn"); if(wb){ wb.onclick=function(ev){ ev.stopPropagation(); playHanuman(f.video); }; } }
    cards.appendChild(c);
  }
  FLOWS.forEach(addCard);
  MEDITATIONS.forEach(addCard);
  CHAIR.forEach(addCard);
  SEL.forEach(addCard);
  CLASSES.forEach(addCard);
  SEQUENCES.forEach(addCard);
  setBall(0);
})();
</script>
</body>
</html>
